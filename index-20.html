เกินสองป หรือ ปรับไม่เกินสหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๘๐","num":"180","text":"ผู้ใดนําสืบหรือแสดงพยานหลักฐานอันเปนเท็จในการ พิจารณาคดถ้าเปนพยานหลักฐานในข้อสําคัญในคดนัน ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ ถ้าความผิดดังกล่าวในวรรคแรก ได้กระทําในการพิจารณาคดอาญา ผู้กระทํา ต้องระวางโทษจําคุกไม่เกินเจ็ดป และปรับไม่เกินหนึงแสนสหมืนบาท"},{"section":"มาตรา ๑๘๑","num":"181","text":"ถ้าการกระทําความผิดตามมาตรา ๑๗๔ มาตรา ๑๗๕"},{"section":"มาตรา ๑๘๒","num":"182","text":"ผู้ใดกระทําความผิดตามมาตรา ๑๗๗ หรือมาตรา ๑๗๘ แล้วลุ แก่โทษ และกลับแจ้งความจริงตอศาลหรือเจ้าพนักงานกอนจบคําเบิกความหรือการแปล ผู้นัน ไมต้องรับโทษ"},{"section":"มาตรา ๑๘๓","num":"183","text":"ผู้ใดกระทําความผิดตามมาตรา ๑๗๗ มาตรา ๑๗๘ หรือ"},{"section":"มาตรา ๑๘๔","num":"184","text":"ผู้ใดเพือจะชวยผู้อืนมิให้ต้องรับโทษหรือให้รบ ั โทษน้อยลง ทําให้เสยหาย ทําลาย ซอนเร้น เอาไปเสย หรือทําให้สูญหายหรือไร้ประโยชน์ซึงพยานหลักฐาน ในการกระทําความผิด ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือ ทังจําทังปรับ"},{"section":"มาตรา ๑๘๕","num":"185","text":"ผู้ใดทําให้เสยหาย ทําลาย ซอนเร้น เอาไปเสย หรือทําให้ สูญหายหรือไร้ประโยชน์ ซึงทรัพย์หรือเอกสารใดทีได้สงไว้ตอศาล หรือทศาลให้รก ั ษาไว้ในการ พิจารณาคดต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทัง จําทัง ปรับ"},{"section":"มาตรา ๑๘๖","num":"186","text":"ผู้ใดทําให้เสยหาย ทําลาย ซอนเร้น เอาไปเสย หรือทําให้ สูญหายหรือไร้ประโยชน์ ซึงทรัพย์สินทีได้มคําพิพากษาให้รบ ิ ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๘๗","num":"187","text":"ผู้ใดเพือจะมิให้การเปนไปตามคําพิพากษาหรือคําสัง ของ ศาล ทําให้เสยหาย ทําลาย ซอนเร้น เอาไปเสย หรือทําให้สูญหายหรือไร้ประโยชน์ ซึงทรัพย์ทถูกยึดหรืออายัด หรือทตนรูว้ ่าน่าจะถูกยึดหรืออายัด ต้องระวางโทษจําคุกไม่เกินสามป หรือ ปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๘๘","num":"188","text":"ผู้ใดทําให้เสยหาย ทําลาย ซอนเร้น เอาไปเสย หรือทําให้ สูญหายหรือไร้ประโยชน์ ซึงพินัยกรรมหรือเอกสารใดของผู้อืน ในประการ อบเพือจะชวยบุคคล หนึงบุคคลใดมิให้ต้องโทษหรือให้รบ ั โทษน้อยลง ต้องระวางโทษจําคุกตังแตหกเดือนถึงเจ็ดป และปรับตังแตหนึงหมืนบาทถึงหนึงแสนสหมืนบาท ถ้าการกระทําหรือไมกระทํานันเปนการเพือจะแกล้งให้บุคคลหนึงบุคคลใด ต้องรับโทษ รับโทษหนักขึน หรือต้องถูกบังคับตามวิธก ี ารเพือความปลอดภัย ผู้กระทําต้อง ระวางโทษจําคุกตลอดชวิต หรือจําคุกตังแตหนึงปถึงยสิบป และปรับตังแตสองหมืนบาทถึงสี แสนบาท"},{"section":"มาตรา ๒๐๑","num":"201","text":"ผู้ใดเปนเจ้าพนักงานในตําแหนงตุลาการ พนักงานอัยการ ผู้ ว่าคดหรือพนักงานสอบสวน เรยก รับ หรือยอมจะรับทรัพย์สินหรือประโยชน์อืนใดสําหรับตน เองหรือผู้อืนโดยมิชอบเพือกระทําการหรือไมกระทําการอย่างใดในตําแหนง ไมว่าการนันจะ ชอบหรือมิชอบด้วยหน้าทต้องระวางโทษ[141]จําคุกตังแตห้าปถึงยสิบป หรือจําคุกตลอดชวิต และปรับตังแตหนึงแสนบาทถึงสีแสนบาท หรือประหารชวิต"},{"section":"มาตรา ๒๐๒","num":"202","text":"แก้ไขเพิมเติมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา พ.ศ. ๒๕๐๒ [143] อัตราโทษ แก้ไขเพิม เติมโดยมาตรา ๗ แหงพระราชบัญญัติแก้ไขเพิม เติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [144] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [145] อัตราโทษ แก้ไขเพิม เติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิม เติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [146] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [147]"},{"section":"มาตรา ๒๐๓","num":"203","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทปฏิบัติการให้เปนไปตามคํา พิพากษาหรือคําสังของศาล ปองกันหรือขัดขวางมิให้การเปนไปตามคําพิพากษาหรือคําสังนัน ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๐๔","num":"204","text":"ผู้ใดเปนเจ้าพนักงาน มตําแหนงหน้าทควบคุมดูแลผู้ทต้องคุมขังตามอํานาจของศาล ของพนักงานสอบสวนหรือของเจ้าพนักงานผู้มอํานาจสืบสวน คดอาญากระทําด้วยประการใด ๆ ให้ผู้ทอยู่ในระหว่างคุมขังนันหลุดพ้นจากการคุมขังไป ต้อง ระวางโทษจําคุกตังแตหนึงปถึงเจ็ดป และปรับตังแตสองหมืนบาทถึงหนึงแสนสหมืนบาท ถ้าผู้ทหลุดพ้นจากการคุมขังไปนันเปนบุคคลทต้องคําพิพากษาของศาลหนึง ศาลใดให้ลงโทษประหารชวิต จําคุกตลอดชวิตหรือจําคุกตังแตสิบห้าปขึนไป หรือมจํานวน ตังแตสามคนขึนไป ผู้กระทําต้องระวางโทษจําคุกตังแตสองปถึงสิบป และปรับตังแตสีหมืนบาท ถึงสองแสนบาท"},{"section":"มาตรา ๒๐๕","num":"205","text":"ถ้าการกระทําดังกล่าวในมาตรา ๒๐๔ เปนการกระทําโดย ประมาท ผู้กระทําต้องระวางโทษจําคุกไม่เกินสองป หรือปรับไม่เกินสหมืนบาท หรือทังจําทัง ปรับ ถ้าผู้ทหลุดพ้นจากการคุมขังไปด้วยการกระทําโดยประมาทนันเปนบุคคลทต้องคําพิพากษาของศาลหนึงศาลใดให้ลงโทษประหารชวิต จําคุกตลอดชวิตหรือจําคุกตังแตสิบห้าปขึนไป หรือมจํานวนตังแตสามคนขึนไป ผู้กระทําต้องระวางโทษจําคุกไม่เกินสามป หรือ ปรับไม่เกินหกหมืนบาท หรือทัง จําทัง ปรับ ถ้าผู้กระทําความผิดจัดให้ได้ตัวผู้ทหลุดพ้นจากการคุมขังคืนมาภายในสาม เดือน ให้งดการลงโทษแกผู้กระทําความผิดนัน ลักษณะ ๔ ความผิดเกยวกับศาสนา"},{"section":"มาตรา ๒๐๖","num":"206","text":"แก้ไขเพิม เติมโดยคําสัง ของคณะปฏิรูปการปกครองแผนดิน ฉบับที ๔๑ ลงวัน ที ๒๑ ตุลาคม พ.ศ. ๒๕๑๙ [148] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๕ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [149] อัตราโทษ แก้ไขเพิม เติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิม เติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [150] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [151] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [152] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [153] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [154] อัตราโทษ แก้ไขเพิ"},{"section":"มาตรา ๒๐๗","num":"207","text":"ผู้ใดกอให้เกิดการวุ่นวายขึนในทประชุมศาสนิกชนเวลา ประชุมกัน นมัสการหรือกระทําพิธกรรมตามศาสนาใด ๆ โดยชอบด้วยกฎหมาย ต้องระวางโทษ จําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือทัง จําทัง ปรับ"},{"section":"มาตรา ๒๐๘","num":"208","text":"ผู้ใดแตงกายหรือใช้เครือ งหมายทีแสดงว่าเปนภิกษุ สาม เณร นักพรตหรือนักบวชในศาสนาใดโดยมิชอบ เพือให้บุคคลอืนเชือว่า ตนเปนบุคคลเชนว่านัน ต้องระวางโทษจําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือทังจําทังปรับ ลักษณะ ๕ ความผิดเกยวกับความสงบสุขของประชาชน"},{"section":"มาตรา ๒๐๙","num":"209","text":"ผู้ใดเปนสมาชิกของคณะบุคคลซึงปกปดวิธด ี ําเนินการและมความมุ่งหมายเพือการอันมิชอบด้วยกฎหมาย ผู้นันกระทําความผิดฐานเปนอังยต้องระวางโทษ จําคุกไม่เกินเจ็ดป และปรับไม่เกินหนึงแสนสหมืนบาท ถ้าผู้กระทําความผิดเปนหัวหน้า ผู้จัดการหรือผู้มตําแหนงหน้าทีในคณะบุคคล นัน ผู้นันต้องระวางโทษจําคุกไม่เกินสิบป และปรับไม่เกินสองแสนบาท"},{"section":"มาตรา ๒๑๐","num":"210","text":"ผู้ใดสมคบกันตังแตห้าคนขึนไปเพือกระทําความผิดอย่าง หนึงอย่างใดตามทบัญญัติไว้ในภาค ๒ นี และความผิดนันมกําหนดโทษจําคุกอย่างสูงตังแตหนึงปขึนไป ผู้นันกระทําความผิดฐานเปนซองโจร ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่ เกินหนึงแสนบาท หรือทังจําทังปรับ ถ้าเปนการสมคบเพือกระทําความผิดทมีระวางโทษถึงประหารชวิต จําคุก ตลอดชวิตหรือจําคุกอย่างสูงตังแตสิบปขึนไป ผู้กระทําต้องระวางโทษจําคุกตังแตสองปถึงสิบป และปรับตังแตสีหมืนบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๑๑","num":"211","text":"ผู้ใดประชุมในทประชุมอังยหรือซองโจร ผู้นันกระทําความ ผิดฐานเปนอังยหรือซองโจร เว้นแตผู้นันจะแสดงได้ว่า ได้ประชุมโดยไมรูว้ ่าเปนการประชุมของ อังยหรือซองโจร"},{"section":"มาตรา ๒๑๒","num":"212","text":"ผู้ใด (๑) จัดหาทประชุมหรือทพํานักให้แกอังยหรือซองโจร (๒) ชักชวนบุคคลให้เข้าเปนสมาชิกอังยหรือพรรคพวกซองโจร (๓) อุปการะอังยหรือซองโจรโดยให้ทรัพย์หรือโดยประการอืน หรือ (๔) ชวยจําหน่ายทรัพย์ทอังยหรือซองโจรได้มาโดยการกระทําความผิด ต้องระวางโทษเชนเดยวกับผู้กระทําความผิดฐานเปนอังยหรือซองโจร แล้วแตกรณี"},{"section":"มาตรา ๒๑๓","num":"213","text":"ถ้าสมาชิกอังยหรือพรรคพวกซองโจรคนหนึงคนใดได้กระทํา ความผิดตามความมุ่งหมายของอังยหรือซองโจรนัน สมาชิกอังยหรือพรรคพวกซองโจรทอยู่ ด้วยในขณะกระทําความผิด หรืออยู่ด้วยในทประชุมแต่ไม่ได้คัดค้านในการตกลงให้กระทํา ความผิดนัน และบรรดาหัวหน้า ผู้จัดการหรือผู้มตําแหนงหน้าทีในอังยหรือซองโจรนัน ต้อง ระวางโทษตามทบัญญัติไว้สําหรับความผิดนันทุกคน"},{"section":"มาตรา ๒๑๔","num":"214","text":"ผู้ใดประพฤติตนเปนปกติธุระเปนผู้จัดหาทพํานัก ทซ่อนเร้น หรือทประชุมให้บุคคลซึงตนรูว้ ่าเปนผู้กระทําความผิดทบัญญัติไว้ในภาค ๒ นต้องระวางโทษ จําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ ถ้าการกระทําความผิดนัน เปนการกระทําเพือชวยบิดา มารดา บุตร สามหรือ ภริยาของผู้กระทํา ศาลจะไมลงโทษก็ได้"},{"section":"มาตรา ๒๑๕","num":"215","text":"ผู้ใดมัวสุมกันตังแตสิบคนขึนไป ใช้กําลังประทุษร้ายขู่เข็ญ ว่าจะใช้กําลังประทุษร้าย หรือกระทําการอย่างหนึงอย่างใดให้เกิดการวุ่นวายขึนในบ้านเมือง ต้องระวางโทษจําคุกไม่เกินหกเดือน หรือปรับไม่เกินหนึงหมืนบาท หรือทังจําทังปรับ ถ้าผู้กระทําความผิดคนหนึงคนใดมอาวุธ บรรดาผู้ทกระทําความผิด ต้อง ระวางโทษจําคุกไม่เกินสองป หรือปรับไม่เกินสหมืนบาท หรือทังจําทังปรับ ถ้าผู้กระทําความผิดเปนหัวหน้า หรือเปนผู้มหน้าทสง ั การในการกระทําความ ผิดนัน ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๑๖","num":"216","text":"เมือเจ้าพนักงานสังผู้ทมว ั สุมเพือกระทําความผิดตาม"},{"section":"มาตรา ๒๑๗","num":"217","text":"ถึงมาตรา ๒๒๔ (๓) ความผิดเกยวกับเงินตรา ตามทบัญญัติไว้ในมาตรา ๒๔๐ ถึงมาตรา ๒๔๖ (๔) ความผิดเกยวกับเพศ ตามทบัญญัติไว้ในมาตรา ๒๗๖ ถึงมาตรา ๒๘๖ (๕) ความผิดตอชวิต ตามทบัญญัติไว้ในมาตรา ๒๘๘ ถึงมาตรา ๒๙๐ มาตรา ๒๙๒ ถึงมาตรา ๒๙๔ (๖) ความผิดตอร่างกาย ตามทบัญญัติไว้ในมาตรา ๒๙๕ ถึงมาตรา ๒๙๙ (๗) ความผิดตอเสรภาพ ตามทบัญญัติไว้ในมาตรา ๓๐๙ ถึงมาตรา ๓๒๐ (๘) ความผิดเกยวกับทรัพย์ ตามทบัญญัติไว้ในมาตรา ๓๓๔ ถึงมาตรา ๓๔๐"},{"section":"มาตรา ๒๑๘","num":"218","text":"ผู้ใดวางเพลิงเผาทรัพย์ดังตอไปนี (๑) โรงเรือน เรือ หรือแพทคนอยู่อาศัย (๒) โรงเรือน เรือหรือแพอันเปนทีเก็บหรือททําสินค้า (๓) โรงมหรสพหรือสถานทประชุม (๔) โรงเรือนอันเปนสาธารณสมบัติของแผนดิน เปนสาธารณสถาน หรือเปนทสําหรับประกอบพิธกรรมตามศาสนา (๕) สถานรถไฟ ท่าอากาศยานหรือทจอดรถหรือเรือสาธารณะ (๖) เรือกลไฟ หรือเรือยนต์ อันมระวางตังแตห้าตันขึนไป อากาศยาน หรือรถ ไฟทีใช้ในการขนสงสาธารณะ ต้องระวางโทษประหารชวิต จําคุกตลอดชวิต หรือจําคุกตังแตห้าปถึงยสิบป"},{"section":"มาตรา ๒๑๙","num":"219","text":"ผู้ใดตระเตรยมเพือกระทําความผิดดังกล่าวในมาตรา ๒๑๗ หรือมาตรา ๒๑๘ ต้องระวางโทษเชนเดยวกับพยายามกระทําความผิดนัน ๆ"},{"section":"มาตรา ๒๒๐","num":"220","text":"ผู้ใดกระทําให้เกิดเพลิงไหม้แกวัตถุใด ๆ แม้เปนของตนเอง จนน่า ๒๒๖","num":"226","text":"ผู้ใดกระทําด้วยประการใด ๆ แก่โรงเรือน อู่เรือ ทจอดรถ หรือเรือสาธารณะ ทุ่นทอดจอดเรือ สิงปลูกสร้าง เครือ งจักร เครือ งกล สายไฟฟาหรือสิงททําไว้ เพือปองกันอันตรายแกบุคคลหรือทรัพย์ จนน่าจะเปนเหตุให้เกิดอันตรายแกบุคคลอืน ต้อง ระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๒๗","num":"227","text":"ผู้ใดเปนผู้มวิชาชพในการออกแบบควบคุม หรือทําการ กอสร้าง ซอมแซมหรือรือ ถอน อาคารหรือสิงปลูกสร้างใด ๆ ไมปฏิบัติตามหลักเกณฑ์ หรือวิธการอันพึงกระทําการนัน ๆ โดยประการทน่าจะเปนเหตุให้เกิดอันตรายแกบุคคลอืน ต้องระวาง โทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๒๘","num":"228","text":"ผู้ใดกระทําด้วยประการใด ๆ เพือให้เกิดอุทกภัย หรือเพือให้ เกิดขัดข้องแกการใช้นาซึงเปนสาธารณูปโภค ถ้าการกระทํานันน่าจะเปนอันตรายแกบุคคลอืน หรือทรัพย์ของผู้อืน ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจํา ทังปรับ ถ้าการกระทําผิดดังกล่าวในวรรคแรกเปนเหตุให้เกิดอันตรายแกบุคคลอืนหรือ ทรัพย์ของผู้อืน ผู้กระทําต้องระวางโทษจําคุกตังแตหกเดือนถึงเจ็ดป และปรับตังแตหนึงหมืน บาทถึงหนึงแสนสหมืนบาท"},{"section":"มาตรา ๒๒๙","num":"229","text":"ผู้ใดกระทําด้วยประการใด ๆ ให้ทางสาธารณะ ประตูนา ทํานบ เขือน อันเปนสวนของทางสาธารณะ หรือทขึนลงของอากาศยาน อยู่ในลักษณะอันน่าจะ เปนเหตุให้เกิดอันตรายแกการจราจร ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสน บาท หรือทัง จําทัง ปรับ"},{"section":"มาตรา ๒๓๐","num":"230","text":"ผู้ใดเอาสิงใด ๆ กดขวางทางรถไฟหรือทางรถราง ทําให้ราง รถไฟหรือรางรถรางหลุด หลวมหรือเคลือนจากทหรือกระทําแก่เครือ งสัญญาณจนน่าจะเปน เหตุให้เกิดอันตรายแกการเดินรถไฟหรือรถราง ต้องระวางโทษจําคุกตังแตหกเดือนถึงเจ็ดป และปรับตังแตหนึงหมืนบาทถึงหนึงแสนสหมืนบาท"},{"section":"มาตรา ๒๓๑","num":"231","text":"ผู้ใดกระทําด้วยประการใด ๆ ให้ประภาคาร ทุ่น สัญญาณ หรือสิงอืนใด ซึงจัดไว้เปนสัญญาณเพือความปลอดภัยในการจราจรทางบก การเดินเรือหรือ การเดินอากาศ อยู่ในลักษณะอันน่าจะเปนเหตุให้เกิดอันตรายแกการจราจรทางบก การเดินเรือ หรือการเดินอากาศ ต้องระวางโทษจําคุกตังแตหกเดือนถึงเจ็ดป และปรับตังแตหนึงหมืนบาท ถึงหนึงแสนสหมืนบาท"},{"section":"มาตรา ๒๓๒","num":"232","text":"ผู้ใดกระทําด้วยประการใด ๆ ให้ยานพาหนะดังตอไปนอยู่ ในลักษณะอันน่าจะเปนเหตุให้เกิดอันตรายแกบุคคล (๑) เรือเดินทะเล อากาศยาน รถไฟหรือรถราง (๒) รถยนต์ทีใช้สําหรับการขนสงสาธารณะ หรือ (๓) เรือกลไฟ หรือเรือยนต์อันมระวางตังแตห้าตันขึนไป ทีใช้สําหรับการขนสง สาธารณะ ต้องระวางโทษจําคุกตังแตหกเดือนถึงเจ็ดป และปรับตังแตหนึงหมืนบาทถึง หนึงแสนสหมืนบาท"},{"section":"มาตรา ๒๓๓","num":"233","text":"ผู้ใดใช้ยานพาหนะรับจ้างขนสงคนโดยสาร เมือยานพาหนะ นันมลักษณะหรือมการบรรทุกจนน่าจะเปนอันตรายแกบุคคลในยานพาหนะนัน ต้องระวางโทษ จําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๓๔","num":"234","text":"ผู้ใดกระทําด้วยประการใด ๆ แกสง ิ ทีใช้ในการผลิต ในการสง พลังงานไฟฟาหรือในการสงนา จนเปนเหตุให้ประชาชนขาดความสะดวก หรือน่าจะเปนเหตุให้ เกิดอันตรายแกประชาชน ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือ ทังจําทังปรับ"},{"section":"มาตรา ๒๓๕","num":"235","text":"ผู้ใดกระทําการด้วยประการใด ๆ ให้การสือสารสาธารณะ ทางไปรษณย์ ทางโทรเลข ทางโทรศัพท์ หรือทางวิทยุขัดข้อง ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๓๖","num":"236","text":"ผู้ใดปลอมปนอาหาร ยาหรือเครือ งอุปโภคบริโภคอืนใด เพือ บุคคลอืนเสพหรือใช้ และการปลอมปนนันน่าจะเปนเหตุให้เกิดอันตรายแกสุขภาพ หรือจําหน่าย หรือเสนอขาย สิงเชนว่านันเพือบุคคลเสพหรือใช้ ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่ เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๓๗","num":"237","text":"ผู้ใดเอาของทมีพิษหรือสิงอืนทน่าจะเปนอันตรายแกสุขภาพ เจือลงในอาหาร หรือในนาซึงอยู่ในบอสระหรือทขังนาใด ๆ และอาหารหรือนานันได้มอยู่หรือ จัดไว้เพือประชาชนบริโภค ต้องระวางโทษจําคุกตังแตหกเดือนถึงสิบป และปรับตังแตหนึงหมืน บาทถึงสองแสนบาท"},{"section":"มาตรา ๒๓๘","num":"238","text":"ถ้าการกระทําความผิดตามมาตรา ๒๒๖ ถึงมาตรา ๒๓๗ เปนเหตุให้บุคคลอืนถึงแกความตาย ผู้กระทําต้องระวางโทษจําคุกตลอดชวิต หรือจําคุกตังแตห้าปถึงยสิบป และปรับตังแตหนึงแสนบาทถึงสีแสนบาท ถ้าเปนเหตุให้บุคคลอืนรับอันตรายสาหัส ผู้กระทําต้องระวางโทษจําคุกตังแตหนึงปถึงสิบป และปรับตังแตสองหมืนบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๓๙","num":"239","text":"ถ้าการกระทําดังกล่าวในมาตรา ๒๒๖ ถึงมาตรา ๒๓๗ เปน การกระทําโดยประมาท และใกล้จะเปนอันตรายแกชีวิตของบุคคลอืน ผู้กระทําต้องระวางโทษ จําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือทังจําทังปรับ ลักษณะ ๗ ความผิดเกยวกับการปลอมและการแปลง หมวด ๑ ความผิดเกยวกับเงินตรา"},{"section":"มาตรา ๒๔๐","num":"240","text":"ผู้ใดทําปลอมขึนซึงเงินตรา ไมว่าจะปลอมขึนเพือให้เปน เหรยญกษาปณ์ ธนบัตรหรือสิงอืนใดซึงรัฐบาลออกใช้หรือให้อํานาจให้ออกใช้ หรือทําปลอมขึน ซึงพันธบัตรรัฐบาลหรือใบสําคัญสําหรับรับดอกเบยพันธบัตรนัน ๆ ผู้นันกระทําความผิดฐาน ปลอมเงินตรา ต้องระวางโทษจําคุกตลอดชวิต หรือจําคุกตังแตสิบปถึงยสิบป และปรับตังแตสองแสนบาทถึงสีแสนบาท"},{"section":"มาตรา ๒๔๑","num":"241","text":"ผู้ใดแปลงเงินตรา ไมว่าจะเปนเหรยญกษาปณ์ ธนบัตรหรือ สิงอืนใดซึงรัฐบาลออกใช้หรือให้อํานาจให้ออกใช้ หรือแปลงพันธบัตรรัฐบาลหรือใบสําคัญ สําหรับรับดอกเบยพันธบัตรนัน ๆ ให้ผิดไปจากเดิม เพือให้ผู้อืนเชือว่ามมูลค่าสูงกว่าจริง ผู้นัน กระทําความผิดฐานแปลงเงินตรา ต้องระวางโทษจําคุกตลอดชวิต หรือจําคุกตังแตห้าปถึงยสิบ ป และปรับตังแตหนึงแสนบาทถึงสีแสนบาท"},{"section":"มาตรา ๒๔๒","num":"242","text":"ผู้ใดกระทําโดยทุจริตให้เหรยญกษาปณ์ซึงรัฐบาลออกใช้มนาหนักลดลง ต้องระวางโทษจําคุกไม่เกินเจ็ดป และปรับไม่เกินหนึงแสนสหมืนบาท ผู้ใดนําเข้าในราชอาณาจักร นําออกใช้หรือมีไว้เพือนําออกใช้ซึง เหรยญกษาปณ์ทมีผู้กระทําโดยทุจริตให้นาหนักลดลงตามความในวรรคแรก ต้องระวางโทษ เชนเดยวกัน"},{"section":"มาตรา ๒๔๓","num":"243","text":"ผู้ใดนําเข้าในราชอาณาจักรซึงสิงใด ๆ อันเปนของปลอมตาม"},{"section":"มาตรา ๒๔๔","num":"244","text":"ผู้ใดมีไว้เพือนําออกใช้ซึงสิงใด ๆ อันตนได้มาโดยรูว้ ่าเปน ของปลอมตามมาตรา ๒๔๐ หรือของแปลงตามมาตรา ๒๔๑ ต้องระวางโทษจําคุกตังแตหนึงป ถึงสิบห้าป และปรับตังแตสองหมืนบาทถึงสามแสนบาท"},{"section":"มาตรา ๒๔๕","num":"245","text":"ผู้ใดได้มาซึงสิงใด ๆ โดยไมรูว้ ่าเปนของปลอมตามมาตรา ๒๔๐ หรือของแปลงตามมาตรา ๒๔๑ ถ้าตอมารูว้ ่าเปนของปลอมหรือของแปลงเชนว่านัน ยังขืน นําออกใช้ ต้องระวางโทษจําคุกไม่เกินสิบป หรือปรับไม่เกินสองแสนบาท หรือทัง จําทัง ปรับ"},{"section":"มาตรา ๒๔๖","num":"246","text":"ผู้ใดทําเครือ งมือหรือวัตถุสําหรับปลอมหรือแปลงเงินตรา ไมว่าจะเปนเหรยญกษาปณ์ ธนบัตรหรือสิงใด ๆ ซึงรัฐบาลออกใช้หรือให้อํานาจให้ออกใช้ หรือ สําหรับปลอมหรือแปลงพันธบัตรรัฐบาลหรือใบสําคัญสําหรับรับดอกเบยพันธบัตรนัน ๆ หรือมี เครือ งมือหรือวัตถุเชนว่านันเพือใช้ในการปลอมหรือแปลง ต้องระวางโทษจําคุกตังแตห้าปถึง สิบห้าป และปรับตังแตหนึงแสนบาทถึงสามแสนบาท"},{"section":"มาตรา ๒๔๗","num":"247","text":"ถ้าการกระทําดังกล่าวในหมวดนีเปนการกระทําเกยวกับ เงินตรา ไมว่าจะเปนเหรยญกษาปณ์ ธนบัตรหรือสิงอืนใดซึงรัฐบาลต่างประเทศออกใช้หรือให้ อํานาจให้ออกใช้ หรือเกยวกับพันธบัตรรัฐบาลต่างประเทศหรือใบสําคัญสําหรับรับดอกเบย พันธบัตรนัน ผู้กระทําต้องระวางโทษกึงหนึงของโทษทบัญญัติไว้ในมาตรานัน ๆ"},{"section":"มาตรา ๒๔๘","num":"248","text":"ถ้าผู้กระทําความผิดตามมาตรา ๒๔๐ มาตรา ๒๔๑ หรือมาตรา ๒๔๗ ได้กระทําความผิดตามมาตราอืนทบัญญัติไว้ในหมวดนอันเกยวกับสิง ทตนปลอมหรือ แปลงนันด้วย ให้ลงโทษผู้นันตามมาตรา ๒๔๐ มาตรา ๒๔๑ หรือมาตรา ๒๔๗ แตกระทงเดยว"},{"section":"มาตรา ๒๔๙","num":"249","text":"ผู้ใดทําบัตรหรือโลหะธาตุอย่างใด ๆ ให้มลักษณะและขนาด คล้ายคลึงกับเงินตรา ไมว่าจะเปนเหรยญกษาปณ์ ธนบัตรหรือสิงใด ๆ ซึงรัฐบาลออกใช้หรือให้ อํานาจให้ออกใช้หรือพันธบัตรรัฐบาล หรือใบสําคัญสําหรับรับดอกเบยพันธบัตรนัน ๆ หรือ จําหน่ายบัตรหรือโลหธาตุเชนว่านัน ต้องระวางโทษจําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืน บาท หรือทังจําทังปรับ ถ้าการจําหน่ายบัตร หรือโลหะธาตุดังกล่าวในวรรคแรกเปนการจําหน่าย โดย การนําออกใช้ดังเชนสิงใด ๆ ทกล่าวในวรรคแรก ผู้กระทําต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ หมวด ๒ ความผิดเกยวกับดวงตรา แสตมปและตัว"},{"section":"มาตรา ๒๕๐","num":"250","text":"ผู้ใดทําปลอมขึนซึงดวงตราแผนดิน รอยตราแผนดิน หรือ พระปรมาภิไธย ต้องระวางโทษจําคุกตังแตห้าปถึงยสิบป และปรับตังแตหนึงแสนบาทถึงสีแสน บาท”"},{"section":"มาตรา ๒๕๑","num":"251","text":"ซึงเปนดวงตราหรือรอยตราอันแท้จริง และใช้ดวงตราหรือรอยตรานันโดยมิชอบ ในประการทน่าจะทําให้ผู้อืนหรือประชาชนเสยหาย ต้องระวางโทษสองในสามสวนของโทษทบัญญัติไว้ในมาตรา ๒๕๐ หรือมาตรา ๒๕๑ นัน"},{"section":"มาตรา ๒๕๒","num":"252","text":"ผู้ใดใช้ดวงตรา รอยตราหรือพระปรมาภิไธย ดังกล่าวมาใน"},{"section":"มาตรา ๒๕๓","num":"253","text":"ผู้ใดได้มาซึงดวงตราหรือรอยตราดังกล่าวในมาตรา ๒๕๐ หรือ"},{"section":"มาตรา ๒๕๔","num":"254","text":"ผู้ใดทําปลอมขึนซึงแสตมปรฐ ั บาล ซึงใช้สําหรับการไป รษณย์ การภาษอากรหรือการเก็บค่าธรรมเนยม หรือแปลงแสตมปรฐ ั บาล ซึงใช้ในการเชนว่า นันให้ผิดไปจากเดิม เพือให้ผู้อืนเชือว่ามมูลค่าสูงกว่าจริง ต้องระวางโทษจําคุกตังแตหนึงปถึง เจ็ดป และปรับตังแตสองหมืนบาทถึงหนึงแสนสหมืนบาท"},{"section":"มาตรา ๒๕๕","num":"255","text":"ผู้ใดนําเข้าในราชอาณาจักรซึงดวงตราแผนดิน รอยตรา แผนดิน พระปรมาภิไธย ดวงตราหรือรอยตราของทบวงการเมือง ขององค์การสาธารณะ หรือ ของเจ้าพนักงาน หรือแสตมปซึงระบุไว้ในมาตรา ๒๕๐ มาตรา ๒๕๑ หรือมาตรา ๒๕๔ อันเปน ของปลอม หรือของแปลง ต้องระวางโทษจําคุกตังแตหนึงปถึงสิบป และปรับตังแตสองหมืน บาทถึงสองแสนบาท"},{"section":"มาตรา ๒๕๖","num":"256","text":"ผู้ใดลบ ถอนหรือกระทําด้วยประการใด ๆ แก่แสตมป รัฐบาลซึงระบุไว้ในมาตรา ๒๕๔ และมีเครือ งหมายหรือการกระทําอย่างใดแสดงว่าใช้ไม่ได้แล้ว เพือให้ใช้ได้อก ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทัง ปรับ"},{"section":"มาตรา ๒๕๗","num":"257","text":"ผู้ใดใช้ ขาย เสนอขาย แลกเปลยนหรือเสนอแลกเปลยนซึง แสตมปอันเกิดจากการกระทําดังกล่าวในมาตรา ๒๕๔ หรือมาตรา ๒๕๖ ไมว่าการกระทําตาม มาตรานัน ๆ จะได้กระทําภายในหรือนอกราชอาณาจักร ต้องระวางโทษจําคุกไม่เกินสามป หรือ ปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๕๘","num":"258","text":"ผู้ใดทําปลอมขึนซึงตัวโดยสารซึงใช้ในการขนสงสาธารณะ หรือแปลงตัวโดยสารซึงใช้ในการขนสงสาธารณะให้ผิดไปจากเดิม เพือให้ผู้อืนเชือว่ามมูลค่าสูง กว่าจริง หรือลบ ถอน หรือกระทําด้วยประการใด ๆ แกตัวเชนว่านันซึงมีเครือ งหมายหรือการ กระทําอย่างใด แสดงว่าใช้ไม่ได้แล้วเพือให้ใช้ได้อก ต้องระวางโทษจําคุกไม่เกินสองป หรือปรับ ไม่เกินสหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๕๙","num":"259","text":"ถ้าการกระทําตามมาตรา ๒๕๘ เปนการกระทําเกยวกับตัวทจําหน่ายแกประชาชนเพือผ่านเข้าสถานทีใด ๆ ผู้กระทําต้องระวางโทษจําคุกไม่เกินหนึงป หรือ ปรับไม่เกินสองหมืนบาท หรือทัง จําทัง ปรับ"},{"section":"มาตรา ๒๖๐","num":"260","text":"ผู้ใดใช้ ขาย เสนอขาย แลกเปลยนหรือเสนอแลกเปลยนซึง ตัวอันเกิดจากการกระทําดังกล่าวในมาตรา ๒๕๘ หรือมาตรา ๒๕๙ ต้องระวางโทษจําคุกไม่ เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๖๑","num":"261","text":"ผู้ใดทําเครือ งมือหรือวัตถุสําหรับปลอมหรือแปลงสิงใด ๆ ซึงระบุไว้ในมาตรา ๒๕๔ มาตรา ๒๕๘ หรือมาตรา ๒๕๙ หรือมีเครือ งมือหรือวัตถุเชนว่านันเพือ ใช้ในการปลอมหรือแปลง ต้องระวางโทษจําคุกไม่เกินสองป หรือปรับไม่เกินสหมืนบาท หรือ ทังจําทังปรับ"},{"section":"มาตรา ๒๖๒","num":"262","text":"ถ้าการกระทําดังกล่าวในมาตรา ๒๕๔ มาตรา ๒๕๖ มาตรา ๒๕๗ หรือมาตรา ๒๖๑ เปนการกระทําเกยวกับแสตมปรฐ ั บาลต่างประเทศ ผู้กระทําต้องระวาง โทษกึงหนึงของโทษทบัญญัติไว้ในมาตรานัน ๆ"},{"section":"มาตรา ๒๖๓","num":"263","text":"ถ้าผู้กระทําความผิดตามมาตรา ๒๕๐ มาตรา ๒๕๑ มาตรา ๒๕๔ มาตรา ๒๕๖ มาตรา ๒๕๘ มาตรา ๒๕๙ หรือมาตรา ๒๖๒ ได้กระทําความผิดตามมาตรา อืนทบัญญัติไว้ในหมวดนอันเกยวกับสิงทีเกิดจากการกระทําความผิดนันด้วย ให้ลงโทษผู้นัน ตามมาตรา ๒๕๐ มาตรา ๒๕๑ มาตรา ๒๕๔ มาตรา ๒๕๖ มาตรา ๒๕๘ มาตรา ๒๕๙ หรือ"},{"section":"มาตรา ๒๖๔","num":"264","text":"ผู้ใดทําเอกสารปลอมขึนทังฉบับหรือแตส่วนหนึงสวนใด เติมหรือตัดทอนข้อความ หรือแก้ไขด้วยประการใด ๆ ในเอกสารทีแท้จริง หรือประทับ ตราปลอม หรือลงลายมือชือปลอมในเอกสาร โดยประการทน่าจะเกิดความเสยหายแกผู้อืนหรือ ประชาชน ถ้าได้กระทําเพือให้ผู้หนึงผู้ใดหลงเชือว่าเปนเอกสารทีแท้จริง ผู้นันกระทําความ ผิดฐานปลอมเอกสาร ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจํา ทังปรับ ผู้ใดกรอกข้อความลงในแผนกระดาษหรือวัตถุอืนใดซึงมลายมือชือของผู้อืน โดยไม่ได้รบ ั ความยินยอม หรือโดยฝาฝนคําสังของผู้อืนนัน ถ้าได้กระทําเพือนําเอาเอกสารนัน ไปใช้ในกิจการทอาจเกิดเสยหายแกผู้หนึงผู้ใดหรือประชาชน ให้ถือว่าผู้นันปลอมเอกสาร ต้อง ระวางโทษเชนเดยวกัน"},{"section":"มาตรา ๒๖๕","num":"265","text":"ผู้ใดปลอมเอกสารสิทธิหรือเอกสารราชการ ต้องระวางโทษ จําคุกตังแตหกเดือนถึงห้าป และปรับตังแตหนึงหมืนบาทถึงหนึงแสนบาท"},{"section":"มาตรา ๒๖๖","num":"266","text":"แก้ไขเพิมเติมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับที ๑๒) พ.ศ. ๒๕๓๕ [197] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [198] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [199] หมวด ๔ ความผิดเกยวกับบัตรอิเล็กทรอนิกส์ มาตรา ๒๖๙/๑ ถึงมาตรา ๒๖๙/๗ เพิม โดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับที ๑๗) พ.ศ. ๒๕๔๗ [200]"},{"section":"มาตรา ๒๖๗","num":"267","text":"ผู้ใดแจ้งให้เจ้าพนักงาน ผู้กระทําการตามหน้าทจดข้อความ อันเปนเท็จลงในเอกสารมหาชนหรือเอกสารราชการ ซึงมวัตถุประสงค์สําหรับใช้เปนพยาน หลักฐานโดยประการทน่าจะเกิดความเสยหายแกผู้อืนหรือประชาชน ต้องระวางโทษจําคุกไม่ เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๖๘","num":"268","text":"ผู้ใดใช้หรืออ้างเอกสารอันเกิดจากการกระทําความผิดตาม"},{"section":"มาตรา ๒๖๙","num":"269","text":"ผู้ใดในการประกอบการงานในวิชาแพทย์ กฎหมาย บัญชหรือวิชาชพอืนใด ทําคํารับรองเปนเอกสารอันเปนเท็จ โดยประการทน่าจะเกิดความเสยหายแกผู้อืนหรือประชาชน ต้องระวางโทษจําคุกไม่เกินสองป หรือปรับไม่เกินสหมืนบาท หรือทังจําทัง ปรับ ผู้ใดโดยทุจริตใช้หรืออ้างคํารับรองอันเกิดจากการกระทําความผิดตามวรรค แรก ต้องระวางโทษเชนเดยวกัน หมวด ๔ ความผิดเกยวกับบัตรอิเล็กทรอนิกส์[199]"},{"section":"มาตรา ๒๖๙/๑","num":"269/1","text":"ผู้ใดทําบัตรอิเล็กทรอนิกส์ปลอมขึนทังฉบับหรือแตส่วน หนึงสวนใด เติมหรือตัดทอนข้อความ หรือแก้ไขด้วยประการใด ๆ ในบัตรอิเล็กทรอนิกส์ที แท้จริง โดยประการทน่าจะเกิดความเสยหายแกผู้อืนหรือประชาชน ถ้าได้กระทําเพือให้ผู้หนึงผู้ ใดหลงเชือว่าเปนบัตรอิเล็กทรอนิกส์ทีแท้จริงหรือเพือใช้ประโยชน์อย่างหนึงอย่างใด ผู้นัน กระทําความผิดฐานปลอมบัตรอิเล็กทรอนิกส์ ต้องระวางโทษจําคุกตังแตหนึงปถึงห้าป และ ปรับตังแตสองหมืนบาทถึงหนึงแสนบาท"},{"section":"มาตรา ๒๖๙/๑๐","num":"269/10","text":"ผู้ใดนําเข้าในหรือสงออกไปนอกราชอาณาจักรซึง หนังสือเดินทางปลอมตามมาตรา ๒๖๙/๘ ต้องระวางโทษจําคุกตังแตหนึงปถึงสิบป และปรับ ตังแตสองหมืนบาทถึงสองแสนบาท ถ้าการกระทําความผิดตามวรรคหนึงได้กระทําไปเพือจําหน่าย ต้องระวาง โทษจําคุกตังแตสามปถึงยสิบป และปรับตังแตหกหมืนบาทถึงสีแสนบาท"},{"section":"มาตรา ๒๖๙/๑๑","num":"269/11","text":"ผู้ใดใช้หนังสือเดินทางของผู้อืนโดยมิชอบ ในประการทน่าจะกอให้เกิดความเสยหายแกผู้อืนหรือประชาชน ต้องระวางโทษจําคุกไม่เกินสิบป และปรับ ไม่เกินสองแสนบาท ผู้ใดจัดหาหนังสือเดินทางให้ผู้กระทําความผิดตามวรรคหนึง ต้องระวางโทษ เชนเดยวกัน"},{"section":"มาตรา ๒๖๙/๑๒","num":"269/12","text":"ผู้ใดทําปลอมขึนซึงดวงตรา รอยตรา หรือแผนปะตรวจ ลงตราอันใช้ในการตรวจลงตราสําหรับการเดินทางระหว่างประเทศ ต้องระวางโทษจําคุกตังแตหนึงปถึงสิบป และปรับตังแตสองหมืนบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๖๙/๑๓","num":"269/13","text":"ผู้ใดใช้ดวงตรา รอยตรา หรือแผนปะตรวจลงตราททํา ปลอมขึนตามมาตรา ๒๖๙/๑๒ ต้องระวางโทษจําคุกตังแตหนึงปถึงสิบป และปรับตังแตสอง หมืนบาทถึงสองแสนบาท ถ้าผู้กระทําความผิดตามวรรคหนึงเปนผู้ปลอมซึงดวงตรา รอยตรา หรือ แผนปะตรวจลงตราตามมาตรา ๒๖๙/๑๒ ให้ลงโทษตามมาตรานีแตกระทงเดยว"},{"section":"มาตรา ๒๖๙/๑๔","num":"269/14","text":"ผู้ใดนําเข้าในหรือสงออกไปนอกราชอาณาจักรซึง ดวงตรา รอยตรา หรือแผนปะตรวจลงตราซึงระบุไว้ในมาตรา ๒๖๙/๑๒ อันเปนของปลอม ต้องระวางโทษจําคุกตังแตหนึงปถึงสิบป และปรับตังแตสองหมืนบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๖๙/๑๕","num":"269/15","text":"ผู้ใดใช้ดวงตรา รอยตรา หรือแผนปะตรวจลงตราอัน แท้จริงทีใช้ในการตรวจลงตราสําหรับการเดินทางระหว่างประเทศโดยมิชอบ ในประการทน่าจะ กอให้เกิดความเสยหายแกผู้อืนหรือประชาชน ต้องระวางโทษสองในสามสวนของโทษทบัญญัติ ไว้ในมาตรา ๒๖๙/๑๓ ลักษณะ ๘ ความผิดเกยวกับการค้า"},{"section":"มาตรา ๒๖๙/๒","num":"269/2","text":"ผู้ใดทําเครือ งมือหรือวัตถุสําหรับปลอมหรือแปลง หรือ สําหรับให้ได้ข้อมูลในการปลอมหรือแปลงสิงใด ๆ ซึงระบุไว้ในมาตรา ๒๖๙/๑ หรือมีเครือ งมือ หรือวัตถุเชนว่านัน เพือใช้หรือให้ได้ข้อมูลในการปลอมหรือแปลง ต้องระวางโทษจําคุกตังแตหนึงปถึงห้าป และปรับตังแตสองหมืนบาทถึงหนึงแสนบาท"},{"section":"มาตรา ๒๖๙/๓","num":"269/3","text":"ผู้ใดนําเข้าในหรือสงออกไปนอกราชอาณาจักรซึงสิงใด ๆ ตามมาตรา ๒๖๙/๑ หรือมาตรา ๒๖๙/๒ ต้องระวางโทษจําคุกตังแตสามปถึงสิบป และ ปรับตังแตหกหมืนบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๖๙/๔","num":"269/4","text":"ผู้ใดใช้หรือมีไว้เพือใช้ซึงสิงใด ๆ ตามมาตรา ๒๖๙/๑ อัน ได้มาโดยรูว้ ่าเปนของททําปลอมหรือแปลงขึน ต้องระวางโทษจําคุกตังแตหนึงปถึงเจ็ดป หรือ ปรับตังแตสองหมืนบาทถึงหนึงแสนสหมืนบาท หรือทังจําทังปรับ ผู้ใดจําหน่ายหรือมีไว้เพือจําหน่ายซึงสิงใด ๆ ททําปลอมหรือแปลงขึนตาม"},{"section":"มาตรา ๒๖๙/๕","num":"269/5","text":"ผู้ใดใช้บัตรอิเล็กทรอนิกส์ของผู้อืนโดยมิชอบ ในประการ ทน่าจะกอให้เกิดความเสยหายแกผู้อืนหรือประชาชน ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับ ไม่เกินหนึงแสนบาท หรือทัง จําทัง ปรับ"},{"section":"มาตรา ๒๖๙/๖","num":"269/6","text":"ผู้ใดมีไว้เพือนําออกใช้ซึงบัตรอิเล็กทรอนิกส์ของผู้อืน โดยมิชอบตามมาตรา ๒๖๙/๕ ในประการทน่าจะกอให้เกิดความเสยหายแกผู้อืนหรือประชาชน ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๖๙/๗","num":"269/7","text":"ถ้าการกระทําดังกล่าวในหมวดนี เปนการกระทําเกยว กับบัตรอิเล็กทรอนิกส์ทผู้ออกได้ออกให้แกผู้มสิทธิใช้ เพือใช้ประโยชน์ในการชําระค่าสินค้า ค่า บริการหรือหนอืนแทนการชําระด้วยเงินสด หรือใช้เบิกถอนเงินสด ผู้กระทําต้องระวางโทษหนัก กว่าทบัญญัติไว้ในมาตรานัน ๆ กึงหนึง หมวด ๕ ความผิดเกยวกับหนังสือเดินทาง[207]"},{"section":"มาตรา ๒๖๙/๘","num":"269/8","text":"ต้องระวางโทษจําคุกตังแตหนึงปถึงสิบป และปรับตังแตสองหมืนบาทถึงสอง แสนบาท ผู้ใดจําหน่ายหรือมีไว้เพือจําหน่ายซึงหนังสือเดินทางปลอมตามมาตรา ๒๖๙/๘ ต้องระวางโทษจําคุกตังแตสามปถึงยสิบป และปรับตังแตหกหมืนบาทถึงสีแสนบาท การมหนังสือเดินทางปลอมตามมาตรา ๒๖๙/๘ จํานวนตังแตสองฉบับขึนไป ให้สันนิษฐานไว้กอนว่ามีไว้เพือจําหน่าย ถ้าผู้กระทําความผิดตามวรรคหนึงหรือวรรคสองเปนผู้ปลอมซึงหนังสือ เดินทาง ตามมาตรา ๒๖๙/๘ ให้ลงโทษตามมาตรานีแตกระทงเดยว"},{"section":"มาตรา ๒๖๙/๙","num":"269/9","text":"เพิม โดยพระราชบัญญัติแก้ไขเพิม เติมประมวลกฎหมายอาญา (ฉบับที ๑๘) พ.ศ. ๒๕๕๐ [210]"},{"section":"มาตรา ๒๗๐","num":"270","text":"ผู้ใดใช้หรือมีไว้เพือใช้ซึงเครือ งชัง เครือ งตวง หรือเครือ งวัด ทผิดอัตราเพือเอาเปรยบในการค้า หรือมีเครือ งเชนว่านันไว้เพือขาย ต้องระวางโทษจําคุกไม่ เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๗๑","num":"271","text":"แก้ไขเพิมเติมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับที ๔) พ.ศ. ๒๕๒๒ [218] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๘ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [219] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [220] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [221] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [222]"},{"section":"มาตรา ๒๗๒","num":"272","text":"ผู้ใด (๑) เอาชือ รูป รอยประดิษฐ์หรือข้อความใด ๆ ในการประกอบการค้าของผู้อืน มาใช้ หรือทําให้ปรากฏทสินค้า หบ หอ วัตถุทีใช้หุ้มหอ แจ้งความ รายการแสดงราคา จดหมาย เกยวกับการค้าหรือสิงอืนทํานองเดยวกัน เพือให้ประชาชนหลงเชือว่าเปนสินค้าหรือการค้าของ ผู้อืนนัน (๒) เลยนปาย หรือสิงอืนทํานองเดยวกันจนประชาชนน่าจะหลงเชือว่าสถานทการค้าของตนเปนสถานทการค้าของผู้อืนทตังอยู่ใกล้เคยง (๓) ไขข่าวแพรหลายซึงข้อความเท็จเพือให้เสยความเชือถือในสถานทการค้า สินค้าอุตสาหกรรมหรือพาณิชย์การของผู้หนึงผู้ใด โดยมุ่งประโยชน์แกการค้าของตน ต้องระวางโทษจําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือทังจําทัง ปรับ ความผิดตามมาตรานีเปนความผิดอันยอมความได้"},{"section":"มาตรา ๒๗๓","num":"273","text":"ผู้ใดปลอมเครือ งหมายการค้าของผู้อืนซึงได้จดทะเบยน แล้ว ไมว่าจะได้จดทะเบยนภายในหรือนอกราชอาณาจักร ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทัง จําทัง ปรับ"},{"section":"มาตรา ๒๗๔","num":"274","text":"ผู้ใดเลยนเครือ งหมายการค้าของผู้อืนซึงได้จดทะเบยนแล้ว ไมว่าจะได้จดทะเบยนภายในหรือนอกราชอาณาจักร เพือให้ประชาชนหลงเชือว่าเปน เครือ งหมายการค้าของผู้อืนนัน ต้องระวางโทษจําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืน บาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๗๕","num":"275","text":"ผู้ใดนําเข้าในราชอาณาจักร จําหน่ายหรือเสนอจําหน่าย ซึง สินค้าอันเปนสินค้าทมีชือ รูป รอยประดิษฐ์หรือข้อความใด ๆ ดังบัญญัติไว้ในมาตรา ๒๗๒ (๑) หรือสินค้าอันเปนสินค้าทมีเครือ งหมายการค้าปลอมหรือเลยนเครือ งหมายการค้าของผู้อืน ตามความในมาตรา ๒๗๓ หรือมาตรา ๒๗๔ ต้องระวางโทษดังทบัญญัติไว้ในมาตรานัน ๆ ลักษณะ ๙ ความผิดเกยวกับเพศ"},{"section":"มาตรา ๒๗๖","num":"276","text":"ผู้ใดขมขืนกระทําชําเราผู้อืนโดยขู่เข็ญด้วยประการใด ๆ โดยใช้กําลังประทุษร้าย โดยผู้อืนนันอยู่ในภาวะทีไมสามารถขัดขืนได้ หรือโดยทําให้ผู้อืนนัน เข้าใจผิดว่าตนเปนบุคคลอืน ต้องระวางโทษจําคุกตังแตสีปถึงยสิบป และปรับตังแต่แปดหมืน บาทถึงสีแสนบาท ถ้าการกระทําความผิดตามวรรคหนึง ได้กระทําโดยทําให้ผู้ถูกกระทําเข้าใจว่า ผู้กระทํามอาวุธปนหรือวัตถุระเบิด ต้องระวางโทษจําคุกตังแต่เจ็ดปถึงยสิบป และปรับตังแตหนึงแสนสหมืนบาทถึงสีแสนบาท ถ้าการกระทําความผิดตามวรรคหนึง ได้กระทําโดยมอาวุธปนหรือวัตถุระเบิด หรือโดยใช้อาวุธ หรือโดยรวมกระทําความผิดด้วยกันอันมลักษณะเปนการโทรมหญิงหรือ กระทํากับชายในลักษณะเดยวกัน ต้องระวางโทษจําคุกตังแตสิบห้าปถึงยสิบป และปรับตังแตสามแสนบาทถึงสีแสนบาท หรือจําคุกตลอดชวิต ถ้าการกระทําความผิดตามวรรคหนึง เปนการกระทําความผิดระหว่างคู่สมรส"},{"section":"มาตรา ๒๗๗","num":"277","text":"ผู้ใดกระทําชําเราเด็กอายุยังไม่เกินสิบห้าปซึงมิใชภริยา หรือสามของตน โดยเด็กนันจะยินยอมหรือไมก็ตาม ต้องระวางโทษจําคุกตังแตห้าปถึงยสิบป และปรับตังแตหนึงแสนบาทถึงสีแสนบาท ถ้าการกระทําความผิดตามวรรคหนึง เปนการกระทําแก่เด็กอายุยังไม่เกินสิบ สามป ต้องระวางโทษจําคุกตังแต่เจ็ดปถึงยสิบป และปรับตังแตหนึงแสนสหมืนบาทถึงสีแสน บาท หรือจําคุกตลอดชวิต ถ้าการกระทําความผิดตามวรรคหนึงหรือวรรคสอง ได้กระทําโดยทําให้ผู้ถูก กระทําเข้าใจว่าผู้กระทํามอาวุธปนหรือวัตถุระเบิด ต้องระวางโทษจําคุกตังแตสิบปถึงยสิบป และปรับตังแตสองแสนบาทถึงสีแสนบาท หรือจําคุกตลอดชวิต ถ้าการกระทําความผิดตามวรรคหนึงหรือวรรคสอง ได้กระทําโดยมอาวุธปน หรือวัตถุระเบิด หรือโดยใช้อาวุธ หรือโดยรวมกระทําความผิดด้วยกันอันมลักษณะเปนการ โทรมเด็กหญิงหรือกระทํากับเด็กชายในลักษณะเดยวกัน ต้องระวางโทษจําคุ"},{"section":"มาตรา ๒๗๗ ทวิ","num":"277 ทวิ","text":"มาตรา ๒๗๗ ตรมาตรา ๒๗๘ มาตรา ๒๗๙ มาตรา ๒๘๐ มาตรา ๒๘๒ หรือมาตรา ๒๘๓ เปนการกระทําแกบุพการผู้สืบสันดาน พน้องรวมบิดามารดาหรือรวมแตบิดา หรือมารดา ญาติสืบสายโลหิต ศิษย์ซึงอยู่ในความดูแล ผู้อยู่ในความควบคุมตามหน้าทราชการ ผู้อยู่ในความปกครอง ในความพิทักษ์ หรือในความอนุบาล หรือผู้อยู่ภายใต้อํานาจด้วยประการ อืนใด ผู้กระทําต้องระวางโทษหนักกว่าทบัญญัติไว้ในมาตรานัน ๆ หนึงในสาม"},{"section":"มาตรา ๒๗๗ ตรี","num":"277 ตรี","text":"ถ้าการกระทําความผิดตามมาตรา ๒๗๖ วรรคสาม หรือมาตรา ๒๗๗ วรรคสี เปนเหตุให้ผู้ถูกกระทํา (๑) รับอันตรายสาหัส ผู้กระทําต้องระวางโทษประหารชวิต หรือจําคุกตลอด ชวิต (๒) ถึงแกความตาย ผู้กระทําต้องระวางโทษประหารชวิต"},{"section":"มาตรา ๒๗๘","num":"278","text":"หรือมาตรา ๒๗๙ ได้บันทึกภาพหรือเสยงการกระทําชําเราหรือการกระทํา อนาจารนันไว้ เพือแสวงหาประโยชน์โดยมิชอบสําหรับตนเองหรือผู้อืน ต้องระวางโทษหนักกว่า ทบัญญัติไว้ในมาตรานัน ๆ หนึงในสาม ถ้าผู้กระทําความผิดตามวรรคหนึง เผยแพรหรือสงตอซึงภาพหรือเสยงการ กระทําชําเราหรือการกระทําอนาจารทบันทึกไว้ ต้องระวางโทษหนักกว่าทบัญญัติไว้ในมาตรา นัน ๆ กึงหนึง"},{"section":"มาตรา ๒๗๙","num":"279","text":"ผู้ใดกระทําอนาจารแก่เด็กอายุยังไม่เกินสิบห้าป โดยเด็ก นันจะยินยอมหรือไมก็ตาม ต้องระวางโทษจําคุกไม่เกินสิบป หรือปรับไม่เกินสองแสนบาท หรือ ทังจําทังปรับ ถ้าการกระทําความผิดตามวรรคหนึง เปนการกระทําแก่เด็กอายุไม่เกินสิบ สามป ต้องระวางโทษจําคุกตังแตหนึงปถึงสิบป หรือปรับตังแตสองหมืนบาทถึงสองแสนบาท หรือทัง จําทัง ปรับ ถ้าการกระทําความผิดตามวรรคหนึงหรือวรรคสอง ผู้กระทําได้กระทําโดยขู่ เข็ญด้วยประการใด ๆ โดยใช้กําลังประทุษร้าย โดยเด็กนันอยู่ในภาวะทีไมสามารถขัดขืนได้ หรือโดยทําให้เด็กนันเข้าใจผิดว่าตนเปนบุคคลอืน ต้องระวางโทษจําคุกตังแตหนึงปถึงสิบห้าป หรือปรับตังแตสองหมืนบาทถึงสามแสนบาท หรือทังจําทังปรับ วรรคสี[232] (ยกเลิก) วรรคห้า[233] (ยกเลิก) วรรคหก[234] (ยกเลิก) วรรคเจ็ด[235] (ยกเลิก)"},{"section":"มาตรา ๒๘๐","num":"280","text":"ถ้าการกระทําความผิดตามมาตรา ๒๗๘ หรือมาตรา ๒๗๙ เปนเหตุให้ผู้ถูกกระทํา (๑) รับอันตรายสาหัส ผู้กระทําต้องระวางโทษจําคุกตังแตห้าปถึงยสิบป และ ปรับตังแตหนึงแสนบาทถึงสีแสนบาท หรือจําคุกตลอดชวิต (๒) ถึงแกความตาย ผู้กระทําต้องระวางโทษประหารชวิต หรือจําคุกตลอด ชวิต"},{"section":"มาตรา ๒๘๐/๑","num":"280/1","text":"เพิมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับที ๒๗) พ.ศ. ๒๕๖๒ [238]"},{"section":"มาตรา ๒๘๑","num":"281","text":"ความผิดตามมาตราดังตอไปนี เปนความผิดอันยอมความ ได้ (๑) มาตรา ๒๗๖ วรรคหนึง ซึงเปนการกระทําระหว่างคู่สมรส ถ้ามิได้เกิดตอ หน้าธารกํานัล หรือไม่เปนเหตุให้ผู้ถูกกระทํารับอันตรายสาหัสหรือถึงแกความตาย (๒) มาตรา ๒๗๘ ถ้ามิได้เกิดตอหน้าธารกํานัล ไม่เปนเหตุให้ผู้ถูกกระทํารับ อันตรายสาหัสหรือถึงแกความตาย หรือมิได้เปนการกระทําแกบุคคลดังระบุไว้ในมาตรา ๒๘๕ และมาตรา ๒๘๕/๒"},{"section":"มาตรา ๒๘๒","num":"282","text":"ผู้ใดเพือสนองความใครของผู้อืน เปนธุระจัดหา ลอไป หรือ พาไปเพือการอนาจารซึงชายหรือหญิง แม้ผู้นันจะยินยอมก็ตาม ต้องระวางโทษ[240]จําคุก ตังแตหนึงปถึงสิบป และปรับตังแตสองหมืนบาทถึงสองแสนบาท ถ้าการกระทําความผิดตามวรรคแรกเปนการกระทําแกบุคคลอายุเกินสิบห้าป แตยังไม่เกินสิบแปดป ผู้กระทําต้องระวางโทษจําคุกตังแตสามปถึงสิบห้าป และปรับตังแตหก หมืนบาทถึงสามแสนบาท ถ้าการกระทําความผิดตามวรรคแรกเปนการกระทําแก่เด็กอายุยังไม่เกินสิบ ห้าป ผู้กระทําต้องระวางโทษจําคุกตังแตห้าปถึงยสิบป และปรับตังแตหนึงแสนบาทถึงสีแสน บาท ผู้ใดเพือสนองความใครของผู้อืน รับตัวบุคคลซึงมผู้จัดหา ลอไป หรือพาไป ตามวรรคแรก วรรคสอง หรือวรรคสาม หรือสนับสนุนในการกระทําความผิดดังกล่าว ต้อง ระวางโทษตามทบัญญัติไว้ในวรรคแรก วรรคสอง หรือวรรคสาม แล้วแตกรณี"},{"section":"มาตรา ๒๘๓","num":"283","text":"ผู้ใดเพือสนองความใครของผู้อืน เปนธุระจัดหา ลอไป หรือ พาไปเพือการอนาจารซึงชายหรือหญิง โดยใช้อุบายหลอกลวง ขู่เข็ญ ใช้กําลังประทุษร้าย ใช้ อํานาจครอบงําผิดคลองธรรม หรือใช้วิธข ี ่มขืนใจด้วยประการอืนใด ต้องระวางโทษ[242]จํา คุกตังแตห้าปถึงยสิบป และปรับตังแตหนึงแสนบาทถึงสีแสนบาท ถ้าการกระทําความผิดตามวรรคแรกเปนการกระทําแกบุคคลอายุเกินสิบห้าป แตยังไม่เกินสิบแปดป ผู้กระทําต้องระวางโทษจําคุกตังแต่เจ็ดปถึงยสิบป และปรับตังแตหนึง แสนสหมืนบาทถึงสีแสนบาท หรือจําคุกตลอดชวิต ถ้าการกระทําความผิดตามวรรคแรกเปนการกระทําแก่เด็กอายุยังไม่เกินสิบ ห้าป ผู้กระทําต้องระวางโทษจําคุกตังแตสิบปถึงยสิบป และปรับตังแตสองแสนบาทถึงสีแสน บาท หรือจําคุกตลอดชวิต หรือประหารชวิต ผู้ใดเพือสนองความใครของผู้อืน รับตัวบุคคลซึงมผู้จัดหา ลอไป หรือพาไป ตามวรรคแรก วรรคสอง หรือวรรคสา"},{"section":"มาตรา ๒๘๓ ทวิ","num":"283 ทวิ","text":"ผู้ใดพาบุคคลอายุเกินสิบห้าปแตยังไม่เกินสิบแปดปไป เพือการอนาจาร แม้ผู้นันจะยินยอมก็ตาม ต้องระวางโทษ[244]จําคุกไม่เกินห้าป หรือปรับไม่เกิน หนึงแสนบาท หรือทังจําทังปรับ ถ้าการกระทําความผิดตามวรรคแรกเปนการกระทําแก่เด็กอายุยังไม่เกินสิบ ห้าป ผู้กระทําต้องระวางโทษจําคุกไม่เกินเจ็ดป หรือปรับไม่เกินหนึงแสนสหมืนบาท หรือทังจํา ทังปรับ ผู้ใดซอนเร้นบุคคลซึงถูกพาไปตามวรรคแรกหรือวรรคสอง ต้องระวางโทษ ตามทบัญญัติในวรรคแรกหรือวรรคสอง แล้วแตกรณความผิดตามวรรคแรกและวรรคสามเฉพาะกรณทีกระทําแกบุคคลอายุเกิน สิบห้าป เปนความผิดอันยอมความได้"},{"section":"มาตรา ๒๘๔","num":"284","text":"ผู้ใดพาผู้อืนไปเพือการอนาจาร โดยใช้อุบายหลอกลวงขู่ เข็ญ ใช้กําลังประทุษร้าย ใช้อํานาจครอบงําผิดคลองธรรม หรือใช้วิธข ี ่มขืนใจด้วยประการอืนใด [246] ต้องระวางโทษ จําคุกตังแตหนึงปถึงสิบป และปรับตังแตสองหมืนบาทถึงสองแสนบาท ผู้ใดซอนเร้นบุคคลซึงถูกพาไปตามวรรคแรก ต้องระวางโทษเชนเดยวกับผู้พา ไปนัน ความผิดตามมาตรานี เปนความผิดอันยอมความได้"},{"section":"มาตรา ๒๘๔/๑","num":"284/1","text":"ผู้ใดคุกคามทางเพศตอผู้อืน ถ้าการกระทํานันไม่เปน ความผิดฐานอนาจาร ต้องระวางโทษจําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือ ทังจําทังปรับ ถ้าการกระทําความผิดตามวรรคหนึง เปนการกระทําอย่างตอเนืองหรือ กระทําซามากกว่าหนึงครัง และเปนเหตุให้ผู้อืนไมสามารถดําเนินชวิตได้ตามปกติ ต้องระวาง โทษจําคุกไม่เกินสองป หรือปรับไม่เกินสหมืนบาท หรือทังจําทังปรับ ถ้าการกระทําความผิดตามวรรคหนึงหรือวรรคสอง เปนการกระทําในทสาธารณสถาน ตอหน้าธารกํานัล หรือในระบบคอมพิวเตอร์ทประชาชนทัวไปเข้าถึงได้ ต้อง ระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ ถ้าการกระทําความผิดตามมาตรานี เปนการกระทําแก่เด็กอายุไม่เกินสิบห้าป โดยเด็กนันจะยินยอมหรือไมก็ตาม ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสน บาท หรือทัง จําทัง ปรับ ความผิดตามวรรคหนึง วรรคส"},{"section":"มาตรา ๒๘๔/๒","num":"284/2","text":"ถ้าการกระทําความผิดตามมาตรา ๒๘๔/๑ เปนการ กระทําโดยอาศัยเหตุทผู้กระทํามอํานาจเหนือผู้ถูกกระทํา อันเนืองจากความสัมพันธ์ในฐานะที เปนผู้บังคับบัญชา นายจ้าง หรือผู้มอํานาจเหนือประการอืน ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๘๔/๓","num":"284/3","text":"ในคดคุกคามทางเพศ ถ้าความปรากฏแกศาลเองหรือ ตามข้อเสนอของพนักงานอัยการ โจทก์ ผู้เสยหาย หรือเจ้าพนักงาน ว่าจําเลยมพฤติการณ์อัน ควรเชือได้ว่าจะคุกคามทางเพศหรือรบกวนการดําเนินชวิตตามปกติของผู้เสยหายอย่างตอ เนือง ไมว่าศาลจะลงโทษจําเลยหรือไมก็ตาม ศาลอาจสังห้ามจําเลยนันกระทําการอย่างหนึง อย่างใดตามเงือนไขและภายในระยะเวลาทศาลกําหนดแต่ไม่เกินสองป จําเลยซึงฝาฝนคําสังห้ามของศาลตามวรรคหนึง ต้องระวางโทษจําคุกไม่เกิน หกเดือน หรือปรับไม่เกินหนึงหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๘๔/๔","num":"284/4","text":"ในการกระทําความผิดฐานคุกคามทางเพศตามมาตรา ๒๘๔/๑ วรรคสาม ทีเปนการนําข้อมูลอันมลักษณะลามกเข้าสู่ระบบคอมพิวเตอร์ทประชาชน ทัวไปเข้าถึงได้ หากได้ความตามทางไตสวนของศาลตามคําร้องของผู้เสยหายหรือเจ้าพนักงาน แล้ว เพือรักษาความสงบเรยบร้อยหรือศลธรรมอันดของประชาชน ศาลอาจมคําสัง ให้ผู้นําเข้า ข้อมูลนันระงับการทําให้แพรหลายและนําข้อมูลนันออกจากระบบคอมพิวเตอร์ภายในระยะ เวลาทศาลกําหนด และหากจําเปนอาจสังให้ผู้ควบคุมหรือผู้ให้บริการระบบคอมพิวเตอร์ระงับ การทําให้แพรหลายและนําข้อมูลนันออกจากระบบคอมพิวเตอร์ภายในระยะเวลาทศาลกําหนด หรืออาจสังให้เจ้าพนักงานทมีอํานาจตามกฎหมายว่าด้วยการนันดําเนินการให้เปนไปตามคําสัง ของศาลก็ได้ แล้วรายงานให้ศาลทราบภายในสิบห้าวัน ผู้นําเข้าข้อมูล ผู้ควบคุมหรือผู้ให้บริการระบบคอมพิวเตอร์ผู้ใดฝาฝนคําสัง ของศาลตามวรรคหนึง ต้องระวางโทษจําคุกไม่เกินหกเ"},{"section":"มาตรา ๒๘๕","num":"285","text":"ทัง นีเฉพาะทีเกยวกับมาตรา ๒๗๖ (๔) ความผิดตอชวิต ตามทบัญญัติไว้ในมาตรา ๒๘๘ ถึงมาตรา ๒๙๐ (๕) ความผิดตอร่างกาย ตามทบัญญัติไว้ในมาตรา ๒๙๕ ถึงมาตรา ๒๙๘ (๖) ความผิดฐานทอดทิงเด็ก คนปวยเจ็บหรือคนชรา ตามทบัญญัติไว้ใน"},{"section":"มาตรา ๒๘๕/๑","num":"285/1","text":"เพิมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับที ๒๓) พ.ศ. ๒๕๕๘ [253]"},{"section":"มาตรา ๒๘๕/๒","num":"285/2","text":"เพิมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับที ๒๗) พ.ศ. ๒๕๖๒ [254]"},{"section":"มาตรา ๒๘๖","num":"286","text":"ผู้ใดกระทําด้วยประการใด ๆ ดังตอไปนต้องระวางโทษจํา คุกไม่เกินยสิบป และปรับไม่เกินสีแสนบาท หรือจําคุกตลอดชวิต (๑) ชวยเหลือ ให้ความสะดวก หรือคุ้มครองการค้าประเวณของผู้อืน (๒) รับประโยชน์ไมว่ารูปแบบใดจากการค้าประเวณของผู้อืนหรือจากผู้ซึงค้า ประเวณี (๓) บังคับ ขู่เข็ญ หลอกลวง หรือใช้อํานาจครอบงําผู้อืน หรือรับผู้อืนเข้าทํา งานเพือการค้าประเวณี (๔) จัดให้มการค้าประเวณระหว่างผู้ซึงค้าประเวณกับผู้ใช้บริการ (๕) ปกปดหรืออําพรางแหลงทมาของรายได้หรือทรัพย์สินซึงได้มาจากการค้า ประเวณี (๖) อยู่รวมกับผู้ซึงค้าประเวณหรือสมาคมกับผู้ซึงค้าประเวณคนเดยวหรือ หลายคนเปนอาจิณ และไมสามารถแสดงทมาของรายได้ในการดํารงชพของตน (๗) ขัดขวางการดําเนินการของหนวยงานทดูแลในการปองกัน ควบคุม ชวย เหลือ หรือให้การศึกษาแกผู้ซึงค้าประเวณผู้ซึงจะเข้ารวมในการค้าประเวณหรือผู้ซึงอาจไ"},{"section":"มาตรา ๒๘๗","num":"287","text":"ผู้ใด (๑) เพือความประสงค์แหงการค้า หรือโดยการค้า เพือการแจกจ่ายหรือเพือ การแสดงอวดแกประชาชน ทํา ผลิต มีไว้ นําเข้าหรือยังให้นําเข้าในราชอาณาจักร สงออกหรือ ยังให้สงออกไปนอกราชอาณาจักร พาไปหรือยังให้พาไปหรือทําให้แพรหลายโดยประการใด ๆ ซึงเอกสาร ภาพเขยน ภาพพิมพ์ ภาพระบายสสิงพิมพ์ รูปภาพ ภาพโฆษณา เครือ งหมาย รูป ถ่าย ภาพยนตร์ แถบบันทึกเสยง แถบบันทึกภาพหรือสิงอืนใดอันลามก (๒) ประกอบการค้า หรือมส่วนหรือเข้าเกยวข้องในการค้าเกยวกับวัตถุหรือสิง ของลามกดังกล่าวแล้ว จ่ายแจกหรือแสดงอวดแกประชาชน หรือให้เช่าวัตถุหรือสิงของเชนว่า นัน (๓) เพือจะชวยการทําให้แพรหลาย หรือการค้าวัตถุหรือสิงของลามกดังกล่าว แล้ว โฆษณาหรือไขข่าวโดยประการใด ๆ ว่ามบุคคลกระทําการอันเปนความผิดตามมาตรานหรือโฆษณาหรือไขข่าวว่าวัตถุ หรือสิงของลามกดังกล่าวแล้วจะหาได้จากบุคคลใด หรือโดยวิธี ใด ต้องระวา"},{"section":"มาตรา ๒๘๗/๑","num":"287/1","text":"ผู้ใดครอบครองสือลามกอนาจารเด็กเพือแสวงหา ประโยชน์ในทางเพศสําหรับตนเองหรือผู้อืน ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกิน หนึงแสนบาท หรือทังจําทังปรับ ถ้าผู้กระทําความผิดตามวรรคหนึงสงตอซึงสือลามกอนาจารเด็กแกผู้อืน ต้อง ระวางโทษจําคุกไม่เกินเจ็ดป หรือปรับไม่เกินหนึงแสนสหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๘๗/๒","num":"287/2","text":"เพิมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับที ๒๔) พ.ศ. ๒๕๕๘ [259] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [260] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [261] อัตราโทษ แก้ไขเพิม เติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิม เติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [262] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [263] อัตราโทษ แก้ไขเพิม เติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิม เติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [264] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [265] อัตราโทษ แก้ไขเพิม เติมโดยมาตรา ๔ แ"},{"section":"มาตรา ๒๘๘","num":"288","text":"ผู้ใดฆ่าผู้อืน ต้องระวางโทษประหารชวิต จําคุกตลอดชวิต หรือ จําคุกตังแตสิบห้าปถึงยสิบป"},{"section":"มาตรา ๒๘๙","num":"289","text":"ผู้ใด (๑) ฆ่าบุพการี (๒) ฆ่าเจ้าพนักงาน ซึงกระทําการตามหน้าทหรือเพราะเหตุทจะกระทํา หรือ ได้กระทําการตามหน้าที (๓) ฆ่าผู้ชวยเหลือเจ้าพนักงาน ในการทีเจ้าพนักงานนันกระทําตามหน้าทหรือ เพราะเหตุทบุคคลนันจะชวยหรือได้ชวยเจ้าพนักงานดังกล่าวแล้ว (๔) ฆ่าผู้อืนโดยไตรตรองไว้กอน (๕) ฆ่าผู้อืนโดยทรมานหรือโดยกระทําทารุณโหดร้าย (๖) ฆ่าผู้อืนเพือตระเตรยมการ หรือเพือความสะดวกในการทจะกระทําความ ผิดอย่างอืน หรือ (๗) ฆ่าผู้อืนเพือจะเอาหรือเอาไว้ซึงผลประโยชน์อันเกิดแตการทตนได้กระทํา ความผิดอืน เพือปกปดความผิดอืนของตนหรือเพือหลกเลยงให้พ้นอาญา ในความผิดอืนทตน ได้กระทําไว้ ต้องระวางโทษประหารชวิต"},{"section":"มาตรา ๒๙๐","num":"290","text":"ผู้ใดมิได้มีเจตนาฆ่า แตทําร้ายผู้อืนจนเปนเหตุให้ผู้นันถึงแกความตาย ต้องระวางโทษจําคุกตังแตสามปถึงสิบห้าป ถ้าความผิดนันมลักษณะประการหนึงประการใดดังทบัญญัติไว้ในมาตรา ๒๘๙ ผู้กระทําต้องระวางโทษจําคุกตังแตสามปถึงยสิบป"},{"section":"มาตรา ๒๙๑","num":"291","text":"ผู้ใดกระทําโดยประมาท และการกระทํานันเปนเหตุให้ผู้อืน ถึงแกความตาย ต้องระวางโทษจําคุกไม่เกินสิบป และปรับไม่เกินสองแสนบาท"},{"section":"มาตรา ๒๙๒","num":"292","text":"ผู้ใดกระทําด้วยการปฏิบัติอันทารุณ หรือด้วยปจจัยคล้าย คลึงกันแกบุคคลซึงต้องพึงตน ในการดํารงชพหรือในการอืนใด เพือให้บุคคลนันฆ่าตนเอง ถ้า การฆ่าตนเองนันได้เกิดขึนหรือได้มการพยายามฆ่าตนเอง ต้องระวางโทษจําคุกไม่เกินเจ็ดป และปรับไม่เกินหนึงแสนสหมืนบาท"},{"section":"มาตรา ๒๙๓","num":"293","text":"ผู้ใดชวยหรือยุยงเด็กอายุยังไม่เกินสิบหกป หรือผู้ซึงไมสามารถเข้าใจว่าการกระทําของตนมสภาพหรือสาระสําคัญอย่างไรหรือไมสามารถบังคับการ กระทําของตนได้ ให้ฆ่าตนเอง ถ้าการฆ่าตนเองนันได้เกิดขึนหรือได้มการพยายามฆ่าตนเอง ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๙๔","num":"294","text":"ผู้ใดเข้ารวมในการชุลมุนตอสู้ระหว่างบุคคลตังแตสามคน ขึนไป และบุคคลหนึงบุคคลใดไมว่าจะเปนผู้ทีเข้ารวมในการนันหรือไมถึงแกความตายโดยการ กระทําในการชุลมุนตอสู้นัน ต้องระวางโทษจําคุกไม่เกินสองป หรือปรับไม่เกินสหมืนบาท หรือ ทังจําทังปรับ ถ้าผู้ทีเข้ารวมในการชุลมุนตอสู้นันแสดงได้ว่า ได้กระทําไป เพือห้ามการชุลมุน ตอสู้นัน หรือเพือปองกันโดยชอบด้วยกฎหมาย ผู้นันไมต้องรับโทษ หมวด ๒ ความผิดตอร่างกาย"},{"section":"มาตรา ๒๙๕","num":"295","text":"ผู้ใดทําร้ายผู้อืนจนเปนเหตุให้เกิดอันตรายแกกาย หรือ จิตใจของผู้อืนนัน ผู้นันกระทําความผิดฐานทําร้ายร่างกาย ต้องระวางโทษจําคุกไม่เกินสองป หรือปรับไม่เกินสหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๙๖","num":"296","text":"ผู้ใดกระทําความผิดฐานทําร้ายร่างกาย ถ้าความผิดนัน มลักษณะประการหนึงประการใดดังทบัญญัติไว้ในมาตรา ๒๘๙ ต้องระวางโทษจําคุกไม่เกินสาม ป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๒๙๗","num":"297","text":"ผู้ใดกระทําความผิดฐานทําร้ายร่างกายจนเปนเหตุให้ผู้ถูก กระทําร้ายรับอันตรายสาหัส ต้องระวางโทษจําคุกตังแตหกเดือนถึงสิบป และปรับตังแตหนึง หมืนบาทถึงสองแสนบาท อันตรายสาหัสนัน คือ (๑) ตาบอด หูหนวก ลินขาด หรือเสยฆานประสาท (๒) เสยอวัยวะสืบพันธุห ์ รือความสามารถสืบพันธุ์ (๓) เสยแขน ขา มือ เท้า นิวหรืออวัยวะอืนใด (๔) หน้าเสยโฉมอย่างติดตัว (๕) แท้งลูก (๖) จิตพิการอย่างติดตัว (๗) ทุพพลภาพ หรือปวยเจ็บเรือ รังซึงอาจถึงตลอดชวิต (๘) ทุพพลภาพหรือปวยเจ็บด้วยอาการทุกขเวทนาเกินกว่ายสิบวัน หรือจน ประกอบกรณยกิจตามปกติไม่ได้เกินกว่ายสิบวัน"},{"section":"มาตรา ๒๙๘","num":"298","text":"ผู้ใดกระทําความผิดตามมาตรา ๒๙๗ ถ้าความผิดนันมลักษณะประการหนึงประการใดดังทบัญญัติไว้ในมาตรา ๒๘๙ ต้องระวางโทษจําคุกตังแตสอง ปถึงสิบป และปรับตังแตสีหมืนบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๙๙","num":"299","text":"ผู้ใดเข้ารวมในการชุลมุนตอสู้ระหว่างบุคคลแตสามคนขึน ไป และบุคคลหนึงบุคคลใดไมว่าจะเปนผู้ทีเข้ารวมในการนันหรือไมรบ ั อันตรายสาหัส โดยการ กระทําในการชุลมุนตอสู้นัน ต้องระวางโทษจําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือทังจําทังปรับ ถ้าผู้ทีเข้ารวมในการชุลมุนตอสู้นันแสดงได้ว่า ได้กระทําไปเพือห้ามการชุลมุน ตอสู้นัน หรือเพือปองกันโดยชอบด้วยกฎหมาย ผู้นันไมต้องรับโทษ"},{"section":"มาตรา ๓๐๐","num":"300","text":"ผู้ใดกระทําโดยประมาท และการกระทํานันเปนเหตุให้ผู้อืน รับอันตรายสาหัส ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทัง ปรับ หมวด ๓ ความผิดฐานทําให้แท้งลูก"},{"section":"มาตรา ๓๐๑","num":"301","text":"แก้ไขเพิม เติมโดยมาตรา ๓ พระราชบัญญัติแก้ไขเพิม เติมประมวลกฎหมาย อาญา (ฉบับที ๒๘) พ.ศ. ๒๕๖๔ [270] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [271] อัตราโทษ แก้ไขเพิม เติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิม เติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [272]"},{"section":"มาตรา ๓๐๒","num":"302","text":"ผู้ใดทําให้หญิงแท้งลูกโดยหญิงนันยินยอม ต้องระวางโทษ จําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ ถ้าการกระทํานันเปนเหตุให้หญิงรับอันตรายสาหัสอย่างอืนด้วย ผู้กระทําต้อง ระวางโทษจําคุกไม่เกินเจ็ดป หรือปรับไม่เกินหนึงแสนสหมืนบาท หรือทัง จําทัง ปรับ ถ้าการกระทํานันเปนเหตุให้หญิงถึงแกความตาย ผู้กระทําต้องระวางโทษจํา คุกไม่เกินสิบป และปรับไม่เกินสองแสนบาท"},{"section":"มาตรา ๓๐๓","num":"303","text":"ผู้ใดทําให้หญิงแท้งลูกโดยหญิงนันไมยินยอม ต้องระวาง โทษจําคุกไม่เกินเจ็ดป หรือปรับไม่เกินหนึงแสนสหมืนบาท หรือทัง จําทัง ปรับ ถ้าการกระทํานันเปนเหตุให้หญิงรับอันตรายสาหัสอย่างอืนด้วย ผู้กระทําต้อง ระวางโทษจําคุกตังแตหนึงปถึงสิบป และปรับตังแตสองหมืนบาทถึงสองแสนบาท ถ้าการกระทํานันเปนเหตุให้หญิงถึงแกความตาย ผู้กระทําต้องระวางโทษ จําคุกตังแตห้าปถึงยสิบป และปรับตังแตหนึงแสนบาทถึงสีแสนบาท"},{"section":"มาตรา ๓๐๔","num":"304","text":"ผู้ใดเพยงแตพยายามกระทําความผิดตามมาตรา ๓๐๑ หรือ"},{"section":"มาตรา ๓๐๕","num":"305","text":"ถ้าการกระทําความผิดตามมาตรา ๓๐๑ หรือมาตรา ๓๐๒ เปนการกระทําของผู้ประกอบวิชาชพเวชกรรมและตามหลักเกณฑ์ของแพทยสภาในกรณดังตอ ไปนผู้กระทําไมมีความผิด (๑) จําเปนต้องกระทําเนืองจากหากหญิงตังครรภ์ตอไปจะเสยงตอการได้รบ ั อันตรายตอสุขภาพทางกายหรือจิตใจของหญิงนัน (๒) จําเปนต้องกระทําเนืองจากมความเสยงอย่างมากหรือมีเหตุผลทางการ แพทย์อันควรเชือได้ว่าหากทารกคลอดออกมาจะมความผิดปกติถึงขนาดทุพพลภาพอย่างร้าย แรง (๓) หญิงยืนยันตอผู้ประกอบวิชาชพเวชกรรมว่าตนมครรภ์เนืองจากมการ กระทําความผิดเกยวกับเพศ (๔) หญิงซึงมอายุครรภ์ไม่เกินสิบสองสัปดาห์ยืนยันทจะยุติการตังครรภ์ (๕) หญิงซึงมอายุครรภ์เกินสิบสองสัปดาห์ แต่ไม่เกินยสิบสัปดาห์ ยืนยันทจะ ยุติการตังครรภ์ภายหลังการตรวจและรับคําปรึกษาทางเลือกจากผู้ประกอบวิชาชพเวชกรรม และผู้ประกอบวิชาชพอืนตามหลักเกณฑ์และวิธก ี ารทรฐ ั มนตรว"},{"section":"มาตรา ๓๐๖","num":"306","text":"ถึงมาตรา ๓๐๘ (๗) ความผิดตอเสรภาพ ตามทบัญญัติไว้ในมาตรา ๓๐๙ มาตรา ๓๑๐ มาตรา ๓๑๒ ถึงมาตรา ๓๑๕ และมาตรา ๓๑๗ ถึงมาตรา ๓๒๐ (๘) ความผิดฐานลักทรัพย์และวิงราวทรัพย์ ตามทบัญญัติไว้ในมาตรา ๓๓๔ ถึงมาตรา ๓๓๖ (๙) ความผิดฐานกรรโชก รดเอาทรัพย์ ชิงทรัพย์ และปล้นทรัพย์ ตามทบัญญัติไว้ในมาตรา ๓๓๗ ถึงมาตรา ๓๔๐ (๑๐) ความผิดฐานฉ้อโกง ตามทบัญญัติไว้ในมาตรา ๓๔๑ ถึงมาตรา ๓๔๔"},{"section":"มาตรา ๓๐๗","num":"307","text":"ผู้ใดมหน้าทตามกฎหมายหรือตามสัญญาต้องดูแลผู้ซึงพึง ตนเองมิได้ เพราะอายุ ความปวยเจ็บ กายพิการหรือจิตพิการ ทอดทิงผู้ซึงพึงตนเองมิได้นันเสย โดยประการทน่าจะเปนเหตุให้เกิดอันตรายแกชีวิต ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับ ไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๐๘","num":"308","text":"ถ้าการกระทําความผิดตามมาตรา ๓๐๖ หรือมาตรา ๓๐๗ เปน เหตุให้ผู้ถูกทอดทิงถึงแกความตายหรือรับอันตรายสาหัส ผู้กระทําต้องระวางโทษดังทบัญญัติ ไว้ในมาตรา ๒๙๐ มาตรา ๒๙๗ หรือมาตรา ๒๙๘ นัน ลักษณะ ๑๑ ความผิดเกยวกับเสรภาพและชือเสยง หมวด ๑ ความผิดตอเสรภาพ"},{"section":"มาตรา ๓๐๙","num":"309","text":"ผู้ใดขมขืนใจผู้อืนให้กระทําการใด ไมกระทําการใด หรือ จํายอมตอสิงใด โดยทําให้กลัวว่าจะเกิดอันตรายตอชวิต ร่างกาย เสรภาพ ชือเสยงหรือ ทรัพย์สินของผู้ถูกขมขืนใจนันเองหรือของผู้อืน หรือโดยใช้กําลังประทุษร้ายจนผู้ถูกขมขืนใจ ต้องกระทําการนัน ไมกระทําการนันหรือจํายอมตอสิงนัน ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาทหรือทังจําทังปรับ ถ้าความผิดตามวรรคแรกได้กระทําโดยมอาวุธ หรือโดยรวมกระทําความผิด ด้วยกันตังแตห้าคนขึนไป หรือได้กระทําเพือให้ผู้ถูกขมขืนใจทํา ถอน ทําให้เสยหาย หรือทําลาย เอกสารสิทธิอย่างใด ผู้กระทําต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ ถ้ากระทําโดยอ้างอํานาจอังยหรือซองโจร ไมว่าอังยหรือซองโจรนันจะมอยู่ หรือไมผู้กระทําต้องระวางโทษจําคุกตังแตหนึงปถึงเจ็ดป และปรับตังแตสองหมืนบาทถึงหนึง แส"},{"section":"มาตรา ๓๑๐","num":"310","text":"ผู้ใดหนวงเหนยวหรือกักขังผู้อืน หรือกระทําด้วยประการใด ให้ผู้อืนปราศจากเสรภาพในร่างกาย ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหก หมืนบาทหรือทังจําทังปรับ ถ้าการกระทําความผิดตามวรรคแรก เปนเหตุให้ผู้ถูกหนวงเหนยวถูกกักขัง หรือต้องปราศจากเสรภาพในร่างกายนันถึงแกความตาย หรือรับอันตรายสาหัส ผู้กระทําต้อง ระวางโทษดังทบัญญัติไว้ในมาตรา ๒๙๐ มาตรา ๒๙๗ หรือมาตรา ๒๙๘ นัน"},{"section":"มาตรา ๓๑๐ ทวิ","num":"310 ทวิ","text":"เพิมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับที ๑๓) พ.ศ. ๒๕๓๗ [278] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๑๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวล กฎหมายอาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [279] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [280] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [281]"},{"section":"มาตรา ๓๑๑","num":"311","text":"ผู้ใดกระทําโดยประมาท และการกระทํานันเปนเหตุให้ผู้อืน ถูกหนวงเหนยว ถูกกักขังหรือต้องปราศจากเสรภาพในร่างกาย ต้องระวางโทษจําคุกไม่เกิน หนึงป หรือปรับไม่เกินสองหมืนบาท หรือทังจําทังปรับ ถ้าการกระทําความผิดตามวรรคแรก เปนเหตุให้ผู้ถูกหนวงเหนยวถูกกักขัง หรือต้องปราศจากเสรภาพในร่างกายนันถึงแกความตายหรือรับอันตรายสาหัส ผู้กระทําต้อง ระวางโทษดังทบัญญัติไว้ในมาตรา ๒๙๑ หรือมาตรา ๓๐๐"},{"section":"มาตรา ๓๑๒","num":"312","text":"ผู้ใดเพือจะเอาคนลงเปนทาส หรือให้มฐานะคล้ายทาส นํา เข้าในหรือสงออกไปนอกราชอาณาจักร พามาจากทีใด ซือ ขาย จําหน่าย รับหรือหนวงเหนยว ซึงบุคคลหนึงบุคคลใด ต้องระวางโทษจําคุกไม่เกินเจ็ดป และปรับไม่เกินหนึงแสนสหมืนบาท"},{"section":"มาตรา ๓๑๒ ทวิ","num":"312 ทวิ","text":"ถ้าการกระทําความผิดตามมาตรา ๓๑๐ ทวิ หรือมาตรา ๓๑๒ เปนการกระทําตอเด็กอายุไม่เกินสิบห้าป ผู้กระทําต้องระวางโทษ[282]จําคุกตังแตสามป ถึงสิบป และปรับไม่เกินสองแสนบาท ถ้าการกระทําความผิดตามวรรคแรก หรือมาตรา ๓๑๐ ทวิ หรือมาตรา ๓๑๒ เปนเหตุให้ผู้ถูกกระทํา (๑) รับอันตรายแกกายหรือจิตใจ ผู้กระทําต้องระวางโทษจําคุกตังแตห้าปถึง สิบห้าป และปรับไม่เกินสามแสนบาท (๒) รับอันตรายสาหัส ผู้กระทําต้องระวางโทษจําคุกตลอดชวิต หรือจําคุก ตังแต่เจ็ดปถึงยสิบป (๓) ถึงแกความตาย ผู้กระทําต้องระวางโทษประหารชวิต จําคุกตลอดชวิต หรือจําคุกตังแตสิบห้าปถึงยสิบป"},{"section":"มาตรา ๓๑๒ ตรี","num":"312 ตรี","text":"ผู้ใดโดยทุจริตรับไว้ จําหน่าย เปนธุระจัดหา ลอไป หรือ พาไปซึงบุคคลอายุเกินสิบห้าปแตยังไม่เกินสิบแปดป แม้ผู้นันจะยินยอมก็ตาม ต้องระวางโทษ [284]จําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ ถ้าการกระทําความผิดตามวรรคแรกเปนการกระทําแก่เด็กอายุยังไม่เกินสิบ ห้าป ผู้กระทําต้องระวางโทษจําคุกไม่เกินเจ็ดป หรือปรับไม่เกินหนึงแสนสหมืนบาท หรือทัง จํา ทัง ปรับ"},{"section":"มาตรา ๓๑๓","num":"313","text":"ผู้ใดเพือให้ได้มาซึงค่าไถ่ (๑) เอาตัวเด็กอายุไม่เกินสิบห้าปไป (๒) เอาตัวบุคคลอายุกว่าสิบห้าปไป โดยใช้อุบายหลอกลวง ขู่เข็ญ ใช้กําลัง ประทุษร้าย ใช้อํานาจครอบงําผิดคลองธรรม หรือใช้วิธข ี ่มขืนใจด้วยประการอืนใด หรือ (๓) หนวงเหนยวหรือกักขังบุคคลใด ต้องระวางโทษ[286]จําคุกตังแตสิบห้าปถึงยสิบป และปรับตังแตสามแสนบาท ถึงสีแสนบาท หรือจําคุกตลอดชวิต หรือประหารชวิต ถ้าการกระทําความผิดตามวรรคแรกเปนเหตุให้ผู้ถูกเอาตัวไป ผู้ถูกหนวง เหนยว หรือผู้ถูกกักขังนันรับอันตรายสาหัส หรือเปนการกระทําโดยทรมาน หรือโดยทารุณ โหดร้าย จนเปนเหตุให้ผู้ถูกกระทํานันรับอันตรายแกกาย หรือจิตใจ ผู้กระทําต้องระวาง โทษประหารชวิตหรือจําคุกตลอดชวิต ถ้าการกระทําความผิดนันเปนเหตุให้ผู้ถูกเอาตัวไป ผู้ถูกหนวงเหนยว หรือผู้ถูก กักขังนันถึงแกความตาย ผู้กระทําต้องระวางโทษประหารชวิต"},{"section":"มาตรา ๓๑๔","num":"314","text":"ผู้ใดเปนผู้สนับสนุนในการกระทําความผิดตามมาตรา ๓๑๓ ต้อง ระวางโทษเชนเดยวกับตัวการในความผิดนัน"},{"section":"มาตรา ๓๑๕","num":"315","text":"ผู้ใดกระทําการเปนคนกลาง โดยเรยก รับหรือยอมจะรับ ทรัพย์สินหรือประโยชน์อย่างใดทมิควรได้จากผู้กระทําความผิดตามมาตรา ๓๑๓ หรือจากผู้ทจะให้ค่าไถต้องระวางโทษ[288]จําคุกตังแตสิบห้าปถึงยสิบป และปรับตังแตสามแสนบาทถึงสี แสนบาท หรือจําคุกตลอดชวิต"},{"section":"มาตรา ๓๑๖","num":"316","text":"ถ้าผู้กระทําความผิดตามมาตรา ๓๑๓ มาตรา ๓๑๔ หรือมาตรา ๓๑๕ จัดให้ผู้ถูกเอาตัวไป ผู้ถูกหนวงเหนยวหรือผู้ถูกกักขังได้รบ ั เสรภาพกอนศาลชันต้น พิพากษา โดยผู้นันมิได้รบ ั อันตรายสาหัสหรือตกอยู่ในภาวะอันใกล้จะเปนอันตรายตอชวิต ให้ ลงโทษน้อยกว่าทกฎหมายกําหนดไว้ แต่ไมน้อยกว่ากึงหนึง"},{"section":"มาตรา ๓๑๗","num":"317","text":"ผู้ใดโดยปราศจากเหตุอันสมควร พรากเด็กอายุยังไม่เกิน สิบห้าปไปเสยจากบิดามารดา ผู้ปกครอง หรือผู้ดูแล ต้องระวางโทษ[290]จําคุกตังแตสามปถึง สิบห้าป และปรับตังแตหกหมืนบาทถึงสามแสนบาท ผู้ใดโดยทุจริต ซือ จําหน่าย หรือรับตัวเด็กซึงถูกพรากตามวรรคแรก ต้อง ระวางโทษเชนเดยวกับผู้พรากนัน ถ้าความผิดตามมาตรานีได้กระทําเพือหากําไร หรือเพือการอนาจาร ผู้กระทํา ต้องระวางโทษจําคุกตังแตห้าปถึงยสิบป และปรับตังแตหนึงแสนบาทถึงสีแสนบาท"},{"section":"มาตรา ๓๑๘","num":"318","text":"ผู้ใดพรากผู้เยาว์อายุกว่าสิบห้าป แตยังไม่เกินสิบแปดปไป เสยจากบิดามารดา ผู้ปกครอง หรือผู้ดูแล โดยผู้เยาว์นันไม่เต็มใจไปด้วย ต้องระวางโทษ จําคุกตังแตสองปถึงสิบป และปรับตังแตสีหมืนบาทถึงสองแสนบาท ผู้ใดโดยทุจริต ซือ จําหน่าย หรือรับตัวผู้เยาว์ซึงถูกพรากตามวรรคแรก ต้อง ระวางโทษเชนเดยวกับผู้พรากนัน ถ้าความผิดตามมาตรานีได้กระทําเพือหากําไร หรือเพือการอนาจาร ผู้กระทํา ต้องระวางโทษ[292]จําคุกตังแตสามปถึงสิบห้าป และปรับตังแตหกหมืนบาทถึงสามแสนบาท"},{"section":"มาตรา ๓๑๙","num":"319","text":"ผู้ใดพรากผู้เยาว์อายุกว่าสิบห้าป แตยังไม่เกินสิบแปดปไป เสยจากบิดามารดา ผู้ปกครอง หรือผู้ดูแล เพือหากําไรหรือเพือการอนาจาร โดยผู้เยาว์นัน เต็มใจไปด้วย ต้องระวางโทษ[294]จําคุกตังแตสองปถึงสิบป และปรับตังแตสีหมืนบาทถึงสอง แสนบาท ผู้ใดโดยทุจริต ซือ จําหน่าย หรือรับตัวผู้เยาว์ซึงถูกพรากตามวรรคแรก ต้อง ระวางโทษเชนเดยวกับผู้พรากนัน"},{"section":"มาตรา ๓๒๐","num":"320","text":"ผู้ใดใช้อุบายหลอกลวง ขู่เข็ญ ใช้กําลังประทุษร้าย ใช้ อํานาจครอบงําผิดคลองธรรม หรือใช้วิธข ี ่มขืนใจด้วยประการอืนใด พาหรือสงคนออกไปนอก [296] ราชอาณาจักร ต้องระวางโทษ จําคุกตังแตสองปถึงสิบป หรือปรับตังแตสีหมืนบาทถึงสอง แสนบาท หรือทังจําทังปรับ ถ้าการกระทําความผิดตามวรรคแรกได้กระทําเพือให้ผู้ถูกพาหรือสงไปนันตก อยู่ในอํานาจของผู้อืนโดยมิชอบด้วยกฎหมาย หรือเพือละทิงให้เปนคนอนาถา ผู้กระทําต้อง ระวางโทษจําคุกตังแตสามปถึงสิบห้าป และปรับตังแตหกหมืนบาทถึงสามแสนบาท"},{"section":"มาตรา ๓๒๑","num":"321","text":"ความผิดตามมาตรา ๓๐๙ วรรคแรก มาตรา ๓๑๐ วรรคแรก และมาตรา ๓๑๑ วรรคแรก เปนความผิดอันยอมความได้"},{"section":"มาตรา ๓๒๑/๑","num":"321/1","text":"เพิมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับที ๒๓) พ.ศ. ๒๕๕๘ [298] อัตราโทษ แก้ไขเพิม เติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิม เติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [299] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [300] อัตราโทษ แก้ไขเพิม เติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิม เติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [301]"},{"section":"มาตรา ๓๒๒","num":"322","text":"ผู้ใดเปดผนึกหรือเอาจดหมาย โทรเลขหรือเอกสารใด ๆ ซึง ปดผนึกของผู้อืนไป เพือลวงรูข ้ ้อความก็ดี เพือนําข้อความในจดหมายโทรเลขหรือเอกสารเชนว่า นันออกเปดเผยก็ดถ้าการกระทํานันน่าจะเกิดความเสยหายแกผู้หนึงผู้ใด ต้องระวางโทษจําคุก ไม่เกินหกเดือน หรือปรับไม่เกินหนึงหมืนบาท หรือทัง จําทัง ปรับ"},{"section":"มาตรา ๓๒๓","num":"323","text":"ผู้ใดลวงรูห ้ รือได้มาซึงความลับของผู้อืนโดยเหตุทีเปน เจ้าพนักงานผู้มหน้าที โดยเหตุทประกอบอาชพเปนแพทย์ เภสัชกร คนจําหน่ายยา นางผดุง ครรภ์ ผู้พยาบาล นักบวช หมอความ ทนายความหรือผู้สอบบัญชหรือโดยเหตุทีเปนผู้ชวยใน การประกอบอาชพนัน แล้วเปดเผยความลับนันในประการทน่าจะเกิดความเสยหายแกผู้หนึงผู้ ใด ต้องระวางโทษจําคุกไม่เกินหกเดือน หรือปรับไม่เกินหนึงหมืนบาท หรือทังจําทังปรับ ผู้รบ ั การศึกษาอบรมในอาชพดังกล่าวในวรรคแรก เปดเผยความลับของผู้อืน อันตนได้ลวงรูห ้ รือได้มาในการศึกษาอบรมนัน ในประการทน่าจะเกิดความเสยหายแกผู้หนึงผู้ ใด ต้องระวางโทษเชนเดยวกัน"},{"section":"มาตรา ๓๒๔","num":"324","text":"ผู้ใดโดยเหตุทตนมตําแหนงหน้าทวิชาชพหรืออาชพอันเปน ทีไว้วางใจ ลวงรูห ้ รือได้มาซึงความลับของผู้อืนเกยวกับอุตสาหกรรม การค้นพบ หรือการนิมิต ในวิทยาศาสตร์ เปดเผยหรือใช้ความลับนันเพือประโยชน์ตนเองหรือผู้อืน ต้องระวางโทษจําคุก ไม่เกินหกเดือน หรือปรับไม่เกินหนึงหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๒๕","num":"325","text":"ความผิดในหมวดนีเปนความผิดอันยอมความได้ หมวด ๓ ความผิดฐานหมินประมาท"},{"section":"มาตรา ๓๒๖","num":"326","text":"ผู้ใดใสความผู้อืนตอบุคคลทสาม โดยประการทน่าจะทําให้ ผู้อืนนันเสยชือเสยง ถูกดูหมิน หรือถูกเกลยดชัง ผู้นันกระทําความผิดฐานหมินประมาท ต้อง ระวางโทษจําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๒๗","num":"327","text":"ผู้ใดใสความผู้ตายตอบุคคลทสามและการใสความนันน่าจะ เปนเหตุให้ บิดา มารดา คู่สมรสหรือบุตรของผู้ตายเสยชือเสยง ถูกดูหมินหรือถูกเกลยดชัง ผู้นัน กระทําความผิดฐานหมินประมาท ต้องระวางโทษดังบัญญัติไว้ในมาตรา ๓๒๖ นัน"},{"section":"มาตรา ๓๒๘","num":"328","text":"ถ้าความผิดฐานหมินประมาทได้กระทําโดยการโฆษณา ด้วยเอกสาร ภาพวาด ภาพระบายสภาพยนตร์ ภาพหรือตัวอักษรททําให้ปรากฏไมว่าด้วยวิธใี ด ๆ แผนเสยง หรือสิงบันทึกเสยง บันทึกภาพ หรือบันทึกอักษร กระทําโดยการกระจายเสยง หรือ การกระจายภาพ หรือโดยกระทําการปาวประกาศด้วยวิธอ ี ืน ผู้กระทําต้องระวางโทษจําคุกไม่ เกินสองป และปรับไม่เกินสองแสนบาท"},{"section":"มาตรา ๓๒๙","num":"329","text":"ผู้ใดแสดงความคิดเห็นหรือข้อความใดโดยสุจริต (๑) เพือความชอบธรรม ปองกันตนหรือปองกันสวนได้เสยเกยวกับตนตาม คลองธรรม (๒) ในฐานะเปนเจ้าพนักงานปฏิบัติการตามหน้าที (๓) ติชมด้วยความเปนธรรม ซึงบุคคลหรือสิงใดอันเปนวิสัยของประชาชนยอม กระทํา หรือ (๔) ในการแจ้งข่าวด้วยความเปนธรรมเรือ งการดําเนินการอันเปดเผยในศาล หรือในการประชุม ผู้นันไมมีความผิดฐานหมิน ประมาท"},{"section":"มาตรา ๓๓๐","num":"330","text":"ในกรณหมินประมาท ถ้าผู้ถูกหาว่ากระทําความผิด พิสูจน์ได้ว่า ข้อทหาว่าเปนหมินประมาทนันเปนความจริง ผู้นันไมต้องรับโทษ แตห้ามไม่ให้พิสูจน์ ถ้าข้อทหาว่าเปนหมินประมาทนันเปนการใสความในเรือ ง สวนตัว และการพิสูจน์จะไม่เปนประโยชน์แกประชาชน"},{"section":"มาตรา ๓๓๑","num":"331","text":"คู่ความ หรือทนายความของคู่ความ ซึงแสดงความคิดเห็น หรือ ข้อความในกระบวนพิจารณาคดีในศาล เพือประโยชน์แกคดของตน ไมมีความผิดฐานหมิน ประมาท"},{"section":"มาตรา ๓๓๒","num":"332","text":"ในคดหมิน ประมาทซึงมคําพิพากษาว่าจําเลยมความผิด ศาล อาจสัง (๑) ให้ยึด และทําลายวัตถุหรือสวนของวัตถุทมีข้อความหมินประมาท (๒) ให้โฆษณาคําพิพากษาทังหมด หรือแตบางสวนในหนังสือพิมพ์หนึงฉบับ หรือหลายฉบับ ครัง เดยวหรือหลายครัง โดยให้จําเลยเปนผู้ชําระค่าโฆษณา"},{"section":"มาตรา ๓๓๓","num":"333","text":"ความผิดในหมวดนีเปนความผิดอันยอมความได้ ถ้าผู้เสยหายในความผิดฐานหมินประมาทตายเสยกอนร้องทุกข์ ให้บิดา มารดา คู่สมรสหรือบุตรของผู้เสยหายร้องทุกข์ได้ และให้ถือว่าเปนผู้เสยหาย ลักษณะ ๑๒ ความผิดเกยวกับทรัพย์ หมวด ๑ ความผิดฐานลักทรัพย์และวิงราวทรัพย์"},{"section":"มาตรา ๓๓๔","num":"334","text":"ผู้ใดเอาทรัพย์ของผู้อืน หรือทผู้อืนเปนเจ้าของรวมอยู่ด้วย ไปโดยทุจริต ผู้นันกระทําความผิดฐานลักทรัพย์ ต้องระวางโทษจําคุกไม่เกินสามป และปรับไม่ เกินหกหมืนบาท"},{"section":"มาตรา ๓๓๕","num":"335","text":"ผู้ใดลักทรัพย์ (๑) ในเวลากลางคืน (๒) ในทหรือบริเวณทมีเหตุเพลิงไหม้ การระเบิด อุทกภัย หรือในทหรือบริเวณ ทมีอุบัติเหตุ เหตุทุกขภัยแกรถไฟ หรือยานพาหนะอืนทประชาชนโดยสาร หรือภัยพิบัติอืน ทํานองเดยวกันหรืออาศัยโอกาสทมีเหตุเชนว่านัน หรืออาศัยโอกาสทประชาชนกําลังตืนกลัว ภยันอันตรายใด ๆ (๓) โดยทําอันตรายสิง กดกันสําหรับคุ้มครองบุคคลหรือทรัพย์ หรือโดยผ่าน สิงเชนว่านันเข้าไปด้วยประการใด ๆ (๔) โดยเข้าทางชองทางซึงได้ทําขึนโดยไม่ได้จํานงให้เปนทางคนเข้า หรือเข้า ทางชองทางซึงผู้เปนใจเปดไว้ให้ (๕) โดยแปลงตัวหรือปลอมตัวเปนผู้อืน มอมหน้าหรือทําด้วยประการอืนเพือ ไม่ให้เห็นหรือจําหน้าได้ (๖) โดยลวงว่าเปนเจ้าพนักงาน (๗) โดยมอาวุธ หรือโดยรวมกระทําความผิดด้วยกันตังแตสองคนขึนไป (๘) ในเคหสถาน สถานทราชการหรือสถานททีจัดไว้เพือให้บริการสาธารณทตนได้เข้าไปโดยไม่ได้รบ"},{"section":"มาตรา ๓๓๕ ทวิ","num":"335 ทวิ","text":"ผู้ใดลักทรัพย์ทีเปนพระพุทธรูปหรือวัตถุในทางศาสนา ถ้าทรัพย์นันเปนทสักการะบูชาของประชาชน หรือเก็บรักษาไว้เปนสมบัติของชาติ หรือสวนหนึง สวนใดของพระพุทธรูป หรือวัตถุดังกล่าว ต้องระวางโทษ[308]จําคุกตังแตสามปถึงสิบป และ ปรับตังแตหกหมืนบาทถึงสองแสนบาท ถ้าการกระทําความผิดตามวรรคแรก ได้กระทําในวัด สํานักสงฆ์ สถานอันเปน ทีเคารพในทางศาสนา โบราณสถานอันเปนทรัพย์สินของแผนดิน สถานทราชการหรือ พิพิธภัณฑสถานแหงชาติ ผู้กระทําต้องระวางโทษจําคุกตังแตห้าปถึงสิบห้าป และปรับตังแตหนึงแสนบาทถึงสามแสนบาท"},{"section":"มาตรา ๓๓๖","num":"336","text":"ผู้ใดลักทรัพย์โดยฉกฉวยเอาซึงหน้า ผู้นันกระทําความ ผิดฐานวิงราวทรัพย์ ต้องระวางโทษจําคุกไม่เกินห้าป และปรับไม่เกินหนึงแสนบาท ถ้าการวิงราวทรัพย์เปนเหตุให้ผู้อืนรับอันตรายแกกายหรือจิตใจ ผู้กระทําต้อง ระวางโทษจําคุกตังแตสองปถึงเจ็ดป และปรับตังแตสีหมืนบาทถึงหนึงแสนสหมืนบาท ถ้าการวิงราวทรัพย์เปนเหตุให้ผู้อืนรับอันตรายสาหัส ผู้กระทําต้องระวางโทษ จําคุกตังแตสามปถึงสิบป และปรับตังแตหกหมืนบาทถึงสองแสนบาท ถ้าการวิงราวทรัพย์เปนเหตุให้ผู้อืนถึงแกความตาย ผู้กระทําต้องระวางโทษ จําคุกตังแตห้าปถึงสิบห้าป และปรับตังแตหนึงแสนบาทถึงสามแสนบาท"},{"section":"มาตรา ๓๓๖ ทวิ","num":"336 ทวิ","text":"เพิมโดยประกาศของคณะปฏิวัติ ฉบับที ๑๑ ลงวันที ๒๑ พฤศจิกายน พ.ศ. ๒๕๑๔ [311] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [312] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [313]"},{"section":"มาตรา ๓๓๗","num":"337","text":"ผู้ใดขมขืนใจผู้อืนให้ยอมให้หรือยอมจะให้ตนหรือผู้อืนได้ ประโยชน์ในลักษณะทีเปนทรัพย์สินโดยใช้กําลังประทุษร้ายหรือโดยขู่เข็ญว่าจะทําอันตรายตอ ชวิต ร่างกาย เสรภาพ ชือเสยงหรือทรัพย์สินของผู้ถูกขู่เข็ญหรือของบุคคลทสาม จนผู้ถูกขม ขืนใจยอมเชนว่านัน ผู้นันกระทําความผิดฐานกรรโชก ต้องระวางโทษจําคุกไม่เกินห้าป และ ปรับไม่เกินหนึงแสนบาท ถ้าความผิดฐานกรรโชกได้กระทําโดย (๑) ขู่ว่าจะฆ่า ขู่ว่าจะทําร้ายร่างกายให้ผู้ถูกขมขืนใจหรือผู้อืนให้ได้รบ ั อันตราย สาหัส หรือขู่ว่าจะทําให้เกิดเพลิงไหม้แกทรัพย์ของผู้ถูกขมขืนใจหรือผู้อืน หรือ (๒) มอาวุธติดตัวมาขู่เข็ญ ผู้กระทําต้องระวางโทษจําคุกตังแตหกเดือนถึงเจ็ดป และปรับตังแตหนึงหมืน บาทถึงหนึงแสนสหมืนบาท"},{"section":"มาตรา ๓๓๘","num":"338","text":"ผู้ใดขมขืนใจผู้อืนให้ยอมให้หรือยอมจะให้ตนหรือผู้อืนได้ ประโยชน์ในลักษณะทีเปนทรัพย์สินโดยขู่เข็ญว่าจะเปดเผยความลับ ซึงการเปดเผยนันจะทําให้ ผู้ถูกขู่เข็ญหรือบุคคลทสามเสยหาย จนผู้ถูกขมขืนใจยอมเชนว่านัน ผู้นันกระทําความผิดฐานรด เอาทรัพย์ ต้องระวางโทษจําคุกตังแตหนึงปถึงสิบป และปรับตังแตสองหมืนบาทถึงสองแสน บาท"},{"section":"มาตรา ๓๓๙","num":"339","text":"ผู้ใดลักทรัพย์โดยใช้กําลังประทุษร้าย หรือขู่เข็ญว่าในทันใด นันจะใช้กําลังประทุษร้าย เพือ (๑) ให้ความสะดวกแกการลักทรัพย์หรือการพาทรัพย์นันไป (๒) ให้ยืนให้ซึงทรัพย์นัน (๓) ยึดถือเอาทรัพย์นันไว้ (๔) ปกปดการกระทําความผิดนัน หรือ (๕) ให้พ้นจากการจับกุม ผู้นันกระทําความผิดฐานชิงทรัพย์ ต้องระวางโทษ[314]จําคุกตังแตห้าปถึงสิบป และปรับตังแตหนึงแสนบาทถึงสองแสนบาท ถ้าความผิดนันเปนการกระทําทประกอบด้วยลักษณะดังทบัญญัติไว้ในอนุ มาตราหนึงอนุมาตราใดแหงมาตรา ๓๓๕ หรือเปนการกระทําตอทรัพย์ทีเปนโค กระบือ เครือ งกลหรือเครือ งจักรทผู้มอาชพกสิกรรมมีไว้สําหรับประกอบกสิกรรม ผู้กระทําต้องระวาง โทษจําคุกตังแตสิบปถึงสิบห้าป และปรับตังแตสองแสนบาทถึงสามแสนบาท[315] ถ้าการชิงทรัพย์เปนเหตุให้ผู้อืนรับอันตรายแกกายหรือจิตใจ ผู้กระทําต้อง ระวางโทษจําคุกตังแตสิบปถึงยสิบป และป"},{"section":"มาตรา ๓๓๙ ทวิ","num":"339 ทวิ","text":"ถ้าการชิงทรัพย์ได้กระทําตอทรัพย์ตามมาตรา ๓๓๕ ทวิ วรรคแรก ผู้กระทําต้องระวางโทษ[317]จําคุกตังแตสิบปถึงสิบห้าป และปรับตังแตสองแสนบาท ถึงสามแสนบาท[318] ถ้าการชิงทรัพย์นันเปนการกระทําในสถานทดังทบัญญัติไว้ในมาตรา ๓๓๕ ทวิ วรรคสองด้วย ผู้กระทําต้องระวางโทษจําคุกตังแตสิบปถึงยสิบป และปรับตังแตสองแสนบาท ถึงสีแสนบาท ถ้าการชิงทรัพย์ตามวรรคแรกหรือวรรคสองเปนเหตุให้ผู้อืนรับอันตรายแกกายหรือจิตใจ ผู้กระทําต้องระวางโทษจําคุกตังแตสิบห้าปถึงยสิบป และปรับตังแตสามแสน บาทถึงสีแสนบาท ถ้าการชิงทรัพย์ตามวรรคแรกหรือวรรคสองเปนเหตุให้ผู้อืนรับอันตรายสาหัส ผู้กระทําต้องระวางโทษจําคุกตลอดชวิต หรือจําคุกตังแตสิบห้าปถึงยสิบป ถ้าการชิงทรัพย์ตามวรรคแรกหรือวรรคสองเปนเหตุให้ผู้อืนถึงแกความตาย ผู้ กระทําต้องระวางโทษประหารชวิต"},{"section":"มาตรา ๓๔๐","num":"340","text":"ผู้ใดชิงทรัพย์โดยรวมกันกระทําความผิดด้วยกันตังแตสาม คนขึนไป ผู้นันกระทําความผิดฐานปล้นทรัพย์ ต้องระวางโทษ[320]จําคุกตังแตสิบปถึงสิบห้าป และปรับตังแตสองแสนบาทถึงสามแสนบาท ถ้าในการปล้นทรัพย์ ผู้กระทําแม้แตคนหนึงคนใดมอาวุธติดตัวไปด้วย ผู้ กระทําต้องระวางโทษจําคุกตังแตสิบสองปถึงยสิบป และปรับตังแตสองแสนสหมืนบาทถึงสี แสนบาท ถ้าการปล้นทรัพย์เปนเหตุให้ผู้อืนรับอันตรายสาหัส ผู้กระทําต้องระวางโทษ จําคุกตลอดชวิต หรือจําคุกตังแตสิบห้าปถึงยสิบป ถ้าการปล้นทรัพย์ได้กระทําโดยแสดงความทารุณจนเปนเหตุให้ผู้อืนรับ อันตรายแกกายหรือจิตใจ ใช้ปนยิง ใช้วัตถุระเบิด หรือกระทําทรมาน ผู้กระทําต้องระวางโทษ จําคุกตลอดชวิต หรือจําคุกตังแตสิ ันกระทําความผิดฐานฉ้อโกง ต้องระวางโทษจําคุกไม่เกินสาม ป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๔๒","num":"342","text":"ถ้าในการกระทําความผิดฐานฉ้อโกง ผู้กระทํา (๑) แสดงตนเปนคนอืน หรือ (๒) อาศัยความเบาปญญาของผู้ถูกหลอกลวงซึงเปนเด็ก หรืออาศัยความ ออนแอแหงจิตของผู้ถูกหลอกลวง ผู้กระทําต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือ ทังจําทังปรับ"},{"section":"มาตรา ๓๔๓","num":"343","text":"ถ้าการกระทําความผิดตามมาตรา ๓๔๑ ได้กระทําด้วยการ แสดงข้อความอันเปนเท็จตอประชาชน หรือด้วยการปกปดความจริง ซึงควรบอกให้แจ้งแกประชาชน ผู้กระทําต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทัง ปรับ” ถ้าการกระทําความผิดดังกล่าวในวรรคแรก ต้องด้วยลักษณะดังกล่าวใน"},{"section":"มาตรา ๓๔๔","num":"344","text":"ผู้ใดโดยทุจริต หลอกลวงบุคคลตังแตสิบคนขึนไปให้ ประกอบการงานอย่างใด ๆ ให้แกตนหรือให้แกบุคคลทสาม โดยจะไม่ใช้ค่าแรงงานหรือค่าจ้าง แกบุคคลเหล่านัน หรือโดยจะใช้ค่าแรงงานหรือค่าจ้างแกบุคคลเหล่านันตากว่าทตกลงกัน ต้อง ระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๔๕","num":"345","text":"ผู้ใดสังซือและบริโภคอาหารหรือเครือ งดืม หรือเข้าอยู่ใน โรงแรม โดยรูว้ ่าตนไมสามารถชําระเงินค่าอาหาร ค่าเครือ งดืม หรือค่าอยู่ในโรงแรมนัน ต้อง ระวางโทษจําคุกไม่เกินสามเดือน หรือปรับไม่เกินห้าพันบาท หรือทัง จําทัง ปรับ"},{"section":"มาตรา ๓๔๖","num":"346","text":"ผู้ใดเพือเอาทรัพย์สินของผู้อืนเปนของตนหรือของบุคคลทสาม ชักจูงผู้หนึงผู้ใดให้จําหน่ายโดยเสยเปรยบซึงทรัพย์สิน โดยอาศัยเหตุทผู้ถูกชักจูงมจิตออนแอหรือเปนเด็กเบาปญญา และไมสามารถเข้าใจตามควรซึงสาระสําคัญแหงการกระทํา ของตน จนผู้ถูกชักจูงจําหน่ายซึงทรัพย์สินนัน ต้องระวางโทษจําคุกไม่เกินสองป หรือปรับไม่ เกินสหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๔๗","num":"347","text":"ผู้ใดเพือให้ตนเองหรือผู้อืนได้รบ ั ประโยชน์จากการประกัน วินาศภัย แกล้งทําให้เกิดเสยหายแกทรัพย์สินอันเปนวัตถุทีเอาประกันภัย ต้องระวางโทษจําคุก ไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๔๘","num":"348","text":"ความผิดในหมวดนนอกจากความผิดตามมาตรา ๓๔๓ เปน ความผิดอันยอมความได้ หมวด ๔ ความผิดฐานโกงเจ้าหนี"},{"section":"มาตรา ๓๔๙","num":"349","text":"ผู้ใดเอาไปเสย ทําให้เสยหาย ทําลาย ทําให้เสือมค่า หรือทํา ให้ไร้ประโยชน์ซึงทรัพย์อันตนจํานําไว้แกผู้อืน ถ้าได้กระทําเพือให้เกิดความเสยหายแกผู้รบ ั จํานํา ต้องระวางโทษจําคุกไม่เกินสองป หรือปรับไม่เกินสหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๕๐","num":"350","text":"ผู้ใดเพือมิให้เจ้าหนของตนหรือของผู้อืนได้รบ ั ชําระหนทังหมดหรือแตบางสวน ซึงได้ใช้หรือจะใช้สิทธิเรยกร้องทางศาลให้ชําระหนย้ายไปเสย ซอนเร้น หรือโอนไปให้แกผู้อืนซึงทรัพย์ใดก็ดี แกล้งให้ตนเองเปนหนจํานวนใดอันไม่เปนความจริงก็ดต้องระวางโทษจําคุกไม่เกินสองป หรือปรับไม่เกินสหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๕๑","num":"351","text":"ความผิดในหมวดนีเปนความผิดอันยอมความได้ หมวด ๕ ความผิดฐานยักยอก"},{"section":"มาตรา ๓๕๒","num":"352","text":"ผู้ใดครอบครองทรัพย์ซึงเปนของผู้อืนหรือซึงผู้อืนเปน เจ้าของรวมอยู่ด้วย เบยดบังเอาทรัพย์นันเปนของตนหรือบุคคลทสามโดยทุจริต ผู้นันกระทํา ความผิดฐานยักยอก ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจํา ทังปรับ ถ้าทรัพย์นันได้ตกมาอยู่ในความครอบครองของผู้กระทําความผิด เพราะผู้อืน สงมอบให้โดยสําคัญผิดไปด้วยประการใด หรือเปนทรัพย์สินหายซึงผู้กระทําความผิดเก็บได้ ผู้ กระทําต้องระวางโทษแต่เพยงกึงหนึง"},{"section":"มาตรา ๓๕๓","num":"353","text":"ผู้ใดได้รบ ั มอบหมายให้จัดการทรัพย์สินของผู้อืน หรือ ทรัพย์สินซึงผู้อืนเปนเจ้าของรวมอยู่ด้วย กระทําผิดหน้าทของตนด้วยประการใด ๆ โดยทุจริต จนเปนเหตุให้เกิดความเสยหายแกประโยชน์ในลักษณะทีเปนทรัพย์สินของผู้นัน ต้องระวางโทษ จําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๕๔","num":"354","text":"และมาตรา ๓๕๗ และภายในเวลาสิบป นับแตวันทผู้นันได้พ้นจากการกักกัน หรือพ้นโทษแล้วแตกรณผู้นันได้กระทําความผิดอย่างหนึงอย่างใดในบรรดาทระบุไว้นันอกจนศาลพิพากษาลง โทษจําคุกไมตากว่าหกเดือนสําหรับการกระทําความผิดนัน ศาลอาจถือว่า ผู้นันเปนผู้กระทํา ความผิดติดนิสัย และจะพิพากษาให้กักกันมกําหนดเวลาไมน้อยกว่าสามปและไม่เกินสิบปก็ได้ ความผิดซึงผู้กระทําได้กระทําในขณะทมีอายุตากว่าสิบแปดปนัน มิให้ถือเปน ความผิดทจะนํามาพิจารณากักกันตามมาตรานี[29]"},{"section":"มาตรา ๓๕๕","num":"355","text":"ผู้ใดเก็บได้ซึงสังหาริมทรัพย์อันมค่า อันซอนหรือฝงไว้โดย พฤติการณ์ซึงไมมีผู้ใดอ้างว่าเปนเจ้าของได้แล้วเบยดบังเอาทรัพย์นันเปนของตนหรือของผู้อืน ต้องระวางโทษจําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๕๖","num":"356","text":"ความผิดในหมวดนีเปนความผิดอันยอมความได้ หมวด ๖ ความผิดฐานรับของโจร"},{"section":"มาตรา ๓๕๗","num":"357","text":"ผู้ใดชวยซอนเร้น ชวยจําหน่าย ชวยพาเอาไปเสย ซือ รับ จํานําหรือรับไว้โดยประการใดซึงทรัพย์อันได้มาโดยการกระทําความผิด ถ้าความผิดนันเข้า ลักษณะลักทรัพย์ วิงราวทรัพย์ กรรโชก รดเอาทรัพย์ ชิงทรัพย์ ปล้นทรัพย์ ฉ้อโกง ยักยอกหรือ เจ้าพนักงานยักยอกทรัพย์ ผู้นันกระทําความผิดฐานรับของโจร ต้องระวางโทษจําคุกไม่เกินห้า ป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ ถ้าการกระทําความผิดฐานรับของโจรนัน ได้กระทําเพือค้ากําไรหรือได้กระทํา ตอทรัพย์อันได้มาโดยการลักทรัพย์ตามมาตรา ๓๓๕ (๑๐) ชิงทรัพย์ หรือปล้นทรัพย์ ผู้กระทํา ต้องระวางโทษจําคุกตังแตหกเดือนถึงสิบป และปรับตังแตหนึงหมืนบาทถึงสองแสนบาท ถ้าการกระทําความผิดฐานรับของโจรนัน ได้กระทําตอทรัพย์อันได้มาโดยการ ลักทรัพย์ตามมาตรา ๓๓๕ ทวิ การชิงทรัพย์ตามมาตรา ๓๓๙ ทวิ หรือการปล้นทรัพย์ตาม"},{"section":"มาตรา ๓๕๘","num":"358","text":"ผู้ใดทําให้เสยหาย ทําลาย ทําให้เสือมค่าหรือทําให้ไร้ ประโยชน์ ซึงทรัพย์ของผู้อืนหรือผู้อืนเปนเจ้าของรวมอยู่ด้วย ผู้นันกระทําความผิดฐานทําให้ เสยทรัพย์ ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๓๕๙","num":"359","text":"ถ้าการกระทําความผิดตามมาตรา ๓๕๘ ได้กระทําตอ (๑) เครือ งกลหรือเครือ งจักรทีใช้ในการประกอบกสิกรรมหรืออุตสาหกรรม (๒) ปศุสัตว์ (๓) ยวดยานหรือสัตว์พาหนะทีใช้ในการขนสงสาธารณะหรือในการประกอบ กสิกรรมหรืออุตสาหกรรม หรือ (๔) พืชหรือพืชผลของกสิกร ผู้กระทําต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือ ทังจําทังปรับ"},{"section":"มาตรา ๓๖๐","num":"360","text":"ผู้ใดทําให้เสยหาย ทําลาย ทําให้เสือมค่าหรือทําให้ไร้ ประโยชน์ซึงทรัพย์ทีใช้หรือมีไว้เพือสาธารณประโยชน์ ต้องระวางโทษจําคุกไม่เกินห้าป หรือ ปรับไม่เกินหนึงแสนบาท หรือทังจ const isStandalone=window.matchMedia("(display-mode:standalone)").matches||navigator.standalone;

function pn(n){const x=parseInt(n.split("/")[0]);return isNaN(x)?9999:x;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function hl(t,q){
  if(!q.trim()) return esc(t);
  try{const e=q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    return esc(t).replace(new RegExp("("+e+")","gi"),"<mark>$1</mark>");}
  catch{return esc(t);}
}

function rp(){
  document.getElementById("pills").innerHTML=CATS.map(c=>
    `<button class="pill${cat===c.id?" on":""}" onclick="sc2('${c.id}')">${c.l}</button>`).join("");
}
function sc2(id){cat=id;rp();rr();}

function gr(){
  const c=CATS.find(x=>x.id===cat);
  let p=D.filter(s=>{const n=pn(s.num);return n>=c.r[0]&&n<=c.r[1];});
  if(!q.trim()) return p;
  const lq=q.trim().toLowerCase();
  const aq=lq.replace(/[๐-๙]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x0E50+48));
  return p.filter(s=>s.section.includes(q)||s.text.toLowerCase().includes(lq)||s.num===aq||s.num===lq);
}
function rr(){
  const res=gr();
  document.getElementById("rc").textContent=res.length===0?"ไม่พบผลลัพธ์":`พบ ${res.length} มาตรา${q?` · "${q}"`:""}`;
  const rl=document.getElementById("rl");
  if(!res.length){rl.innerHTML=`<div class="empty"><div class="ei">🔍</div>ไม่พบ "${esc(q)}"</div>`;return;}
  rl.innerHTML=res.map(s=>`<div class="card" onclick="opn('${esc(s.num)}')">
    <div class="ch"><span class="badge">${esc(s.section)}</span><span class="hint">✦ AI อธิบาย</span></div>
    <div class="ct">${hl(s.text,q)}</div></div>`).join("");
}

const inp=document.getElementById("si"),cb=document.getElementById("cb");
inp.addEventListener("input",e=>{q=e.target.value;cb.style.display=q?"block":"none";rr();});
function cls(){q="";inp.value="";cb.style.display="none";rr();inp.focus();}

function opn(num){
  const s=D.find(x=>x.num===num);if(!s)return;
  document.getElementById("sb2").textContent=s.section;
  document.getElementById("sb3").innerHTML=`
    <div class="box"><div class="bl">📜 ข้อความตามกฎหมาย</div><div class="lt">${esc(s.text)}</div></div>
    <div class="box"><div class="bl ai">✦ คำอธิบายโดย AI</div>
    <div id="ac"><div class="al"><span class="sp">⟳</span>กำลังวิเคราะห์...</div></div></div>`;
  document.getElementById("ds").classList.add("on");
  document.getElementById("ov").classList.add("on");
  document.body.style.overflow="hidden";
  aiCall(s);
}
function cld(){
  document.getElementById("ds").classList.remove("on");
  document.getElementById("ov").classList.remove("on");
  document.body.style.overflow="";
}

async function aiCall(s){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        messages:[{role:"user",content:`คุณเป็นผู้เชี่ยวชาญกฎหมายอาญาไทย อธิบาย ${s.section} ให้เข้าใจง่าย

ข้อความ: "${s.text}"

ตอบเป็นภาษาไทย:
1. สรุปสาระสำคัญ
2. องค์ประกอบความผิด
3. โทษที่กำหนด
4. ตัวอย่างในชีวิตจริง`}]})});
    const d=await r.json();
    const ans=d.content?.[0]?.text;
    const ac=document.getElementById("ac");if(!ac)return;
    if(ans){
      ac.innerHTML=ans.split("\n").map(l=>`<div class="ap${/^\d+\./.test(l.trim())?" n":""}">${esc(l)}</div>`).join("");
      ac.classList.add("fu");
      addH(s,ans);
    }else ac.innerHTML=`<div class="aerr">ไม่สามารถดึงข้อมูลได้</div>`;
  }catch(e){const ac=document.getElementById("ac");if(ac)ac.innerHTML=`<div class="aerr">Error: ${esc(e.message)}</div>`;}
}

function addH(s,ans){
  hist=hist.filter(x=>x.num!==s.num);
  hist.unshift({...s,ans,t:new Date()});hist=hist.slice(0,20);
  document.getElementById("hc").textContent=hist.length;rh();
}
function rh(){
  const he=document.getElementById("he"),hl2=document.getElementById("hl");
  if(!hist.length){he.style.display="";hl2.innerHTML="";return;}
  he.style.display="none";
  hl2.innerHTML=hist.map(h=>`<div class="hcard" onclick="opn('${esc(h.num)}')">
    <span class="badge">${esc(h.section)}</span>
    <div style="font-size:12px;color:#64748b;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(h.text)}</div>
    <div class="ht">${h.t.toLocaleTimeString("th-TH")}</div></div>`).join("");
}

function stab(t){
  document.getElementById("rp").style.display=t==="s"?"":"none";
  document.getElementById("hp").style.display=t==="h"?"":"none";
  document.getElementById("ts").classList.toggle("on",t==="s");
  document.getElementById("th").classList.toggle("on",t==="h");
}

// Install
function showGuide(){
  if(isIOS) document.getElementById("ig").style.display="block";
  else if(dp) doInstall();
}
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();dp=e;
  document.getElementById("ib").style.display="block";
  document.getElementById("inst-btn").style.display="block";
});
window.addEventListener("appinstalled",()=>{
  document.getElementById("ib").style.display="none";
  document.getElementById("inst-btn").style.display="none";dp=null;
});
async function doInstall(){
  if(dp){dp.prompt();const{outcome}=await dp.userChoice;
    if(outcome==="accepted")document.getElementById("ib").style.display="none";dp=null;}
  else if(isIOS) document.getElementById("ig").style.display="block";
}
if(isIOS&&!isStandalone) document.getElementById("inst-btn").style.display="block";

// Register service worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").then(r=>console.log("SW ok",r.scope)).catch(e=>console.warn("SW fail",e));
}

rp();rr();
</script>
</body>
</html>
