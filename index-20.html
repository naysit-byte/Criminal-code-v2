<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="กฎหมายอาญา">
<title>ประมวลกฎหมายอาญา</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --bg:#09090f;--bg1:#0f1117;--bg2:#151b27;--bg3:#1a2235;
  --border:#1e2d3d;--border2:#2d3f52;
  --text:#e8edf5;--text2:#94a3b8;--text3:#475569;
  --gold:#f59e0b;--red:#dc2626;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,"Sarabun","Noto Sans Thai",sans-serif}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#header{background:linear-gradient(180deg,#0d1420,#0f1117);border-bottom:1px solid var(--border);
  padding:10px 16px 8px;padding-top:calc(10px + var(--sat));flex-shrink:0}
.hrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--red));
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ttl{font-size:16px;font-weight:700;color:#f1f5f9;line-height:1.2}
.sub{font-size:10px;color:var(--text3);margin-top:1px}
.sw{position:relative;margin-bottom:7px}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
#si{width:100%;padding:9px 36px 9px 32px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-size:15px;font-family:inherit;outline:none;
  -webkit-appearance:none;transition:border .15s}
#si:focus{border-color:var(--gold)}
#si::placeholder{color:var(--text3)}
#cb{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;
  color:var(--text3);font-size:20px;cursor:pointer;display:none;padding:2px;line-height:1}
.pills{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:11px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s}
.pill.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600}
.tabs{display:flex;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0}
.tb{flex:1;padding:8px 0;font-size:12px;font-family:inherit;background:none;border:none;
  color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-weight:500}
.tb.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
#rp{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.rc{font-size:11px;color:var(--text3);padding:8px 15px 4px}
.rl{padding:0 13px 120px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:11px;
  padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all .12s;-webkit-user-select:none}
.card:active{background:var(--bg2);border-color:var(--gold);transform:scale(.985)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--red));
  color:#000;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700}
.hint{color:var(--gold);font-size:10.5px}
.ct{font-size:12.5px;color:var(--text2);line-height:1.7;display:-webkit-box;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;opacity:0;
  pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
#ov.on{opacity:1;pointer-events:all}
#ds{position:fixed;bottom:0;left:0;right:0;background:#0d1420;
  border-top:1px solid var(--border);border-radius:18px 18px 0 0;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  z-index:100;max-height:85dvh;display:flex;flex-direction:column;
  padding-bottom:var(--sab)}
#ds.on{transform:translateY(0)}
.hdl{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:8px auto 0;flex-shrink:0}
.shead{display:flex;justify-content:space-between;align-items:center;
  padding:8px 15px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.scl{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);
  border-radius:7px;padding:5px 11px;font-size:12.5px;font-family:inherit;cursor:pointer}
.sb{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 15px;flex:1}
.box{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:11px}
.bl{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.bl.ai{color:var(--gold)}
.lt{font-size:13px;color:var(--text2);line-height:1.85;white-space:pre-wrap}
.al{display:flex;align-items:center;gap:7px;color:var(--text3);font-size:12.5px}
.sp{animation:spin 1s linear infinite;display:inline-block}
.aerr{color:#ef4444;font-size:12.5px}
.ap{margin:2px 0;font-size:13px;color:#cbd5e1;line-height:1.9}
.ap.n{margin:9px 0 3px;font-weight:600;color:var(--gold);font-size:13.5px}
#hp{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:8px 13px 100px}
.hcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:10px 13px;margin-bottom:6px;cursor:pointer}
.hcard:active{border-color:var(--border2)}
.ht{font-size:10px;color:var(--text3);margin-top:5px}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.ei{font-size:38px;margin-bottom:10px}
/* install banner */
#ib{display:none;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;
  padding:9px 15px;font-size:12.5px;font-weight:600;cursor:pointer;flex-shrink:0;text-align:center}
#ib span{font-size:11px;font-weight:400;display:block}
/* ios guide */
#ig{display:none;background:#1a2235;border-bottom:1px solid var(--border2);
  padding:10px 15px;font-size:12px;flex-shrink:0;position:relative}
#ig b{color:var(--gold)}
#igc{position:absolute;right:12px;top:10px;background:none;border:none;
  color:var(--text3);font-size:20px;cursor:pointer;font-family:inherit}
mark{background:#fbbf24;color:#000;border-radius:2px;padding:0 1px}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:up .25s ease}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="hrow">
      <div class="logo">⚖️</div>
      <div style="flex:1">
        <div class="ttl">ประมวลกฎหมายอาญา</div>
        <div class="sub">พ.ศ. ๒๕๖๙ • 448 มาตรา • AI อธิบาย</div>
      </div>
      <button id="inst-btn" style="display:none;background:var(--bg2);border:1px solid var(--border2);
        color:var(--gold);border-radius:8px;padding:5px 10px;font-size:11.5px;cursor:pointer;
        font-family:inherit;flex-shrink:0" onclick="showGuide()">📲 ติดตั้ง</button>
    </div>
    <div class="sw">
      <span class="si">🔍</span>
      <input type="search" id="si" placeholder="ค้นหา เช่น ฆ่า, ลักทรัพย์, มาตรา 288..." autocomplete="off" spellcheck="false">
      <button id="cb" onclick="cls()">×</button>
    </div>
    <div class="pills" id="pills"></div>
  </div>

  <div id="ib" onclick="doInstall()">
    📲 กดที่นี่เพื่อติดตั้งแอปบนหน้าจอหลัก
    <span>ใช้งานออฟไลน์ได้ • ไม่ต้องโหลดซ้ำ</span>
  </div>
  <div id="ig">
    <button id="igc" onclick="this.parentElement.style.display='none'">×</button>
    <b>📲 วิธีติดตั้งบน iPhone / iPad</b><br>
    1. กดปุ่ม <b>Share ⬆️</b> ด้านล่างหน้าจอ<br>
    2. เลื่อนหา <b>"Add to Home Screen"</b> → กด <b>Add</b>
  </div>

  <div class="tabs">
    <button class="tb on" id="ts" onclick="stab('s')">🔍 ค้นหา</button>
    <button class="tb" id="th" onclick="stab('h')">🕐 ประวัติ (<span id="hc">0</span>)</button>
  </div>

  <div id="rp">
    <div class="rc" id="rc"></div>
    <div class="rl" id="rl"></div>
  </div>
  <div id="hp">
    <div class="empty" id="he"><div class="ei">📚</div><div>ยังไม่มีประวัติ<br>คลิกมาตราใดก็ได้</div></div>
    <div id="hl"></div>
  </div>
</div>

<div id="ov" onclick="cld()"></div>
<div id="ds">
  <div class="hdl"></div>
  <div class="shead">
    <span class="badge" id="sb2"></span>
    <button class="scl" onclick="cld()">✕ ปิด</button>
  </div>
  <div class="sb" id="sb3"></div>
</div>

<script>
const D=[{"section":"มาตรา ๑","num":"1","text":"ในประมวลกฎหมายนี (๑) “โดยทุจริต” หมายความว่า เพือแสวงหาประโยชน์ทมิควรได้โดยชอบด้วย กฎหมายสําหรับตนเองหรือผู้อืน (๒) “ทางสาธารณ” หมายความว่า ทางบกหรือทางนาสําหรับประชาชนใช้ใน การจราจร และให้หมายความรวมถึงทางรถไฟและทางรถรางทมีรถเดิน สําหรับประชาชนโดย สารด้วย (๓) “สาธารณสถาน” หมายความว่า สถานทีใด ๆ ซึงประชาชนมความ ชอบธรรมทจะเข้าไปได้ (๔) “เคหสถาน” หมายความว่า ทซึงใช้เปนทอยู่อาศัย เชน เรือน โรง เรือ หรือ แพ ซึงคนอยู่อาศัย และให้หมายความรวมถึงบริเวณของทซึงใช้เปนทอยู่อาศัยนันด้วย จะมรัว ล้อมหรือไมก็ตาม (๕) “อาวุธ” หมายความรวมถึงสิงซึงไม่เปนอาวุธโดยสภาพ แตซึงได้ใช้หรือ เจตนาจะใช้ประทุษร้ายร่างกายถึงอันตรายสาหัสอย่างอาวุธ (๖) “ใช้กําลังประทุษร้าย” หมายความว่า ทําการประทุษร้ายแกกายหรือจิตใจ ของบุคคล ไมว่าจะทําด้วยใช้แรงกายภาพหรือด้วยวิธอ ี ืนใด และให้หมายความ"},{"section":"มาตรา ๒","num":"2","text":"พระราชบัญญัตินีให้ใช้บังคับตังแตวันถัดจากวันประกาศในราชกิจ จานุเบกษาเปนต้นไป หมายเหตุ :- เหตุผลในการประกาศใช้พระราชบัญญัติฉบับนคือ โดยทศาลรัฐธรรมนูญมคํา วินิจฉัยที ๔/๒๕๖๓ ลงวันที ๑๙ กุมภาพันธ์ ๒๕๖๓ วินิจฉัยว่า บทบัญญัติความผิดฐานหญิงทํา ให้ตนเองแท้งลูกหรือยอมให้ผู้อืนทําให้ตนแท้งลูก ตามมาตรา ๓๐๑ แหงประมวลกฎหมาย อาญา ขัดหรือแย้งตอมาตรา ๒๘ ของรัฐธรรมนูญแหงราชอาณาจักรไทย เนืองจากการทําแท้ง หรือการยุติการตังครรภ์เปนปญหาทังทางสังคมทางการแพทย์ และทางกฎหมายทมีความ ละเอยดออน รวมทังเปนประเด็นปญหาทีเกยวข้องกับจริยธรรมและศลธรรม ซึงถือว่าเปนความ ผิดทางอาญาและกําหนดโทษแกหญิงเพยงฝายเดยวททําให้ตนเองแท้งลูกหรือยอมให้ผู้อืนทํา ให้ตนแท้งลูก ทังนความผิดฐานทําให้แท้งลูกมีเจตนารมณ์และคุณธรรมทางกฎหมายทต้องการคุ้มครองชวิตของทารกในครรภ์ โดยเห็นถึงความสําคัญและคุณค่"},{"section":"มาตรา ๓","num":"3","text":"ถ้ากฎหมายทีใช้ในขณะกระทําความผิดแตกต่างกับกฎหมายทีใช้ใน ภายหลังการกระทําความผิด ให้ใช้กฎหมายในสวนทีเปนคุณแกผู้กระทําความผิดไมว่าในทางใด เว้นแตคดถึงทสุดแล้ว แต่ในกรณทีคดถึงทสุดแล้วดังตอไปนี (๑) ถ้าผู้กระทําความผิดยังไม่ได้รบ ั โทษ หรือกําลังรับโทษอยู่ และโทษทกําหนดตามคําพิพากษาหนักกว่าโทษทกําหนดตามกฎหมายทบัญญัติในภายหลัง เมือสํานวน ความปรากฏแกศาลหรือเมือผู้กระทําความผิด ผู้แทนโดยชอบธรรมของผู้นัน ผู้อนุบาลของผู้นัน หรือพนักงานอัยการร้องขอ ให้ศาลกําหนดโทษเสยใหมตามกฎหมายทบัญญัติในภายหลัง ใน การทศาลจะกําหนดโทษใหมนี ถ้าปรากฏว่า ผู้กระทําความผิดได้รบ ั โทษมาบ้างแล้ว เมือได้ คํานึงถึงโทษตามกฎหมายทบัญญัติในภายหลัง หากเห็นเปนการสมควร ศาลจะกําหนดโทษ น้อยกว่าโทษขันตาทกฎหมายทบัญญัติในภายหลังกําหนดไว้ถ้าหากมก็ได้ หรือถ้าเห็นว่าโทษทผู้กระทําความผิดได้รบ"},{"section":"มาตรา ๔","num":"4","text":"ผู้ใดกระทําความผิดในราชอาณาจักร ต้องรับโทษตามกฎหมาย การกระทําความผิดในเรือไทยหรืออากาศยานไทย ไมว่าจะอยู่ ณ ทีใด ให้ถือ ว่ากระทําความผิดในราชอาณาจักร"},{"section":"มาตรา ๕","num":"5","text":"ให้รฐ ั มนตรว่าการกระทรวงยุติธรรมรักษาการตามพระราชบัญญัติ นหมายเหตุ :- เหตุผลในการประกาศใช้พระราชบัญญัติฉบับนคือ เนืองจากปจจุบันบทบัญญัติ เกยวกับการลงโทษประหารชวิตและจําคุกตลอดชวิตแกผู้ซึงกระทําความผิดในขณะทมีอายุตา กว่าสิบแปดปตามประมวลกฎหมายอาญายังไมสอดคล้องกับข้อ ๖ วรรคห้า แหงกติการะหว่าง ประเทศว่าด้วยสิทธิพลเมืองและสิทธิทางการเมือง ค.ศ. ๑๙๖๖ ทกําหนดว่า บุคคลอายุตากว่า สิบแปดปทกระทําความผิดจะถูกพิพากษาประหารชวิตมิได้ และข้อ ๓๗ ก) แหงอนุสัญญาว่า ด้วยสิทธิเด็ก ค.ศ. ๑๙๘๙ ทกําหนดว่า จะไมมีเด็กคนใดได้รบ ั การทรมาน หรือถูกปฏิบัติหรือลง โทษทีโหดร้าย ไร้มนุษยธรรมหรือตาช้า จะไมมีการลงโทษประหารชวิต หรือจําคุกตลอดชวิตที ไมมีโอกาสจะได้รบ ั การปลอยตัวสําหรับความผิดทกระทําโดยบุคคลทมีอายุตากว่าสิบแปดปซึง ประเทศไทยเข้าเปนภาคนอกจากนัน บทบัญญัติตามประมวลก"},{"section":"มาตรา ๖","num":"6","text":"เมือประมวลกฎหมายได้ใช้บังคับแล้วในการจําคุกแทนค่าปรับตาม กฎหมายใด ไมว่ากฎหมายนันจะบัญญัติไว้ประการใด ให้นําประมวลกฎหมายอาญามาใช้ บังคับ แตสําหรับความผิดทีได้กระทํากอนวันทประมวลกฎหมายอาญาใช้บังคับ มิให้กักขังเกิน กว่าหนึงปสําหรับโทษปรับกระทงเดยว และสองปสําหรับโทษปรับหลายกระทง"},{"section":"มาตรา ๗","num":"7","text":"ในกรณวิธก ี ารเพือความปลอดภัยตามมาตรา ๔๖ แหงประมวล กฎหมายอาญา ให้นําบทบัญญัติแหงประมวลกฎหมายวิธพ ี ิจารณาความอาญามาใช้บังคับ เสมือนเปนความผิดอาญา แตห้ามมิให้คุมขังชันสอบสวนเกินกว่าสสิบแปดชัวโมงนับแต่เวลาทผู้ ถูกจับมาถึงททําการของพนักงานฝายปกครองหรือตํารวจ แตมิให้นับเวลาเดินทางตามปกติทนําตัวผู้ถูกจับมาศาลรวมเข้าในกําหนดเวลาสสิบแปดชัวโมงนันด้วย"},{"section":"มาตรา ๘","num":"8","text":"เมือประมวลกฎหมายอาญาได้ใช้บังคับแล้ว บทบัญญัติแหง กฎหมายใดอ้างถึงกฎหมายลักษณะอาญา หรืออ้างถึงบทบัญญัติแหงกฎหมายลักษณะอาญา ให้ถือว่าบทบัญญัติแหงกฎหมายนันอ้างถึงประมวลกฎหมายอาญา หรือบทบัญญัติแหง ประมวลกฎหมายอาญาในบทมาตราทมีนัยเชนเดยวกัน แล้วแตกรณผู้รบ ั สนองพระบรมราชโองการ จอมพล ป. พิบูลสงคราม นายกรัฐมนตรสารบาญ ประมวลกฎหมายอาญา ภาค ๑ บทบัญญัติทัวไป มาตรา ลักษณะ ๑ บทบัญญัติทีใช้แกความผิดทัว ไป หมวด ๑ บทนิยาม หมวด ๒ การใช้กฎหมายอาญา ๑ ๒-๑๗ หมวด ๓ โทษและวิธการเพือความปลอดภัย สวนที ๑ โทษ ๑๘-๓๘ สวนที ๒ วิธการเพือความปลอดภัย ๓๙-๕๐ สวนที ๓ วิธีเพิมโทษ ลดโทษ และการรอการลงโทษ หมวด ๔ ความรับผิดในทางอาญา ๕๑-๕๘ ๕๙-๗๙ หมวด ๕ การพยายามกระทําความผิด ๘๐-๘๒ หมวด ๖ ตัวการและผู้สนับสนุน ๘๓-๘๙ หมวด ๗ การกระทําความผิดหลายบทหรือหลายกระทง ๙๐-๙๑ หมวด ๘ การกระทําความผิดอก ๙๒-๙๔ หมวด ๙"},{"section":"มาตรา ๙","num":"9","text":"เจ้าพนักงานของรัฐบาลไทยกระทําความผิดตามทบัญญัติไว้ใน"},{"section":"มาตรา ๑๐","num":"10","text":"ผู้ใดกระทําการนอกราชอาณาจักรซึงเปนความผิดตาม มาตราต่าง ๆ ทระบุไว้ในมาตรา ๗ (๒) และ (๓) มาตรา ๘ และมาตรา ๙ ห้ามมิให้ลงโทษผู้นัน ในราชอาณาจักรเพราะการกระทํานันอก ถ้า (๑) ได้มคําพิพากษาของศาลในต่างประเทศอันถึงทสุดให้ปลอยตัวผู้นัน หรือ (๒) ศาลในต่างประเทศพิพากษาให้ลงโทษและผู้นันได้พ้นโทษแล้ว ถ้าผู้ต้องคําพิพากษาได้รบ ั โทษสําหรับการกระทํานันตามคําพิพากษาของ ศาลในต่างประเทศมาแล้ว แตยังไมพ้นโทษศาลจะลงโทษน้อยกว่าทกฎหมายกําหนดไว้สําหรับ ความผิดนันเพยงใดก็ได้ หรือจะไมลงโทษเลยก็ได้ ทังนี โดยคํานึงถึงโทษทผู้นันได้รบ ั มาแล้ว"},{"section":"มาตรา ๑๑","num":"11","text":"ให้ประธานศาลฎกาและรัฐมนตรว่าการกระทรวงยุติธรรมรักษา การตามพระราชบัญญัตินหมายเหตุ :- เหตุผลในการประกาศใช้พระราชบัญญัติฉบับนคือ โดยทหลักเกณฑ์และวิธก ี าร บังคับโทษปรับในเรือ งการยึดทรัพย์สินหรืออายัดสิทธิเรยกร้องในทรัพย์สินเพือใช้ค่าปรับยังไม่ ได้กําหนดไว้ และการกําหนดอัตราเงินในการกักขังแทนค่าปรับทีใช้อยู่ในปจจุบันไมสอดคล้อง กับสภาพเศรษฐกิจและสังคมทีเปลยนแปลงไป สมควรกําหนดหลักเกณฑ์และวิธก ี ารดังกล่าวให้ ชัดเจนเพือให้ผู้มหน้าทปฏิบัติงานสามารถปฏิบัติได้ รวมทังกําหนดอัตราเงินในการกักขังแทน ค่าปรับให้สอดคล้องกับค่าแรงขันตาและภาวะเศรษฐกิจ สวนบทบัญญัติว่าด้วยการรอการ กําหนดโทษหรือรอการลงโทษซึงเปนวิธก ี ารแก้ไขฟ นฟูผู้กระทําความผิดทีไมควรถูกสงเข้าสู่ ระบบเรือนจํา ยังไมมีการนํามาใช้กับผู้ทจะถูกลงโทษปรับรวมทังไม่เปดโอกาสให้ผู้ทีเคย ต้องโทษจําคุกแม้เพยงเล็กน"},{"section":"มาตรา ๑๒","num":"12","text":"วิธก ี ารเพือความปลอดภัยจะใช้บังคับแกบุคคลใดได้ก็ตอเมือมบท บัญญัติแหงกฎหมายให้ใช้บังคับได้เท่านัน และกฎหมายทจะใช้บังคับนันให้ใช้กฎหมายในขณะทศาลพิพากษา"},{"section":"มาตรา ๑๓","num":"13","text":"ถ้าตามบทบัญญัติของกฎหมายทบัญญัติในภายหลังได้มการยก เลิกวิธก ี ารเพือความปลอดภัยใด และถ้าผู้ใดถูกใช้บังคับวิธก ี ารเพือความปลอดภัยนันอยู่ ก็ให้ ศาลสังระงับการใช้บังคับวิธก ี ารเพือความปลอดภัยนันเสย เมือสํานวนความปรากฏแกศาล หรือเมือผู้นัน ผู้แทนโดยชอบธรรมของผู้นัน ผู้อนุบาลของผู้นันหรือพนักงานอัยการร้องขอ"},{"section":"มาตรา ๑๔","num":"14","text":"ในกรณทีมผู้ถูกใช้บังคับวิธก ี ารเพือความปลอดภัยใดอยู่ และได้มบทบัญญัติของกฎหมายทบัญญัติในภายหลังเปลยนแปลงเงือนไขทจะสังให้มการใช้บังคับวิธการเพือความปลอดภัยนันไป ซึงเปนผลอันไมอาจนํามาใช้บังคับแกกรณของผู้นันได้ หรือนํามา ใช้บังคับได้แตการใช้บังคับวิธก ี ารเพือความปลอดภัยตามบทบัญญัติของกฎหมายทบัญญัติใน ภายหลังเปนคุณแกผู้นันยิงกว่า เมือสํานวนความปรากฏแกศาล หรือเมือผู้นัน ผู้แทนโดย ชอบธรรมของผู้นัน ผู้อนุบาลของผู้นันหรือพนักงานอัยการร้องขอตอศาลให้ยกเลิกการใช้บังคับ วิธก ี ารเพือความปลอดภัย หรือร้องขอรับผลตามบทบัญญัติแหงกฎหมายนัน แล้วแตกรณี ให้ ศาลมอํานาจสังตามทีเห็นสมควร"},{"section":"มาตรา ๑๕","num":"15","text":"ถ้าตามบทบัญญัติของกฎหมายทบัญญัติในภายหลัง โทษใดได้ เปลยนลักษณะมาเปนวิธก ี ารเพือความปลอดภัย และได้มคําพิพากษาลงโทษนันแกบุคคลใดไว้ ก็ให้ถือว่าโทษทลงนันเปนวิธก ี ารเพือความปลอดภัยด้วย ในกรณดังกล่าวในวรรคแรก ถ้ายังไม่ได้ลงโทษผู้นันหรือผู้นันยังรับโทษอยู่ ก็ ให้ใช้บังคับวิธก ี ารเพือความปลอดภัยแกผู้นันตอไป และถ้าหากว่าตามบทบัญญัติของกฎหมาย ทบัญญัติในภายหลังมีเงือนไขทจะสังให้มการใช้บังคับวิธก ี ารเพือความปลอดภัย อันไมอาจนํา มาใช้บังคับแกกรณของผู้นันหรือนํามาใช้บังคับได้ แตการใช้บังคับวิธก ี ารเพือความปลอดภัย ตามบทบัญญัติของกฎหมายทบัญญัติในภายหลังเปนคุณแกผู้นันยิงกว่า เมือสํานวนความ ปรากฏแกศาล หรือเมือผู้นัน ผู้แทนโดยชอบธรรมของผู้นัน ผู้อนุบาลของผู้นันหรือพนักงานอัย การร้องขอตอศาลให้ยกเลิกการใช้บังคับวิธก ี ารเพือความปลอดภัย หรือร้องขอรับผลตามบท บ"},{"section":"มาตรา ๑๖","num":"16","text":"เมือศาลได้พิพากษาให้ใช้บังคับวิธก ี ารเพือความปลอดภัยแกผู้ใด แล้ว ถ้าภายหลังความปรากฏแกศาลตามคําเสนอของผู้นันเอง ผู้แทนโดยชอบธรรมของผู้นัน ผู้ อนุบาลของผู้นันหรือพนักงานอัยการว่า พฤติการณ์เกยวกับการใช้บังคับนันได้เปลยนแปลงไป จากเดิม ศาลจะสังเพิกถอนหรืองดการใช้บังคับวิธก ี ารเพือความปลอดภัยแกผู้นันไว้ชัวคราว ตามทีเห็นสมควรก็ได้"},{"section":"มาตรา ๑๗","num":"17","text":"บทบัญญัติในภาค ๑ แหงประมวลกฎหมายนี ให้ใช้ในกรณีแหง ความผิดตามกฎหมายอืนด้วย เว้นแตกฎหมายนัน ๆ จะได้บัญญัติไว้เปนอย่างอืน หมวด ๓ โทษและวิธก ี ารเพือความปลอดภัย สวนที ๑ โทษ"},{"section":"มาตรา ๑๘","num":"18","text":"โทษสําหรับลงแกผู้กระทําความผิดมดังนี (๑) ประหารชวิต (๒) จําคุก (๓) กักขัง (๔) ปรับ (๕) ริบทรัพย์สิน โทษประหารชวิตและโทษจําคุกตลอดชวิตมิให้นํามาใช้บังคับแกผู้ซึงกระทํา ความผิดในขณะทมีอายุตากว่าสิบแปดป[16] ในกรณผู้ซึงกระทําความผิดในขณะทมีอายุตากว่าสิบแปดปได้กระทําความ ผิดทมีระวางโทษประหารชวิตหรือจําคุกตลอดชวิต ให้ถือว่าระวางโทษดังกล่าวได้เปลยนเปน ระวางโทษจําคุกห้าสิบป[17]"},{"section":"มาตรา ๑๙","num":"19","text":"ผู้ใดต้องโทษประหารชวิต ให้ดําเนินการด้วยวิธฉ ี ีดยาหรือ สารพิษให้ตาย หลักเกณฑ์และวิธก ี ารประหารชวิต ให้เปนไปตามระเบยบทกระทรวงยุติธรรม กําหนด โดยประกาศในราชกิจจานุเบกษา"},{"section":"มาตรา ๒๐","num":"20","text":"บรรดาความผิดทกฎหมายกําหนดให้ลงโทษทังจําคุกและปรับ ด้วยนัน ถ้าศาลเห็นสมควรจะลงแต่โทษจําคุกก็ได้"},{"section":"มาตรา ๒๑","num":"21","text":"ในการคํานวณระยะเวลาจําคุก ให้นับวันเริม จําคุกรวมคํานวณเข้า ด้วย และให้นับเปนหนึงวันเต็มโดยไมต้องคํานึงถึงจํานวนชัวโมง ถ้าระยะเวลาทคํานวณนันกําหนดเปนเดือน ให้นับสามสิบวันเปนหนึงเดือน ถ้า กําหนดเปนป ให้คํานวณตามปปฏิทินในราชการ เมือผู้ต้องคําพิพากษาถูกจําคุกครบกําหนดแล้ว ให้ปลอยตัวในวันถัดจากวันทครบกําหนด"},{"section":"มาตรา ๒๒","num":"22","text":"โทษจําคุก ให้เริม แตวันมคําพิพากษา แตถ้าผู้ต้องคําพิพากษาถูก คุมขังกอนศาลพิพากษา ให้หักจํานวนวันทถูกคุมขังออกจากระยะเวลาจําคุกตามคําพิพากษา เว้นแตคําพิพากษานันจะกล่าวไว้เปนอย่างอืน ในกรณทีคําพิพากษากล่าวไว้เปนอย่างอืน โทษจําคุกตามคําพิพากษาเมือรวม จํานวนวันทถูกคุมขังกอนศาลพิพากษาในคดีเรือ งนันเข้าด้วยแล้ว ต้องไม่เกินอัตราโทษขันสูง ของกฎหมายทกําหนดไว้สําหรับความผิดทีได้กระทําลงนัน ทังนี ไม่เปนการ กระทบกระเทือนบทบัญญัติในมาตรา ๙๑"},{"section":"มาตรา ๒๓","num":"23","text":"ผู้ใดกระทําความผิดซึงมีโทษจําคุก และในคดนันศาลจะลงโทษ จําคุกไม่เกินสามเดือน ถ้าไมปรากฏว่าผู้นันได้รบ ั โทษจําคุกมากอน หรือปรากฏว่าได้รบ ั โทษ จําคุกมากอน แต่เปนโทษสําหรับความผิดทีได้กระทําโดยประมาทหรือความผิดลหุโทษ ศาลจะ พิพากษาให้ลงโทษกักขังไม่เกินสามเดือนแทนโทษจําคุกนันก็ได้"},{"section":"มาตรา ๒๔","num":"24","text":"ผู้ใดต้องโทษกักขัง ให้กักตัวไว้ในสถานทกักขังซึงกําหนดไว้อันมิ ใช่เรือนจํา สถานตํารวจ หรือสถานทควบคุมผู้ต้องหาของพนักงานสอบสวน[19] ถ้าศาลเห็นเปนการสมควร จะสังในคําพิพากษาให้กักขังผู้กระทําความผิดไว้ ในทอาศัยของผู้นันเอง หรือของผู้อืนทยินยอมรับผู้นันไว้ หรือสถานทอืนทอาจกักขังได้ เพือให้ เหมาะสมกับประเภทหรือสภาพของผู้ถูกกักขังก็ได้ ถ้าความปรากฏแกศาลว่า การกักขังผู้ต้องโทษกักขังไว้ในสถานทกักขังตาม วรรคหนึงหรือวรรคสอง อาจกอให้เกิดอันตรายตอผู้นัน หรือทําให้ผู้ซึงต้องพึงพาผู้ต้องโทษ กักขังในการดํารงชพได้รบ ั ความเดือดร้อนเกินสมควร หรือมพฤติการณ์พิเศษประการอืนที แสดงให้เห็นว่าไมสมควรกักขังผู้ต้องโทษกักขังในสถานทดังกล่าว ศาลจะมคําสังให้กักขังผู้ ต้องโทษกักขังในสถานทอืนซึงมิใชทีอยู่อาศัยของผู้นันเองโดยได้รบ ั ความยินยอมจากเจ้าของ หรือผู้ครอบครองสถานทก็"},{"section":"มาตรา ๒๕","num":"25","text":"ผู้ต้องโทษกักขังในสถานทซึงกําหนด จะได้รบ ั การเลยงดูจาก สถานทนัน แตภายใต้ข้อบังคับของสถานทผู้ต้องโทษกักขังมสิทธิทจะรับอาหารจากภายนอก โดยค่าใช้จ่ายของตนเอง ใช้เสือผ้าของตนเอง ได้รบ ั การเยยมอย่างน้อยวันละหนึงชัวโมง และ รับและสงจดหมายได้ ผู้ต้องโทษกักขังจะต้องทํางานตามระเบยบ ข้อบังคับและวินัย ถ้าผู้ต้องโทษกัก ขังประสงค์จะทํางานอย่างอืนก็ให้อนุญาตให้เลือกทําได้ตามประเภทงานทตนสมัคร แตต้องไมขัดตอระเบยบ ข้อบังคับ วินัย หรือความปลอดภัยของสถานทนัน"},{"section":"มาตรา ๒๖","num":"26","text":"ถ้าผู้ต้องโทษกักขังถูกกักขังในทอาศัยของผู้นันเอง หรือของผู้อืน ทยินยอมรับผู้นันไว้ ผู้ต้องโทษกักขังนันมสิทธิทจะดําเนินการในวิชาชพหรืออาชพของตนใน สถานทดังกล่าวได้ ในการนศาลจะกําหนดเงือนไขให้ผู้ต้องโทษกักขังปฏิบัติอย่างหนึงอย่างใด หรือไมก็ได้ แล้วแตศาลจะเห็นสมควร"},{"section":"มาตรา ๒๗","num":"27","text":"ถ้าในระหว่างทผู้ต้องโทษกักขังตามมาตรา ๒๓ ได้รบ ั โทษ กักขังอยู่ความปรากฏแกศาลเอง หรือปรากฏแกศาลตามคําแถลงของพนักงานอัยการหรือผู้ ควบคุมดูแลสถานทกักขังว่า (๑) ผู้ต้องโทษกักขังฝาฝนระเบยบ ข้อบังคับ หรือวินัยของสถานทกักขัง (๒) ผู้ต้องโทษกักขังไมปฏิบัติตามเงือนไขทศาลกําหนด หรือ (๓) ผู้ต้องโทษกักขังต้องคําพิพากษาให้ลงโทษจําคุก ศาลอาจเปลยนโทษกักขังเปนโทษจําคุกมกําหนดเวลาตามทศาลเห็นสมควร แตต้องไม่เกินกําหนดเวลาของโทษกักขังทผู้ต้องโทษกักขังจะต้องได้รบ ั ตอไป"},{"section":"มาตรา ๒๘","num":"28","text":"ผู้ใดต้องโทษปรับ ผู้นันจะต้องชําระเงินตามจํานวนทกําหนดไว้ใน คําพิพากษาตอศาล"},{"section":"มาตรา ๒๙","num":"29","text":"ผู้ใดต้องโทษปรับและไมชําระค่าปรับภายในสามสิบวันนับแตวันทศาลพิพากษา ผู้นันจะต้องถูกยึดทรัพย์สินหรืออายัดสิทธิเรยกร้องในทรัพย์สินเพือใช้ค่า ปรับหรือมิฉะนันจะต้องถูกกักขังแทนค่าปรับ แตถ้าศาลเห็นเหตุอันควรสงสัยว่าผู้นันจะ หลกเลยงไมชําระค่าปรับ ศาลจะสัง เรยกประกันหรือจะสัง ให้กักขังผู้นันแทนค่าปรับไปพลาง กอนก็ได้ ความในวรรคสองของมาตรา ๒๔ มิให้นํามาใช้บังคับแกการกักขังแทนค่าปรับ"},{"section":"มาตรา ๒๙/๑","num":"29/1","text":"ในกรณทีผู้ต้องโทษปรับไมชําระค่าปรับภายในกําหนดเวลา ตามมาตรา ๒๙ วรรคหนึง ให้ศาลมอํานาจออกหมายบังคับคดีเพือยึดทรัพย์สินหรืออายัดสิทธิ เรยกร้องในทรัพย์สินของผู้นันเพือใช้ค่าปรับ การบังคับคดตามวรรคหนึง ให้นําประมวลกฎหมายวิธพ ี ิจารณาความแพงมา ใช้บังคับโดยอนุโลม โดยให้เจ้าพนักงานศาลทีได้รบ ั แตงตังและพนักงานอัยการเปนผู้มอํานาจ หน้าทีในการดําเนินการบังคับคดีและให้เจ้าพนักงานบังคับคดมีอํานาจหน้าทยึดทรัพย์สินหรือ อายัดสิทธิเรยกร้องในทรัพย์สินของผู้ต้องโทษปรับและขายทอดตลาดตามทีได้รบ ั แจ้งจากศาล หรือพนักงานอัยการ ทังนมิให้หนวยงานของรัฐเรยกค่าฤชาธรรมเนยมหรือค่าใช้จ่ายจากผู้ ดําเนินการบังคับคดการตรวจสอบหาทรัพย์สินของผู้ต้องโทษปรับโดยพนักงานอัยการเพือการ บังคับคดตามวรรคสอง ให้ปฏิบัติตามหลักเกณฑ์ วิธก ี าร และเงือนไขทกําหนดในข้อบังคับของ อัยการสูงสุด บทบัญญัติมาตราน"},{"section":"มาตรา ๓๐","num":"30","text":"ในการกักขังแทนค่าปรับ ให้ถืออัตราห้าร้อยบาทตอหนึงวัน และไมว่าในกรณความผิดกระทงเดยวหรือหลายกระทง ห้ามกักขังเกินกําหนดหนึงป เว้นแต่ใน กรณทีศาลพิพากษาให้ปรับตังแตสองแสนบาทขึนไป ศาลจะสังให้กักขังแทนค่าปรับเปนระยะ เวลาเกินกว่าหนึงปแต่ไม่เกินสองปก็ได้ ในการคํานวณระยะเวลานัน ให้นับวันเริม กักขังแทนค่าปรับรวมเข้าด้วยและให้ นับเปนหนึงวันเต็มโดยไมต้องคํานึงถึงจํานวนชัว โมง ในกรณทีผู้ต้องโทษปรับถูกคุมขังกอนศาลพิพากษา ให้หักจํานวนวันทถูกคุม ขังนันออกจากจํานวนเงินค่าปรับ โดยถืออัตราห้าร้อยบาทตอหนึงวัน เว้นแตผู้นันต้องคํา พิพากษาให้ลงโทษทัง จําคุกและปรับ ในกรณีเชนว่านถ้าจะต้องหักจํานวนวันทถูกคุมขังออก จากเวลาจําคุกตามมาตรา ๒๒ ก็ให้หักออกเสยกอนเหลือเท่าใดจึงให้หักออกจากเงินค่าปรับ เมือผู้ต้องโทษปรับถูกกักขังแทนค่าปรับครบกําหนดแล้ว ให้ปลอยตัวในวันถัด จากวันที"},{"section":"มาตรา ๓๐/๑","num":"30/1","text":"ในกรณทีศาลพิพากษาปรับ ผู้ต้องโทษปรับซึงมิใชนิติบุคคล และไมมีเงินชําระค่าปรับอาจยืนคําร้องตอศาลชันต้นทพิพากษาคดีเพือขอทํางานบริการสังคม หรือทํางานสาธารณประโยชน์แทนค่าปรับ หรือถ้าความปรากฏแกศาลในขณะทพิพากษาคดว่า ผู้ต้องโทษปรับรายใดอยู่ในเกณฑ์ทจะทํางานบริการสังคมหรือทํางานสาธารณประโยชน์ตาม มาตรานีได้ และถ้าผู้ต้องโทษปรับยินยอม ศาลจะมคําสังให้ผู้นันทํางานบริการสังคมหรือทํา งานสาธารณประโยชน์แทนค่าปรับก็ได้[26] การพิจารณาคําร้องตามวรรคแรก เมือศาลได้พิจารณาถึงฐานะการเงิน ประวัติและสภาพความผิดของผู้ต้องโทษปรับแล้ว เห็นเปนการสมควร ศาลจะมคําสังให้ผู้นันทํา งานบริการสังคมหรือทํางานสาธารณประโยชน์แทนค่าปรับก็ได้ ทังนภายใต้การดูแลของ พนักงานคุมประพฤติ เจ้าหน้าทของรัฐ หนวยงานของรัฐ หรือองค์การซึงมวัตถุประสงค์เพือการ บริการสังคม การกุศลสาธารณะหรือสาธารณประโยชน์ทยินยอม"},{"section":"มาตรา ๓๐/๒","num":"30/2","text":"ถ้าภายหลังศาลมคําสังอนุญาตตามมาตรา ๓๐/๑ แล้ว ความปรากฏแกศาลเองหรือความปรากฏตามคําแถลงของโจทก์หรือเจ้าพนักงานว่าผู้ต้องโทษ ปรับมีเงินพอชําระค่าปรับได้ในเวลาทยืนคําร้องตามมาตรา ๓๐/๑ หรือฝาฝนหรือไมปฏิบัติตาม คําสังหรือเงือนไขทศาลกําหนด ศาลจะเพิกถอนคําสังอนุญาตดังกล่าวและปรับ หรือกักขังแทน ค่าปรับ โดยให้หักจํานวนวันททํางานมาแล้วออกจากจํานวนเงินค่าปรับก็ได้ ในระหว่างการทํางานบริการสังคมหรือทํางานสาธารณประโยชน์แทนค่าปรับ หากผู้ต้องโทษปรับไมประสงค์จะทํางานดังกล่าวตอไป อาจขอเปลยนเปนรับโทษปรับ หรือกัก ขังแทนค่าปรับก็ได้ ในกรณนีให้ศาลมคําสังอนุญาตตามคําร้อง โดยให้หักจํานวนวันททํางานมา แล้วออกจากจํานวนเงินค่าปรับ"},{"section":"มาตรา ๓๐/๓","num":"30/3","text":"เพิมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับที ๑๕) พ.ศ. ๒๕๔๕ [29]"},{"section":"มาตรา ๓๑","num":"31","text":"ในกรณทีศาลจะพิพากษาให้ปรับผู้กระทําความผิดหลายคน ใน ความผิดอันเดยวกัน ในกรณีเดยวกันให้ศาลลงโทษปรับเรยงตามรายตัวบุคคล"},{"section":"มาตรา ๓๒","num":"32","text":"ทรัพย์สินใดทกฎหมายบัญญัติไว้ว่า ผู้ใดทําหรือมีไว้เปนความผิด ให้รบ ิ เสยทังสิน ไมว่าเปนของผู้กระทําความผิด และมผู้ถูกลงโทษตามคําพิพากษาหรือไม่"},{"section":"มาตรา ๓๓","num":"33","text":"ในการริบทรัพย์สิน นอกจากศาลจะมอํานาจริบตามกฎหมายทบัญญัติไว้โดยเฉพาะแล้ว ให้ศาลมอํานาจสังให้รบ ิ ทรัพย์สินดังตอไปนอีกด้วย คือ (๑) ทรัพย์สินซึงบุคคลได้ใช้ หรือมีไว้เพือใช้ในการกระทําความผิด หรือ (๒) ทรัพย์สินซึงบุคคลได้มาโดยได้กระทําความผิด เว้นแตทรัพย์สินเหล่านีเปนทรัพย์สินของผู้อืนซึงมิได้รูเ้ ห็นเปนใจด้วยในการ กระทําความผิด"},{"section":"มาตรา ๓๔","num":"34","text":"บรรดาทรัพย์สิน (๑) ซึงได้ให้ตามความในมาตรา ๑๔๓ มาตรา ๑๔๔ มาตรา ๑๔๙ มาตรา ๑๕๐"},{"section":"มาตรา ๓๕","num":"35","text":"ทรัพย์สินซึงศาลพิพากษาให้รบ ิ ให้ตกเปนของแผนดิน แตศาลจะ พิพากษาให้ทําให้ทรัพย์สินนันใช้ไม่ได้หรือทําลายทรัพย์สินนันเสยก็ได้"},{"section":"มาตรา ๓๖","num":"36","text":"ในกรณทีศาลสัง ิ ทรัพย์สินตามมาตรา ๓๓ หรือมาตรา ๓๔ ให้รบ ไปแล้ว หากปรากฏในภายหลังโดยคําเสนอของเจ้าของแท้จริงว่า ผู้เปนเจ้าของแท้จริงมิได้รูเ้ ห็น เปนใจด้วยในการกระทําความผิด ก็ให้ศาลสังให้คืนทรัพย์สิน ถ้าทรัพย์สินนันยังคงมอยู่ในความ ครอบครองของเจ้าพนักงาน แตคําเสนอของเจ้าของแท้จริงนันจะต้องกระทําตอศาลภายใน หนึงปนับแตวันคําพิพากษาถึงทสุด"},{"section":"มาตรา ๓๗","num":"37","text":"ถ้าผู้ทศาลสังให้สงทรัพย์สินทรบ ิ ไมส่งภายในเวลาทศาลกําหนด ให้ศาลมอํานาจสังดังตอไปนี (๑) ให้ยึดทรัพย์สินนัน (๒) ให้ชําระราคาหรือสังยึดทรัพย์สินอืนของผู้นันชดใช้ราคาจนเต็ม หรือ (๓) ในกรณทีศาลเห็นว่า ผู้นันจะสงทรัพย์สินทสง ั ให้สงได้ แต่ไมส่ง หรือชําระ ราคาทรัพย์สินนันได้ แต่ไมชําระ ให้ศาลมอํานาจกักขังผู้นันไว้จนกว่าจะปฏิบัติตามคําสัง แต่ไม่ เกินหนึงป แตถ้าภายหลังปรากฏแกศาลเอง หรือโดยคําเสนอของผู้นันว่า ผู้นันไมสามารถสง ทรัพย์สินหรือชําระราคาได้ ศาลจะสัง ให้ปลอยตัวผู้นันไปกอนครบกําหนดก็ได้"},{"section":"มาตรา ๓๘","num":"38","text":"โทษให้เปนอันระงับไปด้วยความตายของผู้กระทําความผิด สวนที ๒ วิธก ี ารเพือความปลอดภัย"},{"section":"มาตรา ๓๙","num":"39","text":"วิธก ี ารเพือความปลอดภัย มดังนี (๑) กักกัน (๒) ห้ามเข้าเขตกําหนด (๓) เรยกประกันทัณฑ์บน (๔) คุมตัวไว้ในสถานพยาบาล (๕) ห้ามการประกอบอาชพบางอย่าง"},{"section":"มาตรา ๔๐","num":"40","text":"กักกัน คือ การควบคุมผู้กระทําความผิดติดนิสัยไว้ภายในเขต กําหนด เพือปองกันการกระทําความผิดเพือดัดนิสัย และเพือฝกหัดอาชพ"},{"section":"มาตรา ๔๑","num":"41","text":"ผู้ใดเคยถูกศาลพิพากษาให้กักกันมาแล้วหรือเคยถูกศาล พิพากษาให้ลงโทษจําคุกไมตากว่าหกเดือนมาแล้วไมน้อยกว่าสองครัง ในความผิดดังตอไปนคือ (๑) ความผิดเกยวกับความสงบสุขของประชาชน ตามทบัญญัติไว้ในมาตรา ๒๐๙ ถึงมาตรา ๒๑๖ (๒) ความผิดเกยวกับการกอให้เกิดภยันตรายตอประชาชน ตามทบัญญัติไว้ใน"},{"section":"มาตรา ๔๒","num":"42","text":"ในการคํานวณระยะเวลากักกัน ให้นับวันทศาลพิพากษาเปนวัน เริม กักกัน แตถ้ายังมีโทษจําคุกหรือกักขัง ทผู้ต้องกักกันนันจะต้องรับอยู่ก็ให้จําคุกหรือกักขัง เสยกอนและให้นับวันถัดจากวันทพ้นโทษจําคุก หรือพ้นจากกักขังเปนวันเริม กักกัน ระยะเวลากักกัน และการปลอยตัวผู้ถูกกักกัน ให้นําบทบัญญัติมาตรา ๒๑ มา ใช้บังคับโดยอนุโลม"},{"section":"มาตรา ๔๓","num":"43","text":"การฟองขอให้กักกันเปนอํานาจของพนักงานอัยการโดยเฉพาะ และจะขอรวมกันไปในฟองคดอันเปนมูลให้เกิดอํานาจฟองขอให้กักกันหรือจะฟองภายหลังก็ได้"},{"section":"มาตรา ๔๔","num":"44","text":"ห้ามเข้าเขตกําหนด คือการห้ามมิให้เข้าไปในท้องทหรือสถานทที กําหนดไว้ในคําพิพากษา"},{"section":"มาตรา ๔๕","num":"45","text":"เมือศาลพิพากษาให้ลงโทษผู้ใด และศาลเห็นสมควรเพือความ ปลอดภัยของประชาชน ไมว่าจะมคําขอหรือไมศาลอาจสังในคําพิพากษาว่าเมือผู้นันพ้นโทษ ตามคําพิพากษาแล้ว ห้ามมิให้ผู้นันเข้าในเขตกําหนดเปนเวลาไม่เกินห้าป"},{"section":"มาตรา ๔๖","num":"46","text":"ถ้าความปรากฏแกศาลตามข้อเสนอของพนักงานอัยการว่าผู้ ใดจะกอเหตุรา้ ยให้เกิดภยันตรายแกบุคคลหรือทรัพย์สินของผู้อืน หรือจะกระทําการใดให้เกิด ความเสยหายแกสง ิ แวดล้อมหรือทรัพยากรธรรมชาติตามกฎหมายเกยวกับสิงแวดล้อมและ ทรัพยากรธรรมชาติ ในการพิจารณาคดความผิดใด ไมว่าศาลจะลงโทษผู้ถูกฟองหรือไมก็ตาม เมือมีเหตุอันควรเชือว่าผู้ถูกฟองน่าจะกอเหตุรา้ ยให้เกิดภยันตรายแกบุคคลหรือทรัพย์สินของผู้ อืน หรือจะกระทําความผิดให้เกิดความเสยหายแกสง ิ แวดล้อมหรือทรัพยากรธรรมชาติตาม กฎหมายเกยวกับสิงแวดล้อมและทรัพยากรธรรมชาติ ให้ศาลมอํานาจทจะสังผู้นันให้ทําทัณฑ์ บนโดยกําหนดจํานวนเงินไม่เกินกว่าห้าหมืนบาทว่าผู้นันจะไมก่อเหตุรา้ ยหรือจะไมกระทํา ความผิดดังกล่าวแล้วตลอดเวลาทศาลกําหนดแต่ไม่เกินสองป และจะสัง ให้มประกันด้วยหรือ ไมก็ได้ ถ้าผู้นันไมยอมทําทัณฑ์บนหรือหาประกันไม่ได้ ให้ศาลมอ"},{"section":"มาตรา ๔๗","num":"47","text":"ถ้าผู้ทําทัณฑ์บนตามความในมาตรา ๔๖ กระทําผิดทัณฑ์บน ให้ ศาลมอํานาจสังให้ผู้นันชําระเงินไม่เกินจํานวนทีได้กําหนดไว้ในทัณฑ์บน ถ้าผู้นันไมชําระให้นํา บทบัญญัติในมาตรา ๒๙ และมาตรา ๓๐ มาใช้บังคับ"},{"section":"มาตรา ๔๘","num":"48","text":"ถ้าศาลเห็นว่า การปลอยตัวผู้มจิตบกพรอง โรคจิตหรือ จิตฟนเฟอน ซึงไมต้องรับโทษหรือได้รบ ั การลดโทษตามมาตรา ๖๕ จะเปนการไมปลอดภัยแกประชาชน ศาลจะสังให้สงไปคุมตัวไว้ในสถานพยาบาลก็ได้ และคําสังนศาลจะเพิกถอนเสยเมือ ใดก็ได้"},{"section":"มาตรา ๔๙","num":"49","text":"ในกรณทีศาลพิพากษาลงโทษจําคุก หรือพิพากษาว่ามความผิด แตรอการกําหนดโทษ หรือรอการลงโทษบุคคลใด ถ้าศาลเห็นว่าบุคคลนันได้กระทําความผิด เกยวเนืองกับการเสพสุราเปนอาจิณ หรือการเปนผู้ติดยาเสพติดให้โทษ ศาลจะกําหนดในคํา พิพากษาว่า บุคคลนันจะต้องไม่เสพสุรา ยาเสพติดให้โทษอย่างหนึงอย่างใด หรือทังสองอย่าง ภายในระยะเวลาไม่เกินสองปนับแตวันพ้นโทษหรือวันปลอยตัวเพราะรอการกําหนดโทษ หรือ รอการลงโทษก็ได้ ในกรณทีบุคคลดังกล่าวในวรรคแรกไมปฏิบัติตามทศาลกําหนด ศาลจะสังให้ สงไปคุมตัวไว้ในสถานพยาบาลเปนเวลาไม่เกินสองปก็ได้"},{"section":"มาตรา ๕๐","num":"50","text":"เมือศาลพิพากษาให้ลงโทษผู้ใด ถ้าศาลเห็นว่าผู้นันกระทําความ ผิดโดยอาศัยโอกาสจากการประกอบอาชพหรือวิชาชพ หรือเนืองจากการประกอบอาชพหรือ วิชาชพ และเห็นว่าหากผู้นันประกอบอาชพหรือวิชาชพนันตอไปอาจจะกระทําความผิดเชนนัน ขึนอก ศาลจะสังไว้ในคําพิพากษาห้ามการประกอบอาชพหรือวิชาชพนัน มกําหนดเวลาไม่เกิน ห้าปนับแตวันพ้นโทษไปแล้วก็ได้ สวนที ๓ วิธเี พิมโทษ ลดโทษ และการรอการลงโทษ"},{"section":"มาตรา ๕๑","num":"51","text":"แก้ไขเพิม เติมโดยพระราชบัญญัติแก้ไขเพิม เติมประมวลกฎหมายอาญา (ฉบับที ๖) พ.ศ. ๒๕๒๖ [32]"},{"section":"มาตรา ๕๒","num":"52","text":"ในการลดโทษประหารชวิต ไมว่าจะเปนการลดมาตราสวน โทษหรือลดโทษทจะลง ให้ลดดังตอไปนี (๑) ถ้าจะลดหนึงในสามให้ลดเปนโทษจําคุกตลอดชวิต (๒) ถ้าจะลดกึงหนึง ให้ลดเปนโทษจําคุกตลอดชวิต หรือโทษจําคุกตังแตยีสิบ ห้าป ถึงห้าสิบป"},{"section":"มาตรา ๕๓","num":"53","text":"ในการลดโทษจําคุกตลอดชวิต ไมว่าจะเปนการลดมาตราสวน โทษหรือลดโทษทจะลง ให้เปลยนโทษจําคุกตลอดชวิตเปนโทษจําคุกห้าสิบป"},{"section":"มาตรา ๕๔","num":"54","text":"ในการคํานวณการเพิมโทษหรือลดโทษทจะลง ให้ศาลตังกําหนด โทษทจะลงแกจําเลยเสยกอนแล้ว จึงเพิมหรือลด ถ้ามทง ั การเพิมและการลดโทษทจะลง ให้เพิม กอนแล้วจึงลดจากผลทีเพิมแล้วนัน ถ้าสวนของการเพิมเท่ากับหรือมากกว่าสวนของการลด และศาลเห็นสมควรจะไม่เพิมไมลดก็ได้"},{"section":"มาตรา ๕๕","num":"55","text":"ถ้าโทษจําคุกทผู้กระทําความผิดจะต้องรับมกําหนดเวลาเพยง สามเดือนหรือน้อยกว่า ศาลจะกําหนดโทษจําคุกให้น้อยลงอกก็ได้ หรือถ้าโทษจําคุกทผู้กระทํา ความผิดจะต้องรับ มกําหนดเวลาเพยงสามเดือนหรือน้อยกว่าและมีโทษปรับด้วย ศาลจะ กําหนดโทษจําคุกให้น้อยลง หรือจะยกโทษจําคุกเสย คงให้ปรับแตอย่างเดยวก็ได้"},{"section":"มาตรา ๕๖","num":"56","text":"ผู้ใดกระทําความผิดซึงมีโทษจําคุกหรือปรับ และในคดนันศาล จะลงโทษจําคุกไม่เกินห้าปไมว่าจะลงโทษปรับด้วยหรือไมก็ตามหรือลงโทษปรับ ถ้าปรากฏว่าผู้ นัน (๑) ไม่เคยรับโทษจําคุกมากอน หรือ (๒) เคยรับโทษจําคุกมากอนแต่เปนโทษสําหรับความผิดทีได้กระทําโดย ประมาท หรือความผิดลหุโทษ หรือเปนโทษจําคุกไม่เกินหกเดือน หรือ (๓) เคยรับโทษจําคุกมากอนแตพ้นโทษจําคุกมาแล้วเกินกว่าห้าป แล้วมา กระทําความผิดอก โดยความผิดในครัง หลังเปนความผิดทีได้กระทําโดยประมาทหรือความ ผิดลหุโทษ และเมือศาลได้คํานึงถึงอายุ ประวัติ ความประพฤติ สติปญญา การ ศึกษาอบรม สุขภาพ ภาวะแหงจิต นิสัย อาชพ และสิงแวดล้อมของผู้นัน หรือสภาพความผิด หรือการรูส ้ ึกความผิด และพยายามบรรเทาผลร้ายทีเกิดขึน หรือเหตุอืนอันควรปรานีแล้ว ศาล จะพิพากษาว่าผู้นันมความผิดแตรอการกําหนดโทษหรือกําหนดโทษแตรอการลงโทษไว้ ไมว่า จะเปนโทษจําคุกหรือ"},{"section":"มาตรา ๕๗","num":"57","text":"เมือความปรากฏแกศาลเอง หรือความปรากฏตามคําแถลงของ พนักงานอัยการหรือเจ้าพนักงานว่า ผู้กระทําความผิดไมปฏิบัติตามเงือนไขดังทศาลกําหนด ตามมาตรา ๕๖ ศาลอาจตักเตือนผู้กระทําความผิด หรือจะกําหนดการลงโทษทยังไม่ได้กําหนด หรือลงโทษซึงรอไว้นันก็ได้"},{"section":"มาตรา ๕๘","num":"58","text":"เมือความปรากฏแกศาลเอง หรือความปรากฏตามคําแถลงของ โจทก์หรือเจ้าพนักงานว่า ภายในเวลาทศาลกําหนดตามมาตรา ๕๖ ผู้ทถูกศาลพิพากษาได้ กระทําความผิดอันมิใชความผิดทีได้กระทําโดยประมาทหรือความผิดลหุโทษ และศาล พิพากษาให้ลงโทษจําคุกสําหรับความผิดนัน ให้ศาลทพิพากษาคดหลังกําหนดโทษทรอการ กําหนดไว้ในคดก่อนบวกเข้ากับโทษในคดหลัง หรือบวกโทษทรอการลงโทษไว้ในคดก่อนเข้ากับ โทษในคดหลัง แล้วแตกรณี[35] แตถ้าภายในเวลาทศาลได้กําหนดตามมาตรา ๕๖ ผู้นันมิได้กระทําความผิดดัง กล่าวมาในวรรคแรก ให้ผู้นันพ้นจากการทจะถูกกําหนดโทษ หรือถูกลงโทษในคดนัน แล้วแตกรณหมวด ๔ ความรับผิดในทางอาญา"},{"section":"มาตรา ๕๙","num":"59","text":"บุคคลจะต้องรับผิดในทางอาญาก็ตอเมือได้กระทําโดยเจตนา เว้นแตจะได้กระทําโดยประมาท ในกรณทีกฎหมายบัญญัติให้ต้องรับผิดเมือได้กระทําโดย ประมาท หรือเว้นแต่ในกรณทีกฎหมายบัญญัติไว้โดยแจ้งชัดให้ต้องรับผิดแม้ได้กระทําโดยไมมี เจตนา กระทําโดยเจตนา ได้แกกระทําโดยรูส ้ ํานึกในการทกระทําและในขณะเดยวกัน ผู้กระทําประสงค์ตอผล หรือยอมเล็งเห็นผลของการกระทํานัน ถ้าผู้กระทํามิได้รูข ้ ้อเท็จจริงอันเปนองค์ประกอบของความผิด จะถือว่าผู้ กระทําประสงค์ตอผล หรือยอมเล็งเห็นผลของการกระทํานันมิได้ กระทําโดยประมาท ได้แกกระทําความผิดมิใช่โดยเจตนา แตกระทําโดย ปราศจากความระมัดระวังซึงบุคคลในภาวะเชนนันจักต้องมตามวิสัยและพฤติการณ์ และผู้ กระทําอาจใช้ความระมัดระวังเชนว่านันได้ แตหาได้ใช้ให้เพยงพอไมการกระทํา ให้หมายความรวมถึงการให้เกิดผลอันหนึงอันใดขึนโดยงดเว้นการ ทจักต้องกระทําเพือปองกันผลนั"},{"section":"มาตรา ๖๐","num":"60","text":"ผู้ใดเจตนาทจะกระทําตอบุคคลหนึง แตผลของการกระทําเกิดแกอีกบุคคลหนึงโดยพลาดไป ให้ถือว่าผู้นันกระทําโดยเจตนาแกบุคคลซึงได้รบ ั ผลร้ายจากการ กระทํานัน แต่ในกรณทีกฎหมายบัญญัติให้ลงโทษหนักขึนเพราะฐานะของบุคคลหรือเพราะ ความสัมพันธ์ระหว่างผู้กระทํากับบุคคลทีได้รบ ั ผลร้าย มิให้นํากฎหมายนัน มาใช้บังคับเพือลง โทษผู้กระทําให้หนักขึน"},{"section":"มาตรา ๖๑","num":"61","text":"ผู้ใดเจตนาจะกระทําตอบุคคลหนึง แต่ได้กระทําตออกบุคคลหนึง โดยสําคัญผิด ผู้นันจะยกเอาความสําคัญผิดเปนข้อแก้ตัวว่ามิได้กระทําโดยเจตนาหาได้ไม่"},{"section":"มาตรา ๖๒","num":"62","text":"ข้อเท็จจริงใด ถ้ามอยู่จริงจะทําให้การกระทําไม่เปนความผิด หรือ ทําให้ผู้กระทําไมต้องรับโทษ หรือได้รบ ั โทษน้อยลง แม้ข้อเท็จจริงนันจะไมมีอยู่จริง แตผู้กระทํา สําคัญผิดว่ามอยู่จริง ผู้กระทํายอมไมมีความผิด หรือได้รบ ั ยกเว้นโทษ หรือได้รบ ั โทษน้อยลง แล้วแตกรณถ้าความไมรูข ้ ้อเท็จจริงตามความในวรรคสามแหงมาตรา ๕๙ หรือความ สําคัญผิดว่ามอยู่จริงตามความในวรรคแรก ได้เกิดขึนด้วยความประมาทของผู้กระทําความผิด ให้ผู้กระทํารับผิดฐานกระทําโดยประมาท ในกรณทีกฎหมายบัญญัติไว้โดยเฉพาะว่า การ กระทํานันผู้กระทําจะต้องรับโทษแม้กระทําโดยประมาท บุคคลจะต้องรับโทษหนักขึนโดยอาศัยข้อเท็จจริงใด บุคคลนันจะต้องได้รูข ้ ้อ เท็จจริงนัน"},{"section":"มาตรา ๖๓","num":"63","text":"ถ้าผลของการกระทําความผิดใดทําให้ผู้กระทําต้องรับโทษหนัก ขึน ผลของการกระทําความผิดนันต้องเปนผลทตามธรรมดายอมเกิดขึนได้"},{"section":"มาตรา ๖๔","num":"64","text":"บุคคลจะแก้ตัวว่าไมรูก ้ ฎหมายเพือให้พ้นจากความรับผิดในทาง อาญาไม่ได้ แตถ้าศาลเห็นว่า ตามสภาพและพฤติการณ์ ผู้กระทําความผิดอาจจะไมรูว้ ่า กฎหมายบัญญัติว่าการกระทํานันเปนความผิด ศาลอาจอนุญาตให้แสดงพยานหลักฐาน ตอศาล และถ้าศาลเชือว่า ผู้กระทําไมรูว้ ่ากฎหมายบัญญัติไว้เชนนัน ศาลจะลงโทษน้อยกว่าทกฎหมายกําหนดไว้สําหรับความผิดนันเพยงใดก็ได้"},{"section":"มาตรา ๖๕","num":"65","text":"ผู้ใดกระทําความผิดในขณะไมสามารถรูผ ้ ิดชอบหรือไมสามารถ บังคับตนเองได้เพราะมจิตบกพรอง โรคจิตหรือจิตฟนเฟอน ผู้นันไมต้องรับโทษสําหรับความ ผิดนัน แตถ้าผู้กระทําความผิดยังสามารถรูผ ้ ิดชอบอยู่บ้าง หรือยังสามารถบังคับตน เองได้บ้าง ผู้นันต้องรับโทษสําหรับความผิดนัน แตศาลจะลงโทษน้อยกว่าทกฎหมายกําหนดไว้ สําหรับความผิดนันเพยงใดก็ได้"},{"section":"มาตรา ๖๖","num":"66","text":"ความมึนเมาเพราะเสพสุราหรือสิงเมาอย่างอืนจะยกขึนเปนข้อแก้ ตัวตามมาตรา ๖๕ ไม่ได้ เว้นแตความมึนเมานันจะได้เกิดโดยผู้เสพไมรูว้ ่าสิงนันจะทําให้มึนเมา หรือได้เสพโดยถูกขืนใจให้เสพ และได้กระทําความผิดในขณะไมสามารถรูผ ้ ิดชอบ หรือไมสามารถบังคับตนเองได้ ผู้กระทําความผิดจึงจะได้รบ ั ยกเว้นโทษสําหรับความผิดนัน แตถ้าผู้นัน ยังสามารถรูผ ้ ิดชอบอยู่บ้าง หรือยังสามารถบังคับตนเองได้บ้าง ศาลจะลงโทษน้อยกว่าทกฎหมายกําหนดไว้สําหรับความผิดนันเพยงใดก็ได้"},{"section":"มาตรา ๖๗","num":"67","text":"ผู้ใดกระทําความผิดด้วยความจําเปน (๑) เพราะอยู่ในทบังคับหรือภายใต้อํานาจซึงไมสามารถหลกเลยงหรือขัดขืน ได้ หรือ (๒) เพราะเพือให้ตนเองหรือผู้อืนพ้นจากภยันตรายทีใกล้จะถึงและไมสามารถ หลกเลยงให้พ้นโดยวิธอ ี ืนใดได้ เมือภยันตรายนันตนมิได้กอให้เกิดขึนเพราะความผิดของตน ถ้าการกระทํานันไม่เปนการเกินสมควรแก่เหตุแล้ว ผู้นันไมต้องรับโทษ"},{"section":"มาตรา ๖๘","num":"68","text":"ผู้ใดจําต้องกระทําการใดเพือปองกันสิทธิของตน หรือของผู้อืน ให้พ้นภยันตรายซึงเกิดจากการประทุษร้ายอันละเมิดตอกฎหมาย และเปนภยันตรายทีใกล้จะ ถึง ถ้าได้กระทําพอสมควรแก่เหตุ การกระทํานันเปนการปองกันโดยชอบด้วยกฎหมาย ผู้นันไมมีความผิด"},{"section":"มาตรา ๖๙","num":"69","text":"ในกรณทีบัญญัติไว้ในมาตรา ๖๗ และมาตรา ๖๘ นัน ถ้าผู้กระทํา ได้กระทําไปเกินสมควรแก่เหตุหรือเกินกว่ากรณีแหงความจําเปน หรือเกินกว่ากรณีแหงการ จําต้องกระทําเพือปองกัน ศาลจะลงโทษน้อยกว่าทกฎหมายกําหนดไว้สําหรับความผิดนันเพยง ใดก็ได้ แตถ้าการกระทํานันเกิดขึนจากความตืนเต้น ความตกใจ หรือความกลัว ศาลจะไมลง โทษผู้กระทําก็ได้"},{"section":"มาตรา ๗๐","num":"70","text":"ผู้ใดกระทําตามคําสังของเจ้าพนักงาน แม้คําสังนันจะมิชอบด้วย กฎหมาย ถ้าผู้กระทํามหน้าทหรือเชือโดยสุจริตว่ามหน้าทต้องปฏิบัติตาม ผู้นันไมต้องรับโทษ เว้นแตจะรูว้ ่าคําสังนันเปนคําสังซึงมิชอบด้วยกฎหมาย"},{"section":"มาตรา ๗๑","num":"71","text":"ความผิดตามทบัญญัติไว้ในมาตรา ๓๓๔ ถึงมาตรา ๓๓๖ วรรค แรก และมาตรา ๓๔๑ ถึงมาตรา ๓๖๔ นัน ถ้าเปนการกระทําทสามกระทําตอภริยา หรือภริยา กระทําตอสามผู้กระทําไมต้องรับโทษ ความผิดดังระบุมานถ้าเปนการกระทําทผู้บุพการกระทําตอผู้สืบสันดาน ผู้ สืบสันดานกระทําตอผู้บุพการหรือพหรือน้องรวมบิดามารดาเดยวกันกระทําตอกัน แม้ กฎหมายมิได้บัญญัติให้เปนความผิดอันยอมความได้ ก็ให้เปนความผิดอันยอมความได้ และ นอกจากนัน ศาลจะลงโทษน้อยกว่าทกฎหมายกําหนดไว้สําหรับความผิดนันเพยงใดก็ได้"},{"section":"มาตรา ๗๒","num":"72","text":"ผู้ใดบันดาลโทสะโดยถูกขมเหงอย่างร้ายแรงด้วยเหตุอันไม่เปน ธรรม จึงกระทําความผิดตอผู้ขมเหงในขณะนัน ศาลจะลงโทษผู้นันน้อยกว่าทกฎหมายกําหนด ไว้สําหรับความผิดนันเพยงใดก็ได้"},{"section":"มาตรา ๗๓","num":"73","text":"เด็กอายุยังไม่เกินสิบสองป กระทําการอันกฎหมายบัญญัติ เปนความผิด เด็กนันไมต้องรับโทษ[37] ให้พนักงานสอบสวนสงตัวเด็กตามวรรคหนึงให้พนักงานเจ้าหน้าทตาม กฎหมายว่าด้วยการคุ้มครองเด็ก เพือดําเนินการคุ้มครองสวัสดิภาพตามกฎหมายว่าด้วยการ นัน"},{"section":"มาตรา ๗๔","num":"74","text":"เด็กอายุกว่าสิบสองปแตยังไม่เกินสิบห้าป กระทําการอัน กฎหมายบัญญัติเปนความผิด เด็กนันไมต้องรับโทษ แต่ให้ศาลมอํานาจทจะดําเนินการ ดังตอ ไปนี (๑) ว่ากล่าวตักเตือนเด็กนันแล้วปลอยตัวไป และถ้าศาลเห็นสมควรจะเรยก บิดา มารดา ผู้ปกครอง หรือบุคคลทีเด็กนันอาศัยอยู่มาตักเตือนด้วยก็ได้ (๒) ถ้าศาลเห็นว่าบิดา มารดา หรือผู้ปกครองสามารถดูแลเด็กนันได้ ศาลจะมคําสังให้มอบตัวเด็กนันให้แกบิดา มารดา หรือผู้ปกครองไป โดยวางข้อกําหนดให้บิดา มารดา หรือผู้ปกครองระวังเด็กนันไม่ให้กอเหตุรา้ ยตลอดเวลาทศาลกําหนดซึงต้องไม่เกินสามปและ กําหนดจํานวนเงินตามทีเห็นสมควรซึงบิดา มารดา หรือผู้ปกครองจะต้องชําระตอศาลไม่เกิน ครัง ละหนึงหมืนบาท ในเมือเด็กนันกอเหตุรา้ ยขึน แตถ้าเด็กนันอาศัยอยู่กับบุคคลอืนนอกจาก บิดา มารดา หรือผู้ปกครอง และศาลเห็นว่าไมสมควรจะเรยกบิดา มารดา หรือผู้ปกครองมา วางข้อกํ"},{"section":"มาตรา ๗๕","num":"75","text":"ผู้ใดอายุกว่าสิบห้าปแตตากว่าสิบแปดป กระทําการอัน กฎหมายบัญญัติเปนความผิด ให้ศาลพิจารณาถึงความรูผ ้ ิดชอบและสิงอืนทังปวงเกยวกับผู้นัน ในอันทจะควรวินิจฉัยว่าสมควรพิพากษาลงโทษผู้นันหรือไมถ้าศาลเห็นว่าไมสมควรพิพากษา ลงโทษก็ให้จัดการตามมาตรา ๗๔ หรือถ้าศาลเห็นว่าสมควรพิพากษาลงโทษ ก็ให้ลดมาตรา สวนโทษทกําหนดไว้สําหรับความผิดลงกึงหนึง"},{"section":"มาตรา ๗๖","num":"76","text":"แก้ไขเพิมเติมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับ ที ๒๑) พ.ศ. ๒๕๕๑ [41] มาตรา ๘๔ แก้ไขเพิมเติมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา (ฉบับที ๒๕) พ.ศ. ๒๕๕๙ [42]"},{"section":"มาตรา ๗๗","num":"77","text":"ในกรณทีศาลวางข้อกําหนดให้บิดามารดา ผู้ปกครองหรือบุคคล ทีเด็กนันอาศัยอยู่ ระวังเด็กนันไม่ให้กอเหตุรา้ ยตามความในมาตรา ๗๔ (๒) ถ้าเด็กนันกอ เหตุรา้ ยขึนภายในเวลาในข้อกําหนด ศาลมอํานาจบังคับบิดามารดา ผู้ปกครองหรือบุคคลทีเด็ก นันอาศัยอยู่ ให้ชําระเงินไม่เกินจํานวนในข้อกําหนดนัน ภายในเวลาทศาลเห็นสมควร ถ้า บิดามารดา ผู้ปกครองหรือบุคคลทีเด็กนันอาศัยอยู่ไมชําระเงิน ศาลจะสัง ให้ยึดทรัพย์สินของ บิดามารดา ผู้ปกครองหรือบุคคลทีเด็กนันอาศัยอยู่ เพือใช้เงินทจะต้องชําระก็ได้ ในกรณทีศาลได้บังคับให้บิดามารดา ผู้ปกครองหรือบุคคลทีเด็กนันอาศัยอยู่ ชําระเงินตามข้อกําหนดแล้วนัน ถ้าศาลมิได้เปลยนแปลงแก้ไขคําสังทีได้วางข้อกําหนดนันเปน อย่างอืนตามความในมาตรา ๗๔ วรรคท้าย ก็ให้ข้อกําหนดนันคงใช้บังคับได้ตอไปจนสินเวลาทกําหนดไว้ในข้อกําหนดนัน"},{"section":"มาตรา ๗๘","num":"78","text":"เมือปรากฏว่ามีเหตุบรรเทาโทษ ไมว่าจะได้มการเพิมหรือการ ลดโทษตามบทบัญญัติแหงประมวลกฎหมายนหรือกฎหมายอืนแล้วหรือไมถ้าศาลเห็นสมควร จะลดโทษไม่เกินกึงหนึงของโทษทจะลงแกผู้กระทําความผิดนันก็ได้ เหตุบรรเทาโทษนันได้แกผู้กระทําความผิดเปนผู้โฉดเขลาเบาปญญาตกอยู่ใน ความทุกข์อย่างสาหัส มคุณความดมาแตก่อน รูส ้ ึกความผิดและพยายามบรรเทาผลร้ายแหง ความผิดนัน ลุแก่โทษตอเจ้าพนักงานหรือให้ความรูแ ้ กศาลอันเปนประโยชน์แกการพิจารณา หรือเหตุอืนทศาลเห็นว่ามลักษณะทํานองเดยวกัน"},{"section":"มาตรา ๗๙","num":"79","text":"ในคดทีมีโทษปรับสถานเดยว ถ้าผู้ทต้องหาว่ากระทําความผิด นําค่าปรับในอัตราอย่างสูงสําหรับความผิดนันมาชําระกอนทศาลเริม ต้นสืบพยาน ให้คดนันเปน อันระงับไป หมวด ๕ การพยายามกระทําความผิด"},{"section":"มาตรา ๘๐","num":"80","text":"ผู้ใดลงมือกระทําความผิดแตกระทําไปไมตลอด หรือกระทําไป ตลอดแล้วแตการกระทํานันไมบรรลุผลผู้นันพยายามกระทําความผิด ผู้ใดพยายามกระทําความผิด ผู้นันต้องระวางโทษสองในสามสวนของโทษทกฎหมายกําหนดไว้สําหรับความผิดนัน"},{"section":"มาตรา ๘๑","num":"81","text":"ผู้ใดกระทําการโดยมุ่งตอผลซึงกฎหมายบัญญัติเปนความผิด แตการกระทํานันไมสามารถจะบรรลุผลได้อย่างแน่แท้ เพราะเหตุปจจัยซึงใช้ในการกระทําหรือเหตุ แหงวัตถุทมุ่งหมายกระทําตอ ให้ถือว่าผู้นันพยายามกระทําความผิด แต่ให้ลงโทษไม่เกินกึงหนึง ของโทษทกฎหมายกําหนดไว้สําหรับความผิดนัน ถ้าการกระทําดังกล่าวในวรรคแรกได้กระทําไปโดยความเชืออย่างงมงาย ศาลจะไมลงโทษก็ได้"},{"section":"มาตรา ๘๒","num":"82","text":"ผู้ใดพยายามกระทําความผิด หากยับยังเสยเองไมกระทําการให้ ตลอด หรือกลับใจแก้ไขไม่ให้การกระทํานันบรรลุผล ผู้นันไมต้องรับโทษสําหรับการพยายาม กระทําความผิดนัน แตถ้าการทีได้กระทําไปแล้วต้องตามบทกฎหมายทบัญญัติเปนความผิด ผู้ นันต้องรับโทษสําหรับความผิดนัน ๆ หมวด ๖ ตัวการและผู้สนับสนุน"},{"section":"มาตรา ๘๓","num":"83","text":"ในกรณความผิดใดเกิดขึนโดยการกระทําของบุคคลตังแตสองคน ขึนไป ผู้ทีได้รวมกระทําความผิดด้วยกันนันเปนตัวการ ต้องระวางโทษตามทกฎหมายกําหนดไว้ สําหรับความผิดนัน"},{"section":"มาตรา ๘๔","num":"84","text":"ผู้ใดกอให้ผู้อืนกระทําความผิดไมว่าด้วยการใช้ บังคับ ขู่เข็ญ จ้าง วาน หรือยุยงสงเสริม หรือด้วยวิธอ ี ืนใด ผู้นันเปนผู้ใช้ให้กระทําความผิด ถ้าความผิดมิได้กระทําลงไมว่าจะเปนเพราะผู้ถูกใช้ไมยอมกระทํา ยังไม่ได้ กระทํา หรือเหตุอืนใด ผู้ใช้ต้องระวางโทษเพยงหนึงในสามของโทษทกําหนดไว้สําหรับความผิด นัน ถ้าผู้ถูกใช้ได้กระทําความผิดนัน ผู้ใช้ต้องรับโทษเสมือนเปนตัวการ และถ้าผู้ ถูกใช้เปนบุคคลอายุไม่เกินสิบแปดป ผู้พิการ ผู้ทุพพลภาพ ลูกจ้างหรือผู้ทอยู่ใต้บังคับบัญชา ของผู้ใช้ ผู้ทมีฐานะยากจน หรือผู้ต้องพึงพาผู้ใช้เพราะเหตุปวยเจ็บหรือไมว่าทางใด ให้เพิมโทษ ทจะลงแกผู้ใช้กึงหนึงของโทษทศาลกําหนดสําหรับผู้นัน"},{"section":"มาตรา ๘๕","num":"85","text":"ผู้ใดโฆษณาหรือประกาศแกบุคคลทัวไปให้กระทําความผิด และ ความผิดนันมกําหนดโทษไมตากว่าหกเดือน ผู้นันต้องระวางโทษกึงหนึงของโทษทกําหนดไว้ สําหรับความผิดนัน ถ้าได้มการกระทําความผิด เพราะเหตุทีได้มการโฆษณาหรือประกาศตาม ความในวรรคแรก ผู้โฆษณาหรือประกาศต้องรับโทษเสมือนเปนตัวการ"},{"section":"มาตรา ๘๕/๑","num":"85/1","text":"ถ้าผู้ถูกใช้ตามมาตรา ๘๔ หรือผู้กระทําตามคําโฆษณา หรือ ประกาศแกบุคคลทัวไปให้กระทําความผิดตามมาตรา ๘๕ ได้ให้ข้อมูลสําคัญอันเปนการเปดเผย ถึงการกระทําความผิดของผู้ใช้ให้กระทําความผิดหรือผู้โฆษณาหรือประกาศแกบุคคลทัวไปให้ กระทําความผิด และเปนประโยชน์อย่างยิงตอการดําเนินคดีแกบุคคลดังกล่าว ศาลจะลงโทษผู้ นันน้อยกว่าอัตราโทษขันตาทกําหนดไว้สําหรับความผิดนันเพยงใดก็ได้"},{"section":"มาตรา ๘๖","num":"86","text":"ผู้ใดกระทําด้วยประการใด ๆ อันเปนการชวยเหลือ หรือให้ความ สะดวกในการทผู้อืนกระทําความผิดกอนหรือขณะกระทําความผิด แม้ผู้กระทําความผิดจะมิได้ รูถ ้ ึงการชวยเหลือหรือให้ความสะดวกนันก็ตาม ผู้นันเปนผู้สนับสนุนการกระทําความผิด ต้อง ระวางโทษสองในสามสวนของโทษทกําหนดไว้สําหรับความผิดทสนับสนุนนัน"},{"section":"มาตรา ๘๗","num":"87","text":"ในกรณทีมการกระทําความผิดเพราะมผู้ใช้ให้กระทําตามมาตรา ๘๔ เพราะมผู้โฆษณาหรือประกาศแกบุคคลทัวไปให้กระทําความผิดตามมาตรา ๘๕ หรือโดยมผู้สนับสนุนตามมาตรา ๘๖ ถ้าความผิดทีเกิดขึนนัน ผู้กระทําได้กระทําไปเกินขอบเขตทีใช้หรือที โฆษณาหรือประกาศ หรือเกินไปจากเจตนาของผู้สนับสนุน ผู้ใช้ให้กระทําความผิด ผู้โฆษณา หรือประกาศแกบุคคลทัวไปให้กระทําความผิดหรือผู้สนับสนุนการกระทําความผิด แล้วแตกรณต้องรับผิดทางอาญาเพยงสําหรับความผิดเท่าทอยู่ในขอบเขตทีใช้หรือทีโฆษณาหรือประกาศ หรืออยู่ในขอบเขตแหงเจตนาของผู้สนับสนุนการกระทําความผิดเท่านัน แตถ้าโดยพฤติการณ์ อาจเล็งเห็นได้ว่า อาจเกิดการกระทําความผิดเชนทีเกิดขึนนันได้จากการใช้ การโฆษณา หรือ ประกาศหรือการสนับสนุนผู้ใช้ให้กระทําความผิด ผู้โฆษณาหรือประกาศแกบุคคลทัวไปให้ กระทําความผิด หรือผู้สนับสนุนการกระทําความผิด แล้วแตกรณต้องรับผิดทา"},{"section":"มาตรา ๘๘","num":"88","text":"ถ้าความผิดทีได้ใช้ ทีได้โฆษณาหรือประกาศแกบุคคลทัวไปให้ กระทํา หรือทีได้สนับสนุนให้กระทํา ได้กระทําถึงขันลงมือกระทําความผิด แต่เนืองจากการเข้า ขัดขวางของผู้ใช้ ผู้โฆษณาหรือประกาศหรือผู้สนับสนุน ผู้กระทําได้กระทําไปไมตลอด หรือ กระทําไปตลอดแล้ว แตการกระทํานันไมบรรลุผล ผู้ใช้หรือผู้โฆษณาหรือประกาศ คงรับผิด เพยงทบัญญัติไว้ในมาตรา ๘๔ วรรคสอง หรือมาตรา ๘๕ วรรคแรก แล้วแตกรณส่วนผู้ สนับสนุนนันไมต้องรับโทษ"},{"section":"มาตรา ๘๙","num":"89","text":"ถ้ามีเหตุสวนตัวอันควรยกเว้นโทษ ลดโทษหรือเพิมโทษแกผู้ กระทําความผิดคนใด จะนําเหตุนันไปใช้แกผู้กระทําความผิดคนอืนในการกระทําความผิดนัน ด้วยไม่ได้ แตถ้าเหตุอันควรยกเว้นโทษ ลดโทษหรือเพิมโทษเปนเหตุในลักษณะคดจึงให้ใช้แกผู้ กระทําความผิดในการกระทําความผิดนันด้วยกันทุกคน หมวด ๗ การกระทําความผิดหลายบทหรือหลายกระทง"},{"section":"มาตรา ๙๐","num":"90","text":"เมือการกระทําใดอันเปนกรรมเดยวเปนความผิดตอกฎหมาย หลายบท ให้ใช้กฎหมายบททมีโทษหนักทสุดลงโทษแกผู้กระทําความผิด"},{"section":"มาตรา ๙๑","num":"91","text":"เมือปรากฏว่าผู้ใดได้กระทําการอันเปนความผิดหลาย กรรมต่างกัน ให้ศาลลงโทษผู้นันทุกกรรมเปนกระทงความผิดไป แต่ไมว่าการเพิมโทษ ลดโทษ หรือลดมาตราสวนโทษด้วยหรือไมก็ตาม เมือรวมโทษทุกกระทงแล้ว โทษจําคุกทังสินต้องไม่ เกินกําหนดดังตอไปนี (๑) สิบป สําหรับกรณความผิดกระทงทหนักทสุดมอัตราโทษจําคุกอย่างสูงไม่ เกินสามป (๒) ยสิบป สําหรับกรณความผิดกระทงทหนักทสุดมอัตราโทษจําคุกอย่างสูง เกินสามปแต่ไม่เกินสิบป (๓) ห้าสิบป สําหรับกรณความผิดกระทงทหนักทสุดมอัตราโทษจําคุกอย่างสูง เกินสิบปขึนไป เว้นแตกรณทีศาลลงโทษจําคุกตลอดชวิต หมวด ๘ การกระทําความผิดอก"},{"section":"มาตรา ๙๒","num":"92","text":"ผู้ใดต้องคําพิพากษาถึงทสุดให้ลงโทษจําคุก ถ้าและได้กระทํา ความผิดใด ๆ อกในระหว่างทยังจะต้องรับโทษอยู่ก็ดภายในเวลาห้าปนับแตวันพ้นโทษก็ดหากศาลจะพิพากษาลงโทษครัง หลังถึงจําคุก ก็ให้เพิมโทษทจะลงแกผู้นันหนึงในสามของโทษทศาลกําหนดสําหรับความผิดครัง หลัง"},{"section":"มาตรา ๙๓","num":"93","text":"ผู้ใดต้องคําพิพากษาถึงทสุดให้ลงโทษจําคุก ถ้าและได้กระทํา ความผิดอย่างหนึงอย่างใดทจําแนกไว้ในอนุมาตราตอไปนซาในอนุมาตราเดยวกันอกใน ระหว่างทยังจะต้องรับโทษอยู่ก็ดภายในเวลาสามปนับแตวันพ้นโทษก็ดถ้าความผิดครัง แรก เปนความผิดซึงศาลพิพากษาลงโทษจําคุกไมน้อยกว่าหกเดือน หากศาลจะพิพากษาลงโทษ ครัง หลังถึงจําคุก ก็ให้เพิมโทษทจะลงแกผู้นันกึงหนึงของโทษทศาลกําหนดสําหรับความผิดครัง หลัง (๑) ความผิดเกยวกับความมันคงแหงราชอาณาจักร ตามทบัญญัติไว้ใน"},{"section":"มาตรา ๙๔","num":"94","text":"ความผิดอันได้กระทําโดยประมาท ความผิดลหุโทษ และ ความผิดซึงผู้กระทําได้กระทําในขณะทมีอายุตากว่าสิบแปดปนัน ไมว่าจะได้กระทําในครัง กอน หรือครัง หลัง ไมถือว่าเปนความผิดเพือการเพิมโทษตามความในหมวดนหมวด ๙ อายุความ"},{"section":"มาตรา ๙๕","num":"95","text":"ในคดอาญา ถ้ามิได้ฟองและได้ตัวผู้กระทําความผิดมายังศาล ภายในกําหนดดังตอไปนนับแตวันกระทําความผิด เปนอันขาดอายุความ (๑) ยสิบป สําหรับความผิดต้องระวางโทษประหารชวิต จําคุกตลอดชวิต หรือ จําคุกยสิบป (๒) สิบห้าป สําหรับความผิดต้องระวางโทษจําคุกกว่าเจ็ดปแตยังไมถึงยสิบป (๓) สิบป สําหรับความผิดต้องระวางโทษจําคุกกว่าหนึงปถึงเจ็ดป (๔) ห้าป สําหรับความผิดต้องระวางโทษจําคุกกว่าหนึงเดือนถึงหนึงป (๕) หนึงป สําหรับความผิดต้องระวางโทษจําคุกตังแตหนึงเดือนลงมา หรือ ต้องระวางโทษอย่างอืน ถ้าได้ฟองและได้ตัวผู้กระทําความผิดมายังศาลแล้ว ผู้กระทําความผิดหลบ หนหรือวิกลจริต และศาลสังงดการพิจารณาไว้จนเกินกําหนดดังกล่าวแล้วนับแตวันทหลบหนหรือวันทศาลสังงดการพิจารณา ก็ให้ถือว่าเปนอันขาดอายุความเชนเดยวกัน"},{"section":"มาตรา ๙๖","num":"96","text":"ภายใต้บังคับมาตรา ๙๕ ในกรณความผิดอันยอมความได้ ถ้าผู้ เสยหายมิได้รอ ้ งทุกข์ภายในสามเดือนนับแตวันทรูเ้ รือ งความผิดและรูต ้ ัวผู้กระทําความผิด เปน อันขาดอายุความ"},{"section":"มาตรา ๙๗","num":"97","text":"ในการฟองขอให้กักกัน ถ้าจะฟองภายหลังการฟองคดอันเปนมูล ให้เกิดอํานาจฟองขอให้กักกัน ต้องฟองภายในกําหนดหกเดือนนับแตวันทฟองคดนัน มิฉะนัน เปนอันขาดอายุความ"},{"section":"มาตรา ๙๘","num":"98","text":"เมือได้มคําพิพากษาถึงทสุดให้ลงโทษผู้ใด ผู้นันยังมิได้รบ ั โทษก็ดี ได้รบ ั โทษแตยังไมครบถ้วนโดยหลบหนก็ดถ้ายังมิได้ตัวผู้นันมาเพือรับโทษนับแตวันทมีคํา พิพากษาถึงทสุด หรือนับแตวันทผู้กระทําความผิดหลบหนี แล้วแตกรณี เกินกําหนดเวลาดังตอ ไปนี เปนอันลวงเลยการลงโทษ จะลงโทษผู้นันมิได้ (๑) ยสิบป สําหรับโทษประหารชวิต จําคุกตลอดชวิตหรือจําคุกยสิบป (๒) สิบห้าป สําหรับโทษจําคุกกว่าเจ็ดปแตยังไมถึงยสิบป (๓) สิบป สําหรับโทษจําคุกกว่าหนึงปถึงเจ็ดป (๔) ห้าป สําหรับโทษจําคุกตังแตหนึงปลงมาหรือโทษอย่างอืน"},{"section":"มาตรา ๙๙","num":"99","text":"การยึดทรัพย์สินหรืออายัดสิทธิเรยกร้องในทรัพย์สินเพือใช้ค่า ปรับหรือการกักขังแทนค่าปรับ ถ้ามิได้ทําภายในกําหนดห้าปนับแตวันทีได้มคําพิพากษาถึงทสุด จะยึดทรัพย์สิน อายัดสิทธิเรยกร้องในทรัพย์สิน หรือกักขังไม่ได้ ความในวรรคหนึงมิให้ใช้บังคับในกรณการกักขังแทนค่าปรับซึงทําตอเนืองกับ การลงโทษจําคุก"},{"section":"มาตรา ๑๐๐","num":"100","text":"เมือได้มคําพิพากษาถึงทสุดให้กักกันผู้ใด ถ้าผู้นันยังมิได้รบ ั การ กักกันก็ดี ได้รบ ั การกักกันแตยังไมครบถ้วนโดยหลบหนก็ดถ้าพ้นกําหนดสามปนับแตวันทพ้นโทษโดยได้รบ ั โทษตามคําพิพากษาแล้วโดยลวงเลยการลงโทษหรือนับแตวันทผู้นันหลบหนระหว่างเวลาทต้องกักกัน เปนอันลวงเลยการกักกัน จะกักกันผู้นันไม่ได้"},{"section":"มาตรา ๑๐๑","num":"101","text":"การบังคับตามคําสังของศาลตามความในมาตรา ๔๖ หรือการ ร้องขอให้ศาลสังให้ใช้เงินเมือผู้ทําทัณฑ์บนประพฤติผิดทัณฑ์บนตามความในมาตรา ๔๗ นัน ถ้า มิได้บังคับหรือร้องขอภายในกําหนดสองปนับแตวันทศาลมคําสังหรือนับแตวันทผู้ทําทัณฑ์บน ประพฤติผิดทัณฑ์บน จะบังคับหรือร้องขอมิได้ ลักษณะ ๒ บทบัญญัติทีใช้แกความผิดลหุโทษ"},{"section":"มาตรา ๑๐๒","num":"102","text":"ความผิดลหุโทษ คือ ความผิดซึงต้องระวางโทษจําคุกไม่เกิน หนึงเดือน หรือปรับไม่เกินหนึงหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๐๓","num":"103","text":"บทบัญญัติในลักษณะ ๑ ให้ใช้ในกรณีแหงความผิดลหุโทษด้วย เว้นแตทีบัญญัติไว้ในสามมาตราตอไปนี"},{"section":"มาตรา ๑๐๔","num":"104","text":"การกระทําความผิดลหุโทษตามประมวลกฎหมายนี แม้กระทํา โดยไมมีเจตนาก็เปนความผิด เว้นแตตามบทบัญญัติความผิดนันจะมความบัญญัติให้เห็นเปน อย่างอืน"},{"section":"มาตรา ๑๐๕","num":"105","text":"ผู้ใดพยายามกระทําความผิดลหุโทษ ผู้นันไมต้องรับโทษ"},{"section":"มาตรา ๑๐๖","num":"106","text":"ผู้สนับสนุนในความผิดลหุโทษไมต้องรับโทษ ภาค ๒ ความผิด ลักษณะ ๑ ความผิดเกยวกับความมันคงแหงราชอาณาจักร หมวด ๑ ความผิดตอองค์พระมหากษั ตริย์ พระราชินรัชทายาท และผู้สําเร็จราชการแทนพระองค์"},{"section":"มาตรา ๑๐๗","num":"107","text":"ผู้ใดปลงพระชนม์พระมหากษั ตริย์ ต้องระวางโทษประหารชวิต ผู้ใดพยายามกระทําการเชนว่านัน ต้องระวางโทษเชนเดยวกัน ผู้ใดกระทําการใดอันเปนการตระเตรยมเพือปลงพระชนม์พระมหากษั ตริย์ หรือรูว้ ่ามผู้จะปลงพระชนม์พระมหากษั ตริย์ กระทําการใดอันเปนการชวยปกปดไว้ ต้องระวาง โทษจําคุกตลอดชวิต"},{"section":"มาตรา ๑๐๘","num":"108","text":"ผู้ใดกระทําการประทุษร้ายตอพระองค์หรือเสรภาพของ พระมหากษั ตริย์ ต้องระวางโทษประหารชวิต หรือจําคุกตลอดชวิต ผู้ใดพยายามกระทําการเชนว่านัน ต้องระวางโทษเชนเดยวกัน ถ้าการกระทํานันมลักษณะอันน่าจะเปนอันตรายแกพระชนม์ ผู้กระทําต้อง ระวางโทษประหารชวิต ผู้ใดกระทําการใดอันเปนการตระเตรยมเพือประทุษร้ายตอพระองค์ หรือ เสรภาพของพระมหากษั ตริย์ หรือรูว้ ่ามผู้จะกระทําการประทุษร้ายตอพระองค์ หรือเสรภาพ ของพระมหากษั ตริย์ กระทําการใดอันเปนการชวยปกปดไว้ ต้องระวางโทษจําคุกตังแตสิบหกป ถึงยสิบป"},{"section":"มาตรา ๑๐๙","num":"109","text":"ผู้ใดปลงพระชนม์พระราชินหรือรัชทายาทหรือฆ่าผู้สําเร็จ ราชการแทนพระองค์ ต้องระวางโทษประหารชวิต ผู้ใดพยายามกระทําการเชนว่านัน ต้องระวางโทษเชนเดยวกัน ผู้ใดกระทําการใดอันเปนการตระเตรยมเพือปลงพระชนม์พระราชินหรือ รัชทายาท หรือเพือฆ่าผู้สําเร็จราชการแทนพระองค์ หรือรูว้ ่ามผู้จะปลงพระชนม์พระราชินหรือ รัชทายาท หรือจะฆ่าผู้สําเร็จราชการแทนพระองค์ กระทําการใดอันเปนการชวยปกปดไว้ ต้อง ระวางโทษจําคุกตังแตสิบสองปถึงยสิบป"},{"section":"มาตรา ๑๑๐","num":"110","text":"ผู้ใดกระทําการประทุษร้ายตอพระองค์ หรือเสรภาพของ พระราชินหรือรัชทายาท หรือตอร่างกายหรือเสรภาพของผู้สําเร็จราชการแทนพระองค์ ต้อง ระวางโทษจําคุกตลอดชวิต หรือจําคุกตังแตสิบหกปถึงยสิบป ผู้ใดพยายามกระทําการเชนว่านัน ต้องระวางโทษเชนเดยวกัน ถ้าการกระทํานันมลักษณะอันน่าจะเปนอันตรายแกพระชนม์หรือชวิต ผู้ กระทําต้องระวางโทษประหารชวิต หรือจําคุกตลอดชวิต ผู้ใดกระทําการใดอันเปนการตระเตรยมเพือประทุษร้ายตอพระองค์ หรือ เสรภาพของพระราชินหรือรัชทายาท หรือตอร่างกายหรือเสรภาพของผู้สําเร็จราชการ แทนพระองค์ หรือรูว้ ่ามผู้จะประทุษร้ายตอพระองค์หรือเสรภาพของพระราชินหรือรัชทายาท หรือประทุษร้ายตอร้างกายหรือเสรภาพของผู้สําเร็จราชการแทนพระองค์ กระทําการใดอันเปน การชวยปกปดไว้ ต้องระวางโทษจําคุกตังแตสิบสองปถึงยสิบป"},{"section":"มาตรา ๑๑๑","num":"111","text":"ผู้ใดเปนผู้สนับสนุนในการกระทําความผิดตามมาตรา ๑๐๗ ถึง"},{"section":"มาตรา ๑๑๒","num":"112","text":"แก้ไขเพิมเติมโดยคําสังของคณะปฏิรูปการปกครองแผนดิน ฉบับที ๔๑ ลงวัน ที ๒๑ ตุลาคม พ.ศ. ๒๕๑๙ [48] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [49]"},{"section":"มาตรา ๑๑๓","num":"113","text":"ผู้ใดใช้กําลังประทุษร้ายหรือขู่เข็ญว่าจะใช้กําลังประทุษร้าย เพือ (๑) ล้มล้างหรือเปลยนแปลงรัฐธรรมนูญ (๒) ล้มล้างอํานาจนิติบัญญัติ อํานาจบริหาร หรืออํานาจตุลาการแหง รัฐธรรมนูญ หรือให้ใช้อํานาจดังกล่าวแล้วไม่ได้ หรือ (๓) แบงแยกราชอาณาจักรหรือยึดอํานาจปกครองในสวนหนึงสวนใดแหง ราชอาณาจักร ผู้นันกระทําความผิดฐานเปนกบฏ ต้องระวางโทษประหารชวิต หรือจําคุก ตลอดชวิต"},{"section":"มาตรา ๑๑๔","num":"114","text":"ผู้ใดสะสมกําลังพลหรืออาวุธ ตระเตรยมการอืนใด หรือสมคบ กันเพือเปนกบฏ หรือกระทําความผิดใด ๆ อันเปนสวนของแผนการ เพือเปนกบฏ หรือ ยุยงราษฎรให้เปนกบฏ หรือรูว้ ่ามผู้จะเปนกบฏ แล้วกระทําการใดอันเปนการชวยปกปดไว้ ต้อง ระวางโทษจําคุกตังแตสามปถึงสิบห้าป"},{"section":"มาตรา ๑๑๕","num":"115","text":"ผู้ใดยุยงทหารหรือตํารวจให้หนราชการ ให้ละเลยไมกระทําการ ตามหน้าทหรือให้กอการกําเริบ ต้องระวางโทษจําคุกไม่เกินห้าป ถ้าความผิดนันได้กระทําลงโดยมุ่งหมายจะบอนให้วินัยและสมรรถภาพของ กรมกองทหารหรือตํารวจเสือมทรามลง ผู้กระทําต้องระวางโทษจําคุกไม่เกินสิบป"},{"section":"มาตรา ๑๑๖","num":"116","text":"ผู้ใดกระทําให้ปรากฏแกประชาชนด้วยวาจา หนังสือหรือวิธอ ี ืน ใดอันมิใช่เปนการกระทําภายในความมุ่งหมายแหงรัฐธรรมนูญ หรือมิใช่เพือแสดงความคิดเห็น หรือติชมโดยสุจริต (๑) เพือให้เกิดการเปลยนแปลงในกฎหมายแผนดินหรือรัฐบาล โดยใช้กําลัง ขมขืนใจหรือใช้กําลังประทุษร้าย (๒) เพือให้เกิดความปนปวนหรือกระด้างกระเดืองในหมู่ประชาชนถึงขนาดทจะกอความไมสงบขึนในราชอาณาจักร หรือ (๓) เพือให้ประชาชนลวงละเมิดกฎหมายแผนดิน ต้องระวางโทษจําคุกไม่เกิน เจ็ดป"},{"section":"มาตรา ๑๑๗","num":"117","text":"ผู้ใดยุยงหรือจัดให้เกิดการรวมกันหยุดงาน การรวมกันปด งานงดจ้าง หรือการรวมกันไมยอมค้าขายหรือติดตอทางธุรกิจกับบุคคลใด ๆ เพือให้เกิดการ เปลยนแปลงในกฎหมายแผนดิน เพือบังคับรัฐบาลหรือเพือขมขู่ประชาชน ต้องระวางโทษจําคุก ไม่เกินเจ็ดป หรือปรับไม่เกินหนึงแสนสหมืนบาท หรือทังจําทังปรับ ผู้ใดทราบความมุ่งหมายดังกล่าวและเข้ามส่วนหรือเข้าชวยในการรวมกันหยุด งาน การรวมกันปดงานงดจ้างหรือการรวมกันไมยอมค้าขายหรือติดตอทางธุรกิจกับบุคคลใด ๆ นัน ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ ผู้ใดทราบความมุ่งหมายดังกล่าว และใช้กําลังประทุษร้าย ขู่เข็ญว่าจะใช้กําลัง ประทุษร้ายหรือทําให้หวาดกลัวด้วยประการใด ๆ เพือให้บุคคลเข้ามส่วนหรือเข้าชวยในการรวม กันหยุดงาน การรวมกันปดงานงดจ้างหรือการรวมกันไมยอมค้าขายหรือติดตอทางธุรกิจกับ บุคคลใด ๆ นัน ต้องระวาง"},{"section":"มาตรา ๑๑๘","num":"118","text":"ผู้ใดกระทําการใด ๆ ตอธงหรือเครือ งหมายอืนใดอันมความ [50] หมายถึงรัฐ เพือเหยยดหยามประเทศชาติ ต้องระวางโทษ จําคุกไม่เกินสองป หรือปรับไม่เกิน สหมืนบาท หรือทังจําทังปรับ หมวด ๓ ความผิดตอความมันคงของรัฐภายนอกราชอาณาจักร"},{"section":"มาตรา ๑๑๙","num":"119","text":"ผู้ใดกระทําการใด ๆ เพือให้ราชอาณาจักรหรือสวนหนึงสวนใด ของราชอาณาจักรตกไปอยู่ใต้อํานาจอธิปไตยของรัฐต่างประเทศ หรือเพือให้เอกราชของรัฐ เสือมเสยไป ต้องระวางโทษประหารชวิต หรือจําคุกตลอดชวิต"},{"section":"มาตรา ๑๒๐","num":"120","text":"ผู้ใดคบคิดกับบุคคลซึงกระทําการเพือประโยชน์ของรัฐต่าง ประเทศ ด้วยความประสงค์ทจะกอให้เกิดการดําเนินการรบตอรัฐหรือในทางอืนทีเปนปรปกษ์ ตอรัฐ ต้องระวางโทษจําคุกตลอดชวิต หรือจําคุกตังแตสิบปถึงยสิบป"},{"section":"มาตรา ๑๒๑","num":"121","text":"คนไทยคนใดกระทําการรบตอประเทศหรือเข้ารวมเปนข้าศึก ของประเทศ ต้องระวางโทษประหารชวิต หรือจําคุกตลอดชวิต"},{"section":"มาตรา ๑๒๒","num":"122","text":"ผู้ใดกระทําการใด ๆ เพืออุปการะแกการดําเนินการรบหรือการ ตระเตรยมการรบของข้าศึก ต้องระวางโทษจําคุกตังแตห้าปถึงสิบห้าป ถ้าการอุปการะนันเปนการ (๑) ทําให้ปอม ค่าย สนามบิน ยานรบ ยานพาหนะ ทางคมนาคม สิงทีใช้ในการ สือสาร ยุทธภัณฑ์ เสบยงอาหาร อู่เรือ อาคาร หรือสิงอืนใดสําหรับใช้เพือการสงครามใช้การไม่ ได้หรือตกไปอยู่ในเงือมมือของข้าศึก (๒) ยุยงทหารให้ละเลยไมกระทําการตามหน้าทก่อการกําเริบ หนราชการ หรือละเมิดวินัย (๓) กระทําจารกรรม นําหรือแนะทางให้ข้าศึก หรือ (๔) กระทําโดยประการอืนใดให้ข้าศึกได้เปรยบในการรบ ผู้กระทําต้องระวางโทษประหารชวิต หรือจําคุกตลอดชวิต"},{"section":"มาตรา ๑๒๓","num":"123","text":"ผู้ใดกระทําการใด ๆ เพือให้ได้มาซึงข้อความ เอกสารหรือสิงใด ๆ อันปกปดไว้เปนความลับสําหรับความปลอดภัยของประเทศ ต้องระวางโทษจําคุกไม่เกินสิบป"},{"section":"มาตรา ๑๒๔","num":"124","text":"ผู้ใดกระทําการใด ๆ เพือให้ผู้อืนลวงรูห ้ รือได้ไปซึงข้อความ เอกสารหรือสิงใด ๆ อันปกปดไว้เปนความลับสําหรับความปลอดภัยของประเทศ ต้องระวาง โทษจําคุกไม่เกินสิบป ถ้าความผิดนันได้กระทําในระหว่างประเทศอยู่ในการรบหรือการสงคราม ผู้ กระทําต้องระวางโทษจําคุกตังแตห้าปถึงสิบห้าป ถ้าความผิดดังกล่าวมาในสองวรรคกอน ได้กระทําเพือให้รฐ ั ต่างประเทศได้ ประโยชน์ ผู้กระทําต้องระวางโทษประหารชวิต หรือจําคุกตลอดชวิต"},{"section":"มาตรา ๑๒๕","num":"125","text":"ผู้ใดปลอม ทําเทยมขึน กักไว้ ซอนเร้น ปดบัง ยักย้าย ทําให้เสย หาย ทําลาย หรือทําให้สูญหายหรือไร้ประโยชน์ซึงเอกสารหรือแบบใด ๆ อันเกยวกับสวนได้เสย ของรัฐในการระหว่างประเทศ ต้องระวางโทษจําคุกไม่เกินสิบป"},{"section":"มาตรา ๑๒๖","num":"126","text":"ผู้ใดได้รบ ั มอบหมายจากรัฐบาลให้กระทํากิจการของรัฐกับ รัฐบาลต่างประเทศ ถ้าและโดยทุจริตไมปฏิบัติการตามทีได้รบ ั มอบหมาย ต้องระวางโทษ จําคุกตังแตหนึงปถึงสิบป"},{"section":"มาตรา ๑๒๗","num":"127","text":"ผู้ใดกระทําการใด ๆ เพือให้เกิดเหตุรา้ ยแกประเทศจากภายนอก ต้องระวางโทษจําคุกไม่เกินสิบป ถ้าเหตุรา้ ยเกิดขึน ผู้กระทําต้องระวางโทษประหารชวิต หรือจําคุกตลอดชวิต หรือจําคุกตังแตสองปถึงยสิบป"},{"section":"มาตรา ๑๒๘","num":"128","text":"ผู้ใดตระเตรยมการ หรือพยายามกระทําความผิดใด ๆ ในหมวด นต้องระวางโทษตามทบัญญัติไว้สําหรับความผิดนัน"},{"section":"มาตรา ๑๒๙","num":"129","text":"ผู้ใดเปนผู้สนับสนุนในการกระทําความผิดใด ๆ ในหมวดนต้อง ระวางโทษเชนเดยวกับตัวการในความผิดนัน หมวด ๔ ความผิดตอสัมพันธไมตรกับต่างประเทศ"},{"section":"มาตรา ๑๓๐","num":"130","text":"ผู้ใดทําร้ายร่างกายหรือประทุษร้ายตอเสรภาพของราชาธิบดราชินราชสามรัชทายาทหรือประมุขแหงรัฐต่างประเทศ ซึงมสัมพันธไมตรต้องระวางโทษ จําคุกตังแตหนึงปถึงสิบห้าป ผู้ใดพยายามกระทําการเชนว่านัน ต้องระวางโทษเชนเดยวกัน"},{"section":"มาตรา ๑๓๑","num":"131","text":"ผู้ใดทําร้ายร่างกาย หรือประทุษร้ายตอเสรภาพของผู้แทนรัฐ ต่างประเทศ ซึงได้รบ ั แตงตังให้มาสู่พระราชสํานัก ต้องระวางโทษจําคุกไม่เกินสิบป ผู้ใดพยายามกระทําการเชนว่านัน ต้องระวางโทษเชนเดยวกัน"},{"section":"มาตรา ๑๓๒","num":"132","text":"ผู้ใดฆ่าหรือพยายามฆ่าบุคคลหนึงบุคคลใดดังระบุไว้ในมาตรา ๑๓๐ หรือมาตรา ๑๓๑ ต้องระวางโทษประหารชวิตหรือจําคุกตลอดชวิต"},{"section":"มาตรา ๑๓๓","num":"133","text":"ผู้ใดหมินประมาท ดูหมินหรือแสดงความอาฆาตมาด ร้ายราชาธิบดราชินราชสามรัชทายาท หรือประมุขแหงรัฐต่างประเทศ ต้องระวางโทษ[52]จํา คุกตังแตหนึงปถึงเจ็ดป หรือปรับตังแตสองหมืนบาทถึงหนึงแสนสหมืนบาท หรือทัง จําทัง ปรับ"},{"section":"มาตรา ๑๓๔","num":"134","text":"ผู้ใดหมินประมาท ดูหมินหรือแสดงความอาฆาตมาดร้ายผู้ แทนรัฐต่างประเทศซึงได้รบ ั แตงตังให้มาสู่พระราชสํานัก ต้องระวางโทษ[54]จําคุกตังแตหก เดือนถึงห้าป หรือปรับตังแตหนึงหมืนบาทถึงหนึงแสนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๓๕","num":"135","text":"แก้ไขเพิมเติมโดยคําสังของคณะปฏิรูปการปกครองแผนดิน ฉบับที ๔๑ ลงวัน ที ๒๑ ตุลาคม พ.ศ. ๒๕๑๙ [56] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๕ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [57] ลักษณะ ๑/๑ ความผิดเกยวกับการกอการร้าย มาตรา ๑๓๕/๑ ถึงมาตรา ๑๓๕/๔ เพิมโดย พระราชกําหนดแก้ไขเพิมเติมประมวลกฎหมายอาญา พ.ศ. ๒๕๔๖ [58]"},{"section":"มาตรา ๑๓๕/๑","num":"135/1","text":"ผู้ใดกระทําการอันเปนความผิดอาญาดังตอไปนี (๑) ใช้กําลังประทุษร้าย หรือกระทําการใดอันกอให้เกิดอันตรายตอชวิต หรือ อันตรายอย่างร้ายแรงตอร่างกาย หรือเสรภาพของบุคคลใด ๆ (๒) กระทําการใดอันกอให้เกิดความเสยหายอย่างร้ายแรงแกระบบการขนสง สาธารณะ ระบบโทรคมนาคม หรือโครงสร้างพืนฐานอันเปนประโยชน์สาธารณะ (๓) กระทําการใดอันกอให้เกิดความเสยหายแกทรัพย์สินของรัฐหนึงรัฐใด หรือของบุคคลใดหรือตอสิงแวดล้อม อันกอให้เกิดหรือน่าจะกอให้เกิดความเสยหายทาง เศรษฐกิจอย่างสําคัญ ถ้าการกระทํานันได้กระทําโดยมความมุ่งหมายเพือขู่เข็ญหรือบังคับรัฐบาล ไทย รัฐบาลต่างประเทศ หรือองค์การระหว่างประเทศ ให้กระทําหรือไมกระทําการใดอันจะกอ ให้เกิดความเสยหายอย่างร้ายแรง หรือเพือสร้างความปนปวนโดยให้เกิดความหวาดกลัวในหมู่ ประชาชน ผู้นันกระทําความผิดฐานกอการร้าย ต้องระวางโทษประหารชวิต จําคุกตลอดชวิต หรือจําค"},{"section":"มาตรา ๑๓๕/๒","num":"135/2","text":"ผู้ใด (๑) ขู่เข็ญว่าจะกระทําการกอการร้าย โดยมพฤติการณ์อันควรเชือได้ว่าบุคคล นันจะกระทําการตามทขู่เข็ญจริง หรือ (๒) สะสมกําลังพลหรืออาวุธ จัดหาหรือรวบรวมทรัพย์สิน ให้หรือรับการ ฝกการกอการร้าย ตระเตรยมการอืนใด หรือสมคบกัน เพือกอการร้าย หรือกระทําความผิดใด ๆ อันเปนสวนของแผนการเพือกอการร้าย หรือยุยงประชาชนให้เข้ามส่วนในการกอการร้าย หรือรูว้ ่ามผู้จะกอการร้ายแล้วกระทําการใดอันเปนการชวยปกปดไว้ ผู้นันต้องระวางโทษจําคุกตังแตสองปถึงสิบป และปรับตังแตสีหมืนบาทถึง สองแสนบาท"},{"section":"มาตรา ๑๓๕/๓","num":"135/3","text":"ผู้ใดเปนผู้สนับสนุนในการกระทําความผิดตามมาตรา ๑๓๕/๑ หรือมาตรา ๑๓๕/๒ ต้องระวางโทษเชนเดยวกับตัวการในความผิดนัน ๆ"},{"section":"มาตรา ๑๓๕/๔","num":"135/4","text":"ผู้ใดเปนสมาชิกของคณะบุคคลซึงมมติของหรือประกาศ ภายใต้คณะมนตรความมันคงแหงสหประชาชาติกําหนดให้เปนคณะบุคคลทมีการกระทําอัน เปนการกอการร้ายและรัฐบาลไทยได้ประกาศให้ความรับรองมติหรือประกาศดังกล่าวด้วยแล้ว ผู้นันต้องระวางโทษจําคุกไม่เกินเจ็ดปและปรับไม่เกินหนึงแสนสหมืนบาท ลักษณะ ๒ ความผิดเกยวกับการปกครอง หมวด ๑ ความผิดตอเจ้าพนักงาน"},{"section":"มาตรา ๑๓๖","num":"136","text":"แก้ไขเพิมเติมโดยคําสังของคณะปฏิรูปการปกครองแผนดิน ฉบับที ๔๑ ลงวัน ที ๒๑ ตุลาคม พ.ศ. ๒๕๑๙ [63] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๕ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [64] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [65]"},{"section":"มาตรา ๑๓๗","num":"137","text":"ผู้ใดแจ้งข้อความอันเปนเท็จแก่เจ้าพนักงาน ซึงอาจทําให้ผู้ อืนหรือประชาชนเสยหาย ต้องระวางโทษจําคุกไม่เกินหกเดือน หรือปรับไม่เกินหนึงหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๓๘","num":"138","text":"ผู้ใดตอสู้ หรือขัดขวางเจ้าพนักงานหรือผู้ซึงต้องชวย เจ้าพนักงานตามกฎหมายในการปฏิบัติการตามหน้าทต้องระวางโทษ[66]จําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือทังจําทังปรับ ถ้าการตอสู้หรือขัดขวางนัน ได้กระทําโดยใช้กําลังประทุษร้ายหรือขู่เข็ญว่าจะ ใช้กําลังประทุษร้าย ผู้กระทําต้องระวางโทษจําคุกไม่เกินสองป หรือปรับไม่เกินสหมืนบาท หรือ ทัง จําทัง ปรับ"},{"section":"มาตรา ๑๓๙","num":"139","text":"ผู้ใดขมขืนใจเจ้าพนักงานให้ปฏิบัติการอันมิชอบด้วยหน้าทหรือให้ละเว้นการปฏิบัติการตามหน้าที โดยใช้กําลังประทุษร้าย หรือขู่เข็ญว่าจะใช้กําลัง ประทุษร้าย ต้องระวางโทษจําคุกไม่เกินสป หรือปรับไม่เกินแปดหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๔๐","num":"140","text":"แก้ไขเพิมเติมโดยประกาศของคณะปฏิวัติ ฉบับที ๑๑ ลงวันที ๒๑ พฤศจิกายน พ.ศ. ๒๕๑๔ [69] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๖ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [70] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [71] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [72] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [73] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [74] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [75] อัตราโทษ แก้ไขเพิม เติมโดยมาตรา ๔ แหงพระราชบ"},{"section":"มาตรา ๑๔๑","num":"141","text":"ผู้ใดถอน ทําให้เสยหาย ทําลายหรือทําให้ไร้ประโยชน์ซึงตรา หรือเครือ งหมายอันเจ้าพนักงานได้ประทับหรือหมายไว้ทสง ิ ใด ๆ ในการปฏิบัติการตามหน้าที เพือเปนหลักฐานในการยึด อายัดหรือรักษาสิงนัน ๆ ต้องระวางโทษจําคุกไม่เกินสองป หรือปรับ ไม่เกินสหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๔๒","num":"142","text":"ผู้ใดทําให้เสยหาย ทําลาย ซอนเร้น เอาไปเสย หรือทําให้ สูญหาย หรือไร้ประโยชน์ซึงทรัพย์สิน หรือเอกสารใด ๆ อันเจ้าพนักงานได้ยึด รักษาไว้ หรือสัง ให้สงเพือเปนพยานหลักฐาน หรือเพือบังคับการให้เปนไปตามกฎหมาย ไมว่าเจ้าพนักงานจะ รักษาทรัพย์หรือเอกสารนันไว้เอง หรือสังให้ผู้นันหรือผู้อืน สงหรือรักษาไว้ก็ตาม ต้องระวาง โทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๔๓","num":"143","text":"ผู้ใดเรยก รับหรือยอมจะรับทรัพย์สินหรือประโยชน์อืนใด สําหรับตนเองหรือผู้อืน เปนการตอบแทนในการทจะจูงใจหรือได้จูงใจเจ้าพนักงาน สมาชิก สภานิติบัญญัติแหงรัฐ สมาชิกสภาจังหวัดหรือสมาชิกสภาเทศบาลโดยวิธอันทุจริตหรือผิด กฎหมายหรือโดยอิทธิพลของตนให้กระทําการ หรือไมกระทําการในหน้าทอันเปนคุณหรือเปน โทษแกบุคคลใด ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทัง ปรับ"},{"section":"มาตรา ๑๔๔","num":"144","text":"ผู้ใดให้ ขอให้หรือรับว่าจะให้ทรัพย์สินหรือประโยชน์อืนใดแก่ เจ้าพนักงาน สมาชิกสภานิติบัญญัติแหงรัฐ สมาชิกสภาจังหวัดหรือสมาชิกสภาเทศบาล เพือ จูงใจให้กระทําการ ไมกระทําการหรือประวิงการกระทําอันมิชอบด้วยหน้าทต้องระวางโทษจํา คุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๔๕","num":"145","text":"ผู้ใดแสดงตนเปนเจ้าพนักงาน และกระทําการเปน เจ้าพนักงาน โดยตนเองมิได้เปนเจ้าพนักงานทมีอํานาจกระทําการนัน ต้องระวางโทษจําคุกไม่ เกินหนึงป หรือปรับไม่เกินสองหมืนบาท หรือทังจําทังปรับ เจ้าพนักงานผู้ใดได้รบ ั คําสังมิให้ปฏิบัติการตามตําแหนงหน้าทต่อไปแล้ว ยัง ฝาฝนกระทําการใด ๆ ในตําแหนงหน้าทนัน ต้องระวางโทษตามทกําหนดไว้ในวรรคแรกดุจกัน"},{"section":"มาตรา ๑๔๖","num":"146","text":"ผู้ใดไมมีสิทธิทจะสวมเครือ งแบบหรือประดับเครือ งหมาย ของเจ้าพนักงาน สมาชิกสภานิติบัญญัติแหงรัฐ สมาชิกสภาจังหวัดหรือสมาชิกสภาเทศบาล หรือไมมีสิทธิใช้ยศ ตําแหนง เครือ งราชอิสริยาภรณ์หรือสิงทหมายถึงเครือ งราชอิสริยาภรณ์ กระทําการเชนนันเพือให้บุคคลอืนเชือว่าตนมสิทธิ ต้องระวางโทษจําคุกไม่เกินหนึงป หรือปรับ ไม่เกินสองหมืนบาท หรือทังจําทังปรับ หมวด ๒ ความผิดตอตําแหนงหน้าทราชการ"},{"section":"มาตรา ๑๔๗","num":"147","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทซือ ทํา จัดการหรือรักษาทรัพย์ ใด เบยดบังทรัพย์นันเปนของตน หรือเปนของผู้อืนโดยทุจริต หรือโดยทุจริตยอมให้ผู้อืน เอาทรัพย์นันเสย ต้องระวางโทษ[77]จําคุกตังแตห้าปถึงยสิบป หรือจําคุกตลอดชวิต และปรับ ตังแตหนึงแสนบาทถึงสีแสนบาท"},{"section":"มาตรา ๑๔๘","num":"148","text":"ผู้ใดเปนเจ้าพนักงาน ใช้อํานาจในตําแหนงโดยมิชอบ ขมขืนใจหรือจูงใจเพือให้บุคคลใดมอบให้หรือหามาให้ซึงทรัพย์สินหรือประโยชน์อืนใดแกตนเอง หรือผู้อืน ต้องระวางโทษ[79]จําคุกตังแตห้าปถึงยสิบป หรือจําคุกตลอดชวิต และปรับตังแตหนึง แสนบาทถึงสีแสนบาท หรือประหารชวิต"},{"section":"มาตรา ๑๔๙","num":"149","text":"ผู้ใดเปนเจ้าพนักงานสมาชิกสภานิติบัญญัติแหงรัฐ สมาชิก สภาจังหวัด หรือสมาชิกสภาเทศบาล เรยก รับ หรือยอมจะรับทรัพย์สิน หรือประโยชน์อืนใด สําหรับตนเองหรือผู้อืนโดยมิชอบ เพือกระทําการหรือไมกระทําการอย่างใดในตําแหนงไมว่า การนันจะชอบหรือมิชอบด้วยหน้าทต้องระวางโทษ[81]จําคุกตังแตห้าปถึงยสิบป หรือจําคุก ตลอดชวิต และปรับตังแตหนึงแสนบาทถึงสีแสนบาท หรือประหารชวิต"},{"section":"มาตรา ๑๕๐","num":"150","text":"ผู้ใดเปนเจ้าพนักงาน กระทําการหรือไมกระทําการอย่างใด ในตําแหนงโดยเห็นแกทรัพย์สินหรือประโยชน์อืนใด ซึงตนได้เรยก รับ หรือยอมจะรับไว้กอนทตนได้รบ ั แตงตังเปนเจ้าพนักงานในตําแหนงนัน ต้องระวางโทษ[83]จําคุกตังแตห้าปถึงยสิบป หรือจําคุกตลอดชวิต และปรับตังแตหนึงแสนบาทถึงสีแสนบาท"},{"section":"มาตรา ๑๕๑","num":"151","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทซือ ทํา จัดการหรือรักษาทรัพย์ ใด ๆ ใช้อํานาจในตําแหนงโดยทุจริต อันเปนการเสยหายแกรฐ ั เทศบาล สุขาภิบาลหรือเจ้าของ [85] ทรัพย์นัน ต้องระวางโทษ จําคุกตังแตห้าปถึงยสิบป หรือจําคุกตลอดชวิต และปรับตังแตหนึงแสนบาทถึงสีแสนบาท"},{"section":"มาตรา ๑๕๒","num":"152","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทจัดการหรือดูแลกิจการใด เข้า มส่วนได้เสยเพือประโยชน์สําหรับตนเองหรือผู้อืนเนืองด้วยกิจการนัน ต้องระวางโทษ[87]จําคุก ตังแตหนึงปถึงสิบป และปรับตังแตสองหมืนบาทถึงสองแสนบาท"},{"section":"มาตรา ๑๕๓","num":"153","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทจ่ายทรัพย์ จ่ายทรัพย์นันเกิน กว่าทควรจ่ายเพือประโยชน์สําหรับตนเองหรือผู้อืน ต้องระวางโทษ[89]จําคุกตังแตหนึงปถึงสิบ ป และปรับตังแตสองหมืนบาทถึงสองแสนบาท"},{"section":"มาตรา ๑๕๔","num":"154","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทหรือแสดงว่าตนมหน้าทีเรยก เก็บหรือตรวจสอบภาษอากร ค่าธรรมเนยมหรือเงินอืนใด โดยทุจริตเรยกเก็บหรือละเว้นไม่เรยก เก็บภาษอากร ค่าธรรมเนยมหรือเงินนัน หรือกระทําการหรือไมกระทําการอย่างใด เพือให้ผู้มหน้าทีเสยภาษอากรหรือค่าธรรมเนยมนันมิต้องเสย หรือเสยน้อยไปกว่าทจะต้องเสย ต้อง ระวางโทษ[91]จําคุกตังแตห้าปถึงยสิบป หรือจําคุกตลอดชวิต และปรับตังแตหนึงแสนบาทถึงสี แสนบาท"},{"section":"มาตรา ๑๕๕","num":"155","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทกําหนดราคาทรัพย์สินหรือ สินค้าใด ๆ เพือเรยกเก็บภาษอากรหรือค่าธรรมเนยมตามกฎหมาย โดยทุจริตกําหนดราคา ทรัพย์สินหรือสินค้านัน เพือให้ผู้มหน้าทีเสยภาษอากรหรือค่าธรรมเนยมนันมิต้องเสยหรือเสย น้อยไปกว่าทจะต้องเสย ต้องระวางโทษ[93]จําคุกตังแตห้าปถึงยสิบป หรือจําคุกตลอดชวิต และ ปรับตังแตหนึงแสนบาทถึงสีแสนบาท"},{"section":"มาตรา ๑๕๖","num":"156","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทตรวจสอบบัญชตามกฎหมาย โดยทุจริต แนะนํา หรือกระทําการหรือไมกระทําการอย่างใด เพือให้มการละเว้นการลงรายการ ในบัญชลงรายการเท็จในบัญชี แก้ไขบัญชหรือซอนเร้น หรือทําหลักฐานในการลงบัญชอันจะ เปนผลให้การเสยภาษอากรหรือค่าธรรมเนยมนันมิต้องเสย หรือเสยน้อยกว่าทจะต้องเสย ต้อง ระวางโทษ[95]จําคุกตังแตห้าปถึงยสิบป หรือจําคุกตลอดชวิต และปรับตังแตหนึงแสนบาทถึงสี แสนบาท"},{"section":"มาตรา ๑๕๗","num":"157","text":"แก้ไขเพิมเติมโดยพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมายอาญา พ.ศ. ๒๕๐๒ [97] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๗ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [98] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [99] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [100] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [101] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [102] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้ไขเพิมเติมประมวลกฎหมาย อาญา (ฉบับที ๒๖) พ.ศ. ๒๕๖๐ [103] อัตราโทษ แก้ไขเพิมเติมโดยมาตรา ๔ แหงพระราชบัญญัติแก้"},{"section":"มาตรา ๑๕๘","num":"158","text":"ผู้ใดเปนเจ้าพนักงาน ทําให้เสยหาย ทําลาย ซอนเร้น เอาไป เสย หรือทําให้สูญหายหรือทําให้ไร้ประโยชน์ ซึงทรัพย์หรือเอกสารใดอันเปนหน้าทของตนทจะ ปกครองหรือรักษาไว้ หรือยินยอมให้ผู้อืนกระทําเชนนัน ต้องระวางโทษจําคุกไม่เกินเจ็ดป และ ปรับไม่เกินหนึงแสนสหมืนบาท"},{"section":"มาตรา ๑๕๙","num":"159","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทดูแล รักษาทรัพย์หรือเอกสาร ใด กระทําการอันมิชอบด้วยหน้าที โดยถอน ทําให้เสยหาย ทําลายหรือทําให้ไร้ประโยชน์ หรือ โดยยินยอมให้ผู้อืนกระทําเชนนัน ซึงตราหรือเครือ งหมายอันเจ้าพนักงานได้ประทับหรือหมาย ไว้ททรัพย์หรือเอกสารนันในการปฏิบัติการตามหน้าที เพือเปนหลักฐานในการยึดหรือรักษาสิง นัน ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๖๐","num":"160","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทรก ั ษาหรือใช้ดวงตราหรือ รอยตราของราชการหรือของผู้อืน กระทําการอันมิชอบด้วยหน้าที โดยใช้ดวงตราหรือรอยตรา นัน หรือโดยยินยอมให้ผู้อืนกระทําเชนนัน ซึงอาจทําให้ผู้อืนหรือประชาชนเสยหาย ต้องระวาง โทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๖๑","num":"161","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าททําเอกสาร กรอกข้อความลงใน เอกสารหรือดูแลรักษาเอกสาร กระทําการปลอมเอกสารโดยอาศัยโอกาสทตนมหน้าทนัน ต้อง ระวางโทษจําคุกไม่เกินสิบป และปรับไม่เกินสองแสนบาท"},{"section":"มาตรา ๑๖๒","num":"162","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าททําเอกสาร รับเอกสาร หรือกรอกข้อความลงในเอกสาร กระทําการดังตอไปนีในการปฏิบัติการตามหน้าที (๑) รับรองเปนหลักฐานว่า ตนได้กระทําการอย่างใดขึน หรือว่าการอย่างใดได้ กระทําตอหน้าตนอันเปนความเท็จ (๒) รับรองเปนหลักฐานว่า ได้มการแจ้งซึงข้อความอันมิได้มการแจ้ง (๓) ละเว้นไมจดข้อความซึงตนมหน้าทต้องรับจดหรือจดเปลยนแปลงข้อความ เชนว่านัน หรือ (๔) รับรองเปนหลักฐานซึงข้อเท็จจริงอันเอกสารนันมุ่งพิสูจน์ความจริงอันเปน ความเท็จ ต้องระวางโทษจําคุกไม่เกินเจ็ดป และปรับไม่เกินหนึงแสนสหมืนบาท"},{"section":"มาตรา ๑๖๓","num":"163","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทีในการไปรษณย์ โทรเลขหรือ โทรศัพท์ กระทําการอันมิชอบด้วยหน้าทดังตอไปนี (๑) เปด หรือยอมให้ผู้อืนเปด จดหมายหรือสิงอืนทส่งทางไปรษณย์หรือ โทรเลข (๒) ทําให้เสยหาย ทําลาย ทําให้สูญหาย หรือยอมให้ผู้อืนทําให้เสยหาย ทําลายหรือทําให้สูญหาย ซึงจดหมายหรือสิงอืนทส่งทางไปรษณย์หรือโทรเลข (๓) กัก สงให้ผิดทาง หรือสงให้แกบุคคลซึงรูว้ ่ามิใช่เปนผู้ควรรับซึงจดหมาย หรือสิง อื น ทส งทางไปรษณย์หรือโทรเลข หรือ (๔) เปดเผยข้อความทส่งทางไปรษณย์ ทางโทรเลข หรือทางโทรศัพท์ ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทัง ปรับ"},{"section":"มาตรา ๑๖๔","num":"164","text":"ผู้ใดเปนเจ้าพนักงาน รูห ้ รืออาจรูค ้ วามลับในราชการ กระทํา โดยประการใด ๆ อันมิชอบด้วยหน้าทีให้ผู้อืนลวงรูค ้ วามลับนัน ต้องระวางโทษจําคุกไม่เกินห้าป หรือปรับไม่เกินหนึงแสนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๖๕","num":"165","text":"ผู้ใดเปนเจ้าพนักงาน มหน้าทปฏิบัติการให้เปนไปตาม กฎหมายหรือคําสัง ซึงได้สง ั เพือบังคับการให้เปนไปตามกฎหมาย ปองกันหรือขัดขวางมิให้การ เปนไปตามกฎหมายหรือคําสัง นัน ต้องระวางโทษจําคุกไม่เกินหนึงป หรือปรับไม่เกินสองหมืน บาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๖๖","num":"166","text":"(๔) ความผิดตอเจ้าพนักงานในการยุติธรรม ตามทบัญญัติไว้ในมาตรา ๑๖๗ ถึงมาตรา ๑๙๒ และมาตรา ๑๙๔ (๕) ความผิดตอตําแหนงหน้าทีในการยุติธรรม ตามทบัญญัติไว้ในมาตรา ๒๐๐ ถึงมาตรา ๒๐๔ (๖) ความผิดเกยวกับความสงบสุขของประชาชน ตามทบัญญัติไว้ในมาตรา ๒๐๙ ถึงมาตรา ๒๑๖ (๗) ความผิดเกยวกับการกอให้เกิดภยันตรายตอประชาชน ตามทบัญญัติไว้ ในมาตรา ๒๑๗ ถึงมาตรา ๒๒๔ มาตรา ๒๒๖ ถึงมาตรา ๒๓๔ และมาตรา ๒๓๖ ถึงมาตรา ๒๓๘ (๘) ความผิดเกยวกับเงินตรา ตามทบัญญัติไว้ในมาตรา ๒๔๐ ถึงมาตรา ๒๔๙ ความผิดเกยวกับดวงตราแสตมปและตัว ตามทบัญญัติไว้ในมาตรา ๒๕๐ ถึงมาตรา ๒๖๑ และ ความผิดเกยวกับเอกสาร ตามทบัญญัติไว้ในมาตรา ๒๖๔ ถึงมาตรา ๒๖๙ (๙) ความผิดเกยวกับการค้า ตามทบัญญัติไว้ในมาตรา ๒๗๐ ถึงมาตรา ๒๗๕ (๑๐) ความผิดเกยวกับเพศ ตามทบัญญัติไว้ในมาตรา ๒๗๖ ถึงมาตรา ๒๘๕ (๑๑) ความผิดตอชวิต ตามทบัญญัติไว้ในมาตรา ๒๘๘ ถ"},{"section":"มาตรา ๑๖๗","num":"167","text":"ผู้ใดให้ ขอให้หรือรับว่าจะให้ทรัพย์สินหรือประโยชน์อืนใด แก่เจ้าพนักงานในตําแหนงตุลาการ พนักงานอัยการ ผู้ว่าคดหรือพนักงานสอบสวน เพือจูงใจให้ กระทําการ ไมกระทําการหรือประวิงการกระทําใดอันมิชอบด้วยหน้าทต้องระวางโทษจําคุกไม่ เกินเจ็ดป และปรับไม่เกินหนึงแสนสหมืนบาท"},{"section":"มาตรา ๑๖๘","num":"168","text":"ผู้ใดขัดขืนคําบังคับตามกฎหมายของพนักงานอัยการ ผู้ว่า คดหรือพนักงานสอบสวน ซึงให้มาเพือให้ถ้อยคํา ต้องระวางโทษจําคุกไม่เกินสามเดือน หรือ ปรับไม่เกินห้าพันบาท หรือทัง จําทัง ปรับ"},{"section":"มาตรา ๑๖๙","num":"169","text":"ผู้ใดขัดขืนคําบังคับตามกฎหมายของพนักงานอัยการ ผู้ว่า คดหรือพนักงานสอบสวน ซึงให้สงหรือจัดการสงทรัพย์สินหรือเอกสารใด ให้สาบาน ให้ ปฏิญาณหรือให้ให้ถ้อยคํา ต้องระวางโทษจําคุกไม่เกินสามเดือน หรือปรับไม่เกินห้าพันบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๗๐","num":"170","text":"ผู้ใดขัดขืนหมายหรือคําสัง ของศาลให้มาให้ถ้อยคํา ให้มา เบิกความหรือให้สงทรัพย์หรือเอกสารใดในการพิจารณาคดต้องระวางโทษจําคุกไม่เกินหก เดือน หรือปรับไม่เกินหนึงหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๗๑","num":"171","text":"ผู้ใดขัดขืนคําสังของศาลให้สาบาน ปฏิญาณ ให้ถ้อยคําหรือ เบิกความ ต้องระวางโทษจําคุกไม่เกินหกเดือน หรือปรับไม่เกินหนึงหมืนบาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๗๒","num":"172","text":"ผู้ใดแจ้งข้อความอันเปนเท็จเกยวกับความผิดอาญา แกพนักงานอัยการ ผู้ว่าคดพนักงานสอบสวน หรือเจ้าพนักงานผู้มอํานาจสืบสวนคดอาญา ซึง อาจทําให้ผู้อืนหรือประชาชนเสยหาย ต้องระวางโทษจําคุกไม่เกินสองป หรือปรับไม่เกินสหมืน บาท หรือทังจําทังปรับ"},{"section":"มาตรา ๑๗๓","num":"173","text":"ผู้ใดรูว้ ่ามิได้มการกระทําความผิดเกิดขึนแจ้งข้อความแกพนักงานสอบสวนหรือเจ้าพนักงานผู้มอํานาจสืบสวนคดอาญาว่า ได้มการกระทําความผิด ต้อง ระวางโทษจําคุกไม่เกินสามป และปรับไม่เกินหกหมืนบาท"},{"section":"มาตรา ๑๗๔","num":"174","text":"ถ้าการแจ้งข้อความตามมาตรา ๑๗๒ หรือมาตรา ๑๗๓ เปนการเพือจะแกล้งให้บุคคลใดต้องถูกบังคับตามวิธก ี ารเพือความปลอดภัย ผู้กระทําต้อง ระวางโทษจําคุกไม่เกินสามป และปรับไม่เกินหกหมืนบาท ถ้าการแจ้งตามความในวรรคแรกเปนการเพือจะแกล้งให้บุคคลใดต้องรับโทษ หรือรับโทษหนักขึน ผู้กระทําต้องระวางโทษจําคุกไม่เกินห้าป และปรับไม่เกินหนึงแสนบาท"},{"section":"มาตรา ๑๗๕","num":"175","text":"ผู้ใดเอาความอันเปนเท็จฟองผู้อืนตอศาลว่ากระทําความผิด อาญา หรือว่ากระทําความผิดอาญาแรงกว่าทีเปนความจริง ต้องระวางโทษจําคุกไม่เกินห้าป และปรับไม่เกินหนึงแสนบาท"},{"section":"มาตรา ๑๗๖","num":"176","text":"ผู้ใดกระทําความผิดตามมาตรา ๑๗๕ แล้วลุแก่โทษตอศาล และขอถอนฟองหรือแก้ฟองกอนมคําพิพากษา ให้ศาลลงโทษน้อยกว่าทกฎหมายกําหนดไว้ หรือศาลจะไมลงโทษเลยก็ได้"},{"section":"มาตรา ๑๗๗","num":"177","text":"มาตรา ๑๗๘ หรือมาตรา ๑๘๐ (๑) เปนการกระทําในกรณีแหงข้อหาว่า ผู้ใดกระทําความผิดทมีระวางโทษ จําคุกตังแตสามปขึนไป ผู้กระทําต้องระวางโทษจําคุกตังแตหกเดือนถึงเจ็ดป และปรับตังแตหนึงหมืนบาทถึงหนึงแสนสหมืนบาท (๒) เปนการกระทําในกรณีแหงข้อหาว่า ผู้ใดกระทําความผิดทมีระวางโทษถึง ประหารชวิต หรือจําคุกตลอดชวิต ผู้กระทําต้องระวางโทษจําคุกตังแตหนึงปถึงสิบห้าป และ ปรับตังแตสองหมืนบาทถึงสามแสนบาท"},{"section":"มาตรา ๑๗๘","num":"178","text":"ผู้ใดซึงเจ้าพนักงานในตําแหนงตุลาการ พนักงานอัยการ ผู้ ว่าคดหรือพนักงานสอบสวน ให้แปลข้อความหรือความหมายใด แปลข้อความหรือความหมาย นันให้ผิดไปในข้อสําคัญ ต้องระวางโทษจําคุกไม่เกินสามป หรือปรับไม่เกินหกหมืนบาท หรือ ทังจําทังปรับ"},{"section":"มาตรา ๑๗๙","num":"179","text":"ผู้ใดทําพยานหลักฐานอันเปนเท็จ เพือให้พนักงานสอบสวน หรือเจ้าพนักงานผู้มอํานาจสืบสวนคดอาญาเชือว่าได้มความผิดอาญาอย่างใดเกิดขึน หรือเชือ ว่าความผิดอาญาทีเกิดขึนร้ายแรงกว่าทีเปนความจริง ต้องระวางโทษจําคุกไม่
